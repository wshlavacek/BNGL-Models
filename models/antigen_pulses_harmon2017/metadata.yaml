# metadata.yaml — antigen_pulses_harmon2017
id: antigen_pulses_harmon2017
created: 2026-03-28

point_of_contact:
  name: William S. Hlavacek
  email: bill.hlavacek@gmail.com
  orcid: 0000-0003-4383-8711
  github: wshlavacek

source:
  tags: [literature, adapted_from_ode, ai_assisted]
  description: >
    Full signaling model from Harmon et al. (2017), Sci Rep
    7:15586 (Supplementary Data S1), rewritten in house style.
    A simplified variant captures only receptor occupancy
    kinetics under an escalating-dose pulse/wash protocol.

files:
  - name: antigen_pulses_harmon2017.bngl
    role: primary
    description: >
      Full FcεRI signaling model: antigen binding, receptor
      phosphorylation, Syk/Ship1 recruitment, cofactor X,
      PIP3, and degranulation. Pulse/wash protocol with 5
      quiescence intervals (5-240 min) reproducing Fig. 4.
    documentation_target: standard
    rating:
    min_bionetgen_version: "2.9.3"
  - name: antigen_pulses_harmon2017_simplified.bngl
    role: variant
    description: >
      Simplified receptor occupancy submodel. Monovalent
      antigen binding to IgE-FcεRI with escalating-dose
      pulse/wash protocol (10, 30, 100 ng/ml). Uses
      excess-ligand approximation.
  - name: reference/antigen_pulses_harmon2017_p1_5.gdat
    role: reference
    description: ODE output for S1 (first 5-min DF3 pulse).
  - name: verify_harmon2017.ipynb
    role: verification
    description: >
      Validates both BNGL files: full model against Fig. 4
      desensitization/priming pattern, simplified model
      against independent SciPy ODE.
  - name: verify_harmon2017.png
    role: figure
  - name: reference/antigen_pulses_harmon2017.net
    role: reference
