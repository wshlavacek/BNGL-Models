# metadata.yaml — blbr_rings_posner1995
id: blbr_rings_posner1995
created: 2026-03-22

point_of_contact:
  name: William S. Hlavacek
  email: bill.hlavacek@gmail.com
  orcid: 0000-0003-4383-8711
  github: wshlavacek

source:
  tags: [literature, new_model, ai_assisted]
  description: >
    Built from the kinetic theory in Posner, Wofsy and Goldstein (1995),
    Math Biosci 126:171-190, and the equilibrium theory in Dembo and
    Goldstein (1978), J Immunol 121:345-353. The BNGL model implements
    bivalent ligand-bivalent receptor aggregation with explicit cyclic
    dimer formation via a ring closure rule.

files:
  - name: blbr_rings_posner1995.bngl
    role: primary
    description: >
      NFsim time course at default LT_per_cell = 3e6 (near optimal).
      Uses component states (u/c/g) to distinguish chain bonds from
      ring bonds, with reversible ring closure/opening.  Constrains
      j-2 = koff.  Requires -bscb and -utl 5.  The verification
      notebook runs three doses by modifying LT_per_cell.
    documentation_target: standard
    rating:
    min_bionetgen_version: ">2.9.3"
  - name: blbr_rings_posner1995_no_rings.bngl
    role: variant
    description: >
      No-ring variant: capture, crosslink, and dissociation only.
      Validated against Posner ODEs (eqs 14a-14i with jp=0).
  - name: blbr_rings_posner1995_alt_formulation.bngl
    role: variant
    description: >
      Bidirectional ring variant with independent ring opening rate
      parameter jm (defaults to koff).  Unlike the primary model,
      jp and jm can be set independently.  Scaled for RT=30;
      also used by the size2-ring-posner-validation suite.
  - name: verify_posner1995.ipynb
    role: verification
    description: >
      Compares NFsim (reversible ring closure, -bscb -utl 5)
      against Posner kinetic ODEs and equilibrium theory at
      three ligand doses.
  - name: verify_posner1995.png
    role: figure
  - name: verify_no_rings_posner1995.ipynb
    role: verification
    description: >
      Compares NFsim (no ring closure) against Posner kinetic ODEs
      and exact per-site equilibrium at three ligand doses.
  - name: verify_no_rings_posner1995.png
    role: figure
  - name: verify_generate_network_ode.ipynb
    role: verification
    description: >
      Independent validation using BNG generate_network with reversible
      ring rule and max_stoich truncation. Confirms Posner ODEs are
      correct by comparison to exact network-generated ODEs.
  - name: verify_generate_network_ode.png
    role: figure
  - name: size2-ring-posner-validation/size2_ring_posner_validation.ipynb
    role: verification
    description: >
      Multi-dose validation of the bidirectional ring formulation
      at RT=30 against Posner kinetic ODEs (96-run NFsim ensemble).
  - name: size2-ring-posner-validation/size2_ring_posner_validation.png
    role: figure
  - name: size2_ring_equilibrium_kinetic_bngl_consistency.ipynb
    role: verification
    description: >
      Consistency check between equilibrium and kinetic formulations
      of the size-2 ring model.
  - name: size2-ring-posner-validation/size2_ring_posner_validation.bngl
    role: variant
    description: >
      BNGL file used by the size2-ring-posner-validation suite.
  - name: reference/blbr_rings_posner1995_nfr.gdat
    role: reference
  - name: reference/blbr_rings_posner1995_nfr.species
    role: reference
  - name: reference/blbr_rings_posner1995_nfr.xml
    role: reference
  - name: reference/blbr_rings_posner1995_no_rings_nfr.gdat
    role: reference
    description: NFsim time course (seed=42) for the no-rings variant.
  - name: reference/blbr_rings_posner1995_no_rings_nfr.species
    role: reference
  - name: reference/blbr_rings_posner1995_no_rings_nfr.xml
    role: reference
