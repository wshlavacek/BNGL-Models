# metadata.yaml — cell_cycle_oscillator_lang2024
id: cell_cycle_oscillator_lang2024
created: 2026-07-16

point_of_contact:
  name: William S. Hlavacek
  email: hlavacek@lanl.gov

source:
  tags: [literature, adapted_from_ode, ai_assisted]
  description: >
    Curated from Lang PF, Penas DR, Banga JR, Weindl D, Novak B (2024), PLoS
    Comput Biol 20(1):e1011151. The collection is the four cell-cycle-transition
    submodels of Fig 1: the restriction-point switch (Fig 1B, Eqs A), the G1/S
    switch (Fig 1D, Eqs B), the Vinod-Novak G2/M switch (Fig 1F, Eqs C), and the
    G2/M + metaphase/anaphase oscillator (Fig 1H, Eqs C+D), which is the primary
    file. Each BNGL file is an ODE-level reconstruction of the corresponding
    mass-action model: equations are from S1 Appendix and parameters/initial
    conditions from the XPPAUT .ode files in the versions/v0.0.1 directory of
    the paulflang/cell_cycle_model GitHub repository
    (commit b0a820288bc98d62333acf8434174b6446df0574). These four submodels use
    arbitrary units and are ODE-only. The collection also includes the paper's
    full fused, parameter-fitted cell cycle model (version v3.2.0) as
    cell_cycle_oscillator_lang2024_fused.bngl.

files:
  - name: cell_cycle_oscillator_lang2024.bngl
    role: primary
    description: >
      G2/M + M/A mitotic oscillator (Fig 1H / Fig D-b; Eqs 16-26). Couples the
      Vinod-Novak G2/M bistable switch to the M/A negative-feedback loop; at
      kSyCb = 0.05 /min it produces a stable limit cycle (period ~137 min).
      7 species, 14 reactions.
    documentation_target: standard
    rating:
    min_bionetgen_version: "2.9.3"
  - name: cell_cycle_oscillator_lang2024_restriction_point.bngl
    role: related
    description: >
      Rb/E2f restriction-point bistable switch (Fig 1B; Eqs 1-5, RP_aa variant
      with E2f autoactivation). Irreversible toggle in CycD; upper saddle-node
      at Cd ~ 0.32 AU. 5 species, 10 reactions.
    documentation_target: standard
    rating:
    min_bionetgen_version: "2.9.3"
  - name: cell_cycle_oscillator_lang2024_g1s.bngl
    role: related
    description: >
      CycA/Apc:Cdh1 G1/S bistable switch (Fig 1D; Eqs 9-15). Hysteresis in E2f
      (bistable ~0.42-0.59 AU). 6 species, 12 reactions.
    documentation_target: standard
    rating:
    min_bionetgen_version: "2.9.3"
  - name: cell_cycle_oscillator_lang2024_g2m.bngl
    role: related
    description: >
      Vinod-Novak CycB:Cdk1/PP2A:B55 G2/M bistable switch (Fig 1F; Eqs 16-22).
      Saddle-nodes at CycB:Cdk1 = 0.110/0.068 and pEnsa:B55 = 0.112/0.248.
      4 species, 8 reactions.
    documentation_target: standard
    rating:
    min_bionetgen_version: "2.9.3"
  - name: cell_cycle_oscillator_lang2024_fused.bngl
    role: related
    description: >
      Full fused, parameter-fitted RPE-1 cell cycle model (Lang et al. 2024,
      v3.2.0) — the paper's headline model into which the four transition
      submodels above were merged and fitted (177 of 205 parameters estimated to
      single-cell RPE-1 median trajectories, Stallaert et al. 2021). 73 species,
      332 reactions, ODE-only (has begin compartments). Body verbatim from
      pybnf-jobs/Lang-2024/v3_2_0/v3_2_0.bngl; this copy adds a standalone
      two-cell-cycle ODE reproduction protocol (t_end = 136471.6126, n_steps =
      1200) that emits the 8 nuclear observation functions obs_*__nuc_median().
    documentation_target: standard
    rating:
    min_bionetgen_version: "2.9.3"
  - name: verify_lang2024.ipynb
    role: verification
    description: >
      Runs all four models in BioNetGen, integrates the published Eqs A-D
      independently in SciPy (model-spec agreement <= 2e-6), reproduces the
      reported G2/M saddle-node values and oscillation onset (kSyCb = 0.03335),
      and overlays the bifurcation diagrams on the digitized Fig 1 panels.
  - name: verify_lang2024.png
    role: figure

