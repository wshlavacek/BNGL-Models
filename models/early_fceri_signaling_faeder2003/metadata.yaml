# metadata.yaml - early_fceri_signaling_faeder2003
id: early_fceri_signaling_faeder2003
created: 2026-06-04

point_of_contact:
  name: William S. Hlavacek
  email: hlavacek@lanl.gov
  orcid: 0000-0003-4383-8711
  github: wshlavacek

source:
  tags: [literature, originally_rule_based, adapted_from_bngl, ai_assisted]
  description: >
    House-style curation of dev/papers/Faeder2003/fceri_ji.bngl,
    based on Faeder et al. (2003), Journal of Immunology 170:3769-3781.
    The source model encodes the early FceRI signaling network described
    in the paper and uses scaled molecule counts with deterministic ODE
    simulation. The _fyn variant adapts the fceri_fyn.bngl demonstration
    model distributed with BioNetGen, adding the Src-family kinase Fyn and
    Src activation-loop transphosphorylation; this extension is beyond the
    published paper. It corrects a rule ("Fyn phosphorylation by SH2-bound
    Lyn") that is unreachable-as-distributed and generates zero reactions.

files:
  - name: early_fceri_signaling_faeder2003.bngl
    role: primary
    description: >
      Early FceRI signaling model for IgE-dimer-induced receptor
      aggregation, Lyn-mediated receptor phosphorylation, Syk recruitment,
      and Syk activation-loop transphosphorylation.
    documentation_target: standard
    rating:
    min_bionetgen_version: "2.9.3"
  - name: early_fceri_signaling_faeder2003_fyn.bngl
    role: variant
    description: >
      Adds the Src-family kinase Fyn (competing with SH2-recruited Lyn for
      phosphorylated receptor beta) and activation-loop transphosphorylation
      of receptor-associated Lyn and Fyn. Adapted from the BioNetGen
      fceri_fyn.bngl demonstration model; beyond the published paper. The
      "Fyn phosphorylation by SH2-bound Lyn" rule is corrected relative to
      the distributed model (1281 species, 15328 reactions).
    documentation_target: standard
    rating:
    min_bionetgen_version: "2.9.3"
  - name: verify_faeder2003.ipynb
    role: verification
    description: >
      Runs BioNetGen, confirms committed reference output, independently
      integrates the generated mass-action ODE network with SciPy, and
      overlays BioNetGen and SciPy observables. Covers both the primary
      354-species model and the 1281-species _fyn variant.
