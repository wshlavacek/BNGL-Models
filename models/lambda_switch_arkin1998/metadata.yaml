# metadata.yaml — lambda_switch_arkin1998
id: lambda_switch_arkin1998
created: 2026-07-19

point_of_contact:
  name: William S. Hlavacek
  email: bill.hlavacek@gmail.com
  orcid: 0000-0003-4383-8711
  github: wshlavacek

source:
  tags: [literature, classic, ai_assisted]
  description: >
    Phage lambda lysis-lysogeny decision circuit of Arkin, Ross &
    McAdams (1998), Genetics 149:1633-1648, curated as two
    complementary, fully paper-specified modules. The primary file is
    the non-genetic protein reaction network (Fig. 1a boxes R1-R5;
    rate constants from Table 3): CI/Cro dimerization and degradation,
    N degradation, and CII/CIII competitive proteolysis by two host
    proteases with CIII protection. The related file is the
    Shea-Ackers statistical-thermodynamic activation of promoters P_RE
    and P_L (Table 1). P_R/P_RM (Fig. 2) is reproduced in the
    verification notebook from the Shea & Ackers (1985) OR parameters
    that the paper cites. A third file,
    lambda_switch_arkin1998_fullcircuit.bngl, assembles these pieces
    into the complete closed-loop decision circuit as a NETWORK-FREE
    model (run with NFsim or RuleMonkey): all four promoters
    (P_R/P_RM/P_RE/P_L) driven by their live Shea-Ackers open-complex
    rates, a state-increment (~PLUS) RNAP-elongation model with
    N-antitermination at nutR/nutL and terminator competition at
    tR1/tL1 (termination fractions match the paper; elongation kinetics
    are coarse-grained), geometric-burst translation (mean 10
    proteins/transcript, assumption 8), and the R1-R5 turnover network,
    with multiplicity of infection (MOI) as a parameter. It reproduces
    the Fig. 3 MOI-6 concentration trajectories and the Fig. 6
    lysogeny-vs-MOI/API relationship.

files:
  - name: lambda_switch_arkin1998.bngl
    role: primary
    description: >
      Non-genetic reaction network R1-R5 (Table 3): CI/Cro
      dimerization+degradation, N degradation, and CII/CIII
      competitive proteolysis with CIII protection. Reproduces the
      Table-3 protein-lifetime and CIII-protection targets.
    documentation_target: standard
    rating:
    min_bionetgen_version: "2.9.3"
  - name: lambda_switch_arkin1998_promoters.bngl
    role: related
    description: >
      Shea-Ackers activation of promoters P_RE (CII-activated) and P_L
      (Cro2/CI2-repressed) from Table 1; reproduces the Fig. 2
      promoter-activation methodology.
    documentation_target: standard
    rating:
    min_bionetgen_version: "2.9.3"
  - name: lambda_switch_arkin1998_fullcircuit.bngl
    role: related
    description: >
      Complete closed-loop lysis/lysogeny decision circuit as a
      NETWORK-FREE model (NFsim / RuleMonkey). Couples all four
      Shea-Ackers promoters (P_R/P_RM/P_RE/P_L, read live from the
      circuit's own CI2/Cro2/CII/N), a state-increment (~PLUS)
      RNAP-elongation model with N-antitermination and tR1/tL1
      terminator competition, geometric-burst translation (mean 10),
      and the R1-R5 turnover network. MOI is a parameter (default 6).
      Promoter rates are driven by Molecules-type dimer observables with
      dimer_scale=0.5 (NFsim freezes functional rates that read
      Species-type observables; RuleWorld/nfsim#86). writeXML only;
      simulate the XML with run_fullcircuit.py.
    documentation_target: standard
    rating:
    min_bionetgen_version: "2.9.3"
  - name: lambda_switch_arkin1998_fullcircuit_exact.bngl
    role: related
    description: >
      Paper-exact companion of the full circuit (issue #6). Identical to
      _fullcircuit.bngl except it closes the two fidelity gaps that move the
      Arkin (1998) numbers: (1) CELL GROWTH + DILUTION (Table 3): V(t)=(1+k0*t)*
      1e-15 L, k0=4.76e-4/s, doubling over the 35-min cycle, carried by a
      volume-proxy clock species Vol() (Src()->Src()+Vol() at k0*Vol0, so
      Obs_Vol/Vol0 = V(t)/V_ref) with first-order dilution decay at mu(t)=
      k0/g(t) on every phage species (host/buffered pools and the non-replicating
      genome held at constant concentration) -- pulls the Fig-3a Cro2 plateau from
      the constant-volume ~90 down to ~55-60 nM; (2) ANTITERMINATION SATURATION
      (Table 2): nut sites become a slow step (k23=5 nt/s) with reversible N
      loading (k24=0.145, k25=0.1) and antiterminated escape (k26=30), via paused
      RNAP states at~n/at~m -- restores the Fig-6a 'Full' onset to MOI>3
      (f_lyso = 0.29/0.54/0.71 at MOI 4/5/6, matching the paper's 0.30/0.55/0.70;
      the base model sits at 0.10/0.36/0.48). NFsim/RuleMonkey parity retained.
      Translation stays geometric-burst (deprioritized). Drive with
      run_fullcircuit.py under FULLCIRCUIT_MODEL=exact.
    documentation_target: standard
    rating:
    min_bionetgen_version: "2.9.3"
  - name: run_fullcircuit.py
    role: verification
    description: >
      Self-contained driver for lambda_switch_arkin1998_fullcircuit.bngl:
      overrides MOI, generates BNG-XML, simulates network-free via bngsim
      (NFsim/RuleMonkey), and reproduces Arkin Fig 3 (MOI-6 average Cro2/CI2
      with +/-1sigma band) and Fig 6 (f_lysogeny vs MOI, Poisson-weighted to
      fraction-lysogens vs API). Lysogeny classifier is the full Arkin footnote
      12: (i) P_RE activation (total open-complex rate A_PRE*MOI >= 1/2min over a
      contiguous 4-min window) AND (ii) [CI2]>[Cro2] at the end of the 35-min
      cell cycle. Drives either full circuit: set FULLCIRCUIT_MODEL=exact to run
      the paper-exact companion.
  - name: generator/
    role: tooling
    description: >
      Generator that emits the two network-free full-circuit models
      (_fullcircuit.bngl and _fullcircuit_exact.bngl) from spec/code:
      plus_gen.py (~PLUS RNAP molecule type loc 0..2283 + per-operon
      elongation/landmark rules), or_system.py (40-config Shea-Ackers O_R +
      A_PR/A_PRM), pre_pl.py (P_RE/P_L), _sections.py (verbatim static prose),
      build_fullcircuit.py (assembler; base|exact|--check). Regenerates both
      models byte-for-byte; guarded by tests/test_lambda_generator.py. Deferred
      fidelity items (issue #15) are added here, not by hand-editing the model.
  - name: verify_arkin1998.ipynb
    role: verification
    description: >
      Verifies (1) the R1-R5 network against an independent SciPy
      mass-action integration plus the Table-3 lifetime/protection
      targets, (2) the P_RE/P_L scans against the analytic Shea-Ackers
      partition function, and (3) reproduces the Fig. 2 P_R/P_RM panels
      from the full Shea-Ackers OR system (Table 1 + Table 2),
      checked against the Fig. 2 caption anchors.
  - name: verify_arkin1998.png
    role: figure
  - name: fullcircuit_verification.png
    role: figure
    description: >
      Full-circuit verification: Fig 3a MOI-6 average Cro2/CI2 +/-1sigma band,
      Fig 6a lysogeny probability vs MOI, Fig 6b Poisson-weighted lysogens vs API.
  - name: fullcircuit_exact_verification.png
    role: figure
    description: >
      Paper-exact variant verification: Fig 3a Cro2 plateau restored to ~55-60 nM
      by growth dilution; Fig 6a 'Full' onset restored to MOI>3 (overlaid on the
      digitized Arkin Fig 6a points); Fig 6b Poisson-weighted lysogens vs API.
  - name: reference/fullcircuit_fig3.npz
    role: reference
    description: Cached MOI-6 network-free ensemble (Cro2/CI2 mean + 16/84 pctile).
  - name: reference/fullcircuit_fig6.npz
    role: reference
    description: Cached f_lysogeny(MOI) sweep + Poisson-weighted F(API).
  - name: reference/fullcircuit_exact_fig3.npz
    role: reference
    description: Exact-variant MOI-6 ensemble (Cro2/CI2 mean + 16/84 pctile, 60 seeds).
  - name: reference/fullcircuit_exact_fig6.npz
    role: reference
    description: Exact-variant f_lysogeny(MOI) sweep + Poisson-weighted F(API).
