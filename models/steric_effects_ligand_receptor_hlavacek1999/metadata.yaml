source:
  tags: [literature, adapted_from_ode, ai_assisted]
  description: >
    Built from reading of Hlavacek WS, Posner RG, Perelson AS
    (1999), Biophys J 76:3031-3043. Three variants reproduce the
    dotted, broken, and solid curves in Fig. 8a,b: time courses
    of receptor aggregation (alpha(2) and alpha(10)) with and
    without steric hindrance effects.

