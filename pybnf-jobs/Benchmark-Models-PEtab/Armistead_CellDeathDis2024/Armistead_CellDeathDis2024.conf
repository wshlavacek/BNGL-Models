# Imported from a PEtab v2 problem by pybnf.petab.import_job (#407).
# The PEtab *problem* (parameters/priors, observables/noise, measurements,
# conditions) is recovered exactly and round-trips through a re-export. The
# run-recipe below (job_type + algorithm settings, the per-experiment method:,
# and output/verbosity) is SUPPLIED, not recovered: PEtab is a problem spec with
# no home for the method, so it is not part of the round-trip identity.

job_type = gntr
population_size = 20
max_iterations = 500
wall_time_sim = 10
verbosity = 1
sbml_backend = bngsim
random_seed = 1
output_dir = output

edition = 2
model: model_Armistead_CellDeathDis2024.xml
objective = chi_sq
noise_model Sphinga = gaussian, sigma = prediction_formula Sphinga*sd_Sphinga_obs
noise_model Cer = gaussian, sigma = prediction_formula Cer*sd_Cer_obs
noise_model Sphingo = gaussian, sigma = prediction_formula Sphingo*sd_Sphingo_obs
noise_model S1P = gaussian, sigma = prediction_formula S1P*sd_S1P_obs
condition: wild_type, perturbations: S_on = 1, Cer = 0.988, Sphinga = 0.000732, Sphingo = 0.000395, S1P = 1.551
condition: mutant, perturbations: S_on = 0, Cer = 0.822, Sphinga = 0.000795, Sphingo = 0.000364, S1P = 2.07
experiment: experiment____wild_type, condition: wild_type, method: ode, data: experiment____wild_type.exp, experiment____wild_type_rep2.exp, experiment____wild_type_rep3.exp, experiment____wild_type_rep4.exp, experiment____wild_type_rep5.exp
experiment: experiment____mutant, condition: mutant, method: ode, data: experiment____mutant.exp, experiment____mutant_rep2.exp, experiment____mutant_rep3.exp, experiment____mutant_rep4.exp, experiment____mutant_rep5.exp
loguniform_var = k00 0.001 1000
loguniform_var = k0 0.001 1000
loguniform_var = k_d 0.001 1000
loguniform_var = k1 0.001 1000
loguniform_var = k2 0.001 1000
loguniform_var = k3 0.001 1000
loguniform_var = k4 0.001 1000
loguniform_var = k5 0.001 1000
uniform_var = alpha_hai1a 0.5 0.999
uniform_var = alpha_cer -0.999 -0.001
loguniform_var = sd_Sphinga_obs 0.001 1000
loguniform_var = sd_Cer_obs 0.001 1000
loguniform_var = sd_Sphingo_obs 0.001 1000
loguniform_var = sd_S1P_obs 0.001 1000
