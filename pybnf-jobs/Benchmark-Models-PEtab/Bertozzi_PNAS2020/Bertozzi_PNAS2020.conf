# Imported from a PEtab v2 problem by pybnf.petab.import_job (#407).
# The PEtab *problem* (parameters/priors, observables/noise, measurements,
# conditions) is recovered exactly and round-trips through a re-export. The
# run-recipe below (job_type + algorithm settings, the per-experiment method:,
# and output/verbosity) is SUPPLIED, not recovered: PEtab is a problem spec with
# no home for the method, so it is not part of the round-trip identity.

job_type = cmaes
population_size = 32
max_iterations = 2000
cmaes_restarts = 12
cmaes_restart_strategy = ipop
cmaes_ipop_factor = 2.0
cmaes_stop_tol = 1e-4
wall_time_sim = 10
verbosity = 1
sbml_backend = bngsim
random_seed = 1
output_dir = output

edition = 2
model: model.xml
objective = chi_sq
noise_model y_I_NY = gaussian, sigma = fit sd_I_NY
noise_model y_I_CA = gaussian, sigma = fit sd_I_CA
observable: y_I_NY, formula: I_
observable: y_I_CA, formula: I_
condition: u_CA, perturbations: N_ = 39560000, I0_ = I0_CA, R0_ = R0_CA, gamma_ = gamma_CA
condition: u_NY, perturbations: N_ = 19540000, I0_ = I0_NY, R0_ = R0_NY, gamma_ = gamma_NY
experiment: experiment____u_CA, condition: u_CA, method: ode, data: experiment____u_CA.exp
experiment: experiment____u_NY, condition: u_NY, method: ode, data: experiment____u_NY.exp
loguniform_var = R0_NY 1.5 5
loguniform_var = gamma_NY 0.01 0.2
loguniform_var = I0_NY 1000 10000
loguniform_var = sd_I_NY 100 1000
loguniform_var = R0_CA 1.5 5
loguniform_var = gamma_CA 0.01 0.2
loguniform_var = I0_CA 100 1000
loguniform_var = sd_I_CA 100 1000
