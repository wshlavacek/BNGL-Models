# Imported from a PEtab v2 problem by pybnf.petab.import_job (#407).
# The PEtab *problem* (parameters/priors, observables/noise, measurements,
# conditions) is recovered exactly and round-trips through a re-export. The
# run-recipe below (job_type + algorithm settings, the per-experiment method:,
# and output/verbosity) is SUPPLIED, not recovered: PEtab is a problem spec with
# no home for the method, so it is not part of the round-trip identity.

output_dir=output
edition = 2

model: model_Boehm_JProteomeRes2014.xml
job_type = gntr
objective = chi_sq
noise_model pSTAT5A_rel = gaussian, sigma = fit sd_pSTAT5A_rel
noise_model pSTAT5B_rel = gaussian, sigma = fit sd_pSTAT5B_rel
noise_model rSTAT5A_rel = gaussian, sigma = fit sd_rSTAT5A_rel
observable: pSTAT5A_rel, formula: (100 * pApB + 200 * pApA * specC17) / (pApB + STAT5A * specC17 + 2 * pApA * specC17)
observable: pSTAT5B_rel, formula: -(100 * pApB - 200 * pBpB * (specC17 - 1)) / ((STAT5B * (specC17 - 1) - pApB) + 2 * pBpB * (specC17 - 1))
observable: rSTAT5A_rel, formula: (100 * pApB + 100 * STAT5A * specC17 + 200 * pApA * specC17) / (2 * pApB + STAT5A * specC17 + 2 * pApA * specC17 - STAT5B * (specC17 - 1) - 2 * pBpB * (specC17 - 1))

experiment: experiment1, method: ode, data: experiment1.exp

loguniform_var = Epo_degradation_BaF3 1e-05 100000
loguniform_var = k_exp_hetero 1e-05 100000
loguniform_var = k_exp_homo 1e-05 100000
loguniform_var = k_imp_hetero 1e-05 100000
loguniform_var = k_imp_homo 1e-05 100000
loguniform_var = k_phos 1e-05 100000
loguniform_var = sd_pSTAT5A_rel 1e-05 100000
loguniform_var = sd_pSTAT5B_rel 1e-05 100000
loguniform_var = sd_rSTAT5A_rel 1e-05 100000

population_size = 20
max_iterations = 500
verbosity = 1
sbml_backend = bngsim
random_seed = 1
