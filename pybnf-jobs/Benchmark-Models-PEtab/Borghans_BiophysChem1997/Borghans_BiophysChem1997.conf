# Imported from a PEtab v2 problem by pybnf.petab.import_job (#407).
# The PEtab *problem* (parameters/priors, observables/noise, measurements,
# conditions) is recovered exactly and round-trips through a re-export. The
# run-recipe below (job_type + algorithm settings, the per-experiment method:,
# and output/verbosity) is SUPPLIED, not recovered: PEtab is a problem spec with
# no home for the method, so it is not part of the round-trip identity.

job_type = cmaes
population_size = 32
max_iterations = 2000
cmaes_restarts = 12
cmaes_restart_strategy = ipop
cmaes_ipop_factor = 2.0
cmaes_stop_tol = 1e-4
wall_time_sim = 10
verbosity = 1
sbml_backend = bngsim
random_seed = 1
output_dir = output

edition = 2
model: model_Borghans_BiophysChem1997.xml
noise_model = lognormal, sigma = fit sigma
observable: Ca, formula: Z_state*scale + offset
experiment: experiment1, method: ode, data: experiment1.exp
loguniform_var = K2 0.001 100000
loguniform_var = K_par 0.001 100000
loguniform_var = Ka 0.001 100000
loguniform_var = Kd 0.001 100000
loguniform_var = Kf 0.001 100000
loguniform_var = Kp 0.001 100000
loguniform_var = Ky 0.001 100000
loguniform_var = Kz 0.001 100000
loguniform_var = Vd 0.001 100000
loguniform_var = Vm2 0.001 100000
loguniform_var = Vm3 0.001 100000
loguniform_var = Vp 0.001 100000
loguniform_var = beta_par 0.001 100000
loguniform_var = epsilon_par 0.001 100000
uniform_var = init_A_state 0 1
uniform_var = init_Y_state 0 1
uniform_var = init_Z_state 0 1
loguniform_var = n_par 0.001 100000
loguniform_var = offset 0.001 100000
loguniform_var = scale 0.001 100000
loguniform_var = sigma 0.001 100000
loguniform_var = v0 0.001 100000
loguniform_var = v1 0.001 100000
