# Imported from a PEtab v2 problem by pybnf.petab.import_job (#407).
# The PEtab *problem* (parameters/priors, observables/noise, measurements,
# conditions) is recovered exactly and round-trips through a re-export. The
# run-recipe below (job_type + algorithm settings, the per-experiment method:,
# and output/verbosity) is SUPPLIED, not recovered: PEtab is a problem spec with
# no home for the method, so it is not part of the round-trip identity.

job_type = gntr
population_size = 20
max_iterations = 500
wall_time_sim = 10
verbosity = 1
sbml_backend = bngsim
random_seed = 1
output_dir = output

edition = 2
model: model_Brannmark_JBC2010.xml
objective = chi_sq
noise_model IR1_P = gaussian, sigma = fit sigmaY1TimR
noise_model IRS1_P = gaussian, sigma = formula noiseParameter1_IRS1_P
noise_model IRS1_P_DosR = gaussian, sigma = fit sigmaYDosR
observable: IR1_P, formula: k_IRP_1Step*(IRiP + IRp)
observable: IRS1_P, formula: observableParameter1_IRS1_P * IRSiP
observable: IRS1_P_DosR, formula: IRSiP*k_IRSiP_DosR
condition: Dose_0, perturbations: insulin_time_1 = 0, insulin_dose_1 = 0, insulin_time_2 = 0, insulin_dose_2 = 0
condition: Dose_001, perturbations: insulin_time_1 = 0, insulin_dose_1 = 0.01, insulin_time_2 = 0, insulin_dose_2 = 0
condition: Dose_01, perturbations: insulin_time_1 = 0, insulin_dose_1 = 0.1, insulin_time_2 = 0, insulin_dose_2 = 0
condition: Dose_1, perturbations: insulin_time_1 = 0, insulin_dose_1 = 0.3, insulin_time_2 = 0, insulin_dose_2 = 0
condition: Dose_3, perturbations: insulin_time_1 = 0, insulin_dose_1 = 1, insulin_time_2 = 0, insulin_dose_2 = 0
condition: Dose_10, perturbations: insulin_time_1 = 0, insulin_dose_1 = 10, insulin_time_2 = 0, insulin_dose_2 = 0
condition: Dose_100, perturbations: insulin_time_1 = 0, insulin_dose_1 = 100, insulin_time_2 = 0, insulin_dose_2 = 0
condition: TwoSteps, perturbations: insulin_time_1 = 0, insulin_dose_1 = 1.2, insulin_time_2 = 4, insulin_dose_2 = 8.8
experiment: experiment__Dose_0___Dose_0, preequilibrate: Dose_0, condition: Dose_0, method: ode, data: experiment__Dose_0___Dose_0.exp
experiment: experiment__Dose_0___Dose_001, preequilibrate: Dose_0, condition: Dose_001, method: ode, data: experiment__Dose_0___Dose_001.exp
experiment: experiment__Dose_0___Dose_01, preequilibrate: Dose_0, condition: Dose_01, method: ode, data: experiment__Dose_0___Dose_01.exp
experiment: experiment__Dose_0___Dose_1, preequilibrate: Dose_0, condition: Dose_1, method: ode, data: experiment__Dose_0___Dose_1.exp
experiment: experiment__Dose_0___Dose_3, preequilibrate: Dose_0, condition: Dose_3, method: ode, data: experiment__Dose_0___Dose_3.exp
experiment: experiment__Dose_0___Dose_10, preequilibrate: Dose_0, condition: Dose_10, method: ode, data: experiment__Dose_0___Dose_10.exp
experiment: experiment__Dose_0___Dose_100, preequilibrate: Dose_0, condition: Dose_100, method: ode, measurement_params: experiment__Dose_0___Dose_100_measparams.tsv, data: experiment__Dose_0___Dose_100.exp
experiment: experiment__Dose_0___TwoSteps, preequilibrate: Dose_0, condition: TwoSteps, method: ode, measurement_params: experiment__Dose_0___TwoSteps_measparams.tsv, data: experiment__Dose_0___TwoSteps.exp
loguniform_var = k1a 1e-06 500000.000000001
loguniform_var = k1aBasic 1e-06 500000.000000001
loguniform_var = k1b 1e-06 500000.000000001
loguniform_var = k1c 1e-06 500000.000000001
loguniform_var = k1d 1e-06 500000.000000001
loguniform_var = k1e 1e-06 500000.000000001
loguniform_var = k1f 1e-06 500000.000000001
loguniform_var = k1g 1e-06 500000.000000001
loguniform_var = k1r 1e-06 500000.000000001
loguniform_var = k21 1e-06 500000.000000001
loguniform_var = k22 1e-06 500000.000000001
loguniform_var = k3 1e-06 500000.000000001
loguniform_var = k_IRP_1Step 10 200000
loguniform_var = k_IRSiP_1Step 10 200000
loguniform_var = k_IRSiP_2Step 10 200000
loguniform_var = k_IRSiP_DosR 10 200000
loguniform_var = km2 1e-06 500000.000000001
loguniform_var = km3 1e-06 500000.000000001
loguniform_var = sigmaY1TimR 1e-05 1000
loguniform_var = sigmaY2Step 1e-05 1000
loguniform_var = sigmaY2TimR 1e-05 1000
loguniform_var = sigmaYDosR 1e-05 1000
