# Imported from a PEtab v2 problem by pybnf.petab.import_job (#407).
# The PEtab *problem* (parameters/priors, observables/noise, measurements,
# conditions) is recovered exactly and round-trips through a re-export. The
# run-recipe below (job_type + algorithm settings, the per-experiment method:,
# and output/verbosity) is SUPPLIED, not recovered: PEtab is a problem spec with
# no home for the method, so it is not part of the round-trip identity.

job_type = cmaes
population_size = 32
max_iterations = 2000
cmaes_restarts = 12
cmaes_restart_strategy = ipop
cmaes_ipop_factor = 2.0
cmaes_stop_tol = 1e-4
wall_time_sim = 10
verbosity = 1
sbml_backend = bngsim
random_seed = 1
output_dir = output

edition = 2
model: model_Bruno_JExpBot2016.xml
objective = chi_sq
condition: model1_data1, perturbations: init_b10 = init_b10_1, init_bcar = 0, init_bcry = 0, init_ohb10 = 0, init_zea = 0, k5_multiplier = 0, kb1_multiplier = 0, kb2_multiplier = 1, kc1_multiplier = 1, kc2_multiplier = 0, kc4_multiplier = 1
condition: model1_data2, perturbations: init_b10 = 0, init_bcar = init_bcar1, init_bcry = 0, init_ohb10 = 0, init_zea = 0, k5_multiplier = 1, kb1_multiplier = 1, kb2_multiplier = 1, kc1_multiplier = 0, kc2_multiplier = 0, kc4_multiplier = 0
condition: model1_data3, perturbations: init_b10 = 0, init_bcar = init_bcar2, init_bcry = 0, init_ohb10 = 0, init_zea = 0, k5_multiplier = szea, kb1_multiplier = szea, kb2_multiplier = szea, kc1_multiplier = szea, kc2_multiplier = szea, kc4_multiplier = szea
condition: model1_data4, perturbations: init_b10 = 0, init_bcar = 0, init_bcry = init_bcry_1, init_ohb10 = 0, init_zea = 0, k5_multiplier = 1, kb1_multiplier = 0, kb2_multiplier = 1, kc1_multiplier = 1, kc2_multiplier = 1, kc4_multiplier = 1
condition: model1_data5, perturbations: init_b10 = 0, init_bcar = 0, init_bcry = 0, init_ohb10 = init_ohb10_1, init_zea = 0, k5_multiplier = 0, kb1_multiplier = 0, kb2_multiplier = 1, kc1_multiplier = 0, kc2_multiplier = 0, kc4_multiplier = 1
condition: model1_data6, perturbations: init_b10 = 0, init_bcar = 0, init_bcry = 0, init_ohb10 = 0, init_zea = init_zea_1, k5_multiplier = szea, kb1_multiplier = 0, kb2_multiplier = 0, kc1_multiplier = 0, kc2_multiplier = 0, kc4_multiplier = szea
experiment: experiment____model1_data1, condition: model1_data1, method: ode, data: experiment____model1_data1.exp
experiment: experiment____model1_data2, condition: model1_data2, method: ode, data: experiment____model1_data2.exp
experiment: experiment____model1_data3, condition: model1_data3, method: ode, data: experiment____model1_data3.exp
experiment: experiment____model1_data4, condition: model1_data4, method: ode, data: experiment____model1_data4.exp
experiment: experiment____model1_data5, condition: model1_data5, method: ode, data: experiment____model1_data5.exp
experiment: experiment____model1_data6, condition: model1_data6, method: ode, data: experiment____model1_data6.exp
loguniform_var = init_b10_1 1e-05 1000
loguniform_var = init_bcar1 1e-05 1000
loguniform_var = init_bcar2 1e-05 1000
loguniform_var = init_bcry_1 1e-05 1000
loguniform_var = init_ohb10_1 1e-05 1000
loguniform_var = init_zea_1 1e-05 1000
loguniform_var = k5 1e-05 1000
loguniform_var = kb1 1e-05 1000
loguniform_var = kb2 1e-05 1000
loguniform_var = kc1 1e-05 1000
loguniform_var = kc2 1e-05 1000
loguniform_var = kc4 1e-05 1000
loguniform_var = szea 1e-05 1000
