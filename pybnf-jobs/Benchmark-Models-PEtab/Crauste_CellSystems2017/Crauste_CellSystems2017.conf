# Imported from a PEtab v2 problem by pybnf.petab.import_job (#407).
# The PEtab *problem* (parameters/priors, observables/noise, measurements,
# conditions) is recovered exactly and round-trips through a re-export. The
# run-recipe below (job_type + algorithm settings, the per-experiment method:,
# and output/verbosity) is SUPPLIED, not recovered: PEtab is a problem spec with
# no home for the method, so it is not part of the round-trip identity.

job_type = gntr
population_size = 20
max_iterations = 500
wall_time_sim = 10
verbosity = 1
sbml_backend = bngsim
random_seed = 1
output_dir = output

edition = 2
model: model_Crauste_CellSystems2017.xml
objective = chi_sq
experiment: experiment1, method: ode, data: experiment1.exp
loguniform_var = delta_EL 1e-05 1000
loguniform_var = delta_LM 1e-05 1000
loguniform_var = delta_NE 1e-05 1000
loguniform_var = mu_EE 1e-05 1000
loguniform_var = mu_LE 1e-10 1000
loguniform_var = mu_LL 1e-10 1000
loguniform_var = mu_N 1e-05 1000
loguniform_var = mu_P 1e-05 1000
loguniform_var = mu_PE 1e-10 1000
loguniform_var = mu_PL 1e-05 1000
loguniform_var = rho_E 1e-05 1000
loguniform_var = rho_P 1e-05 1000
