# Imported from a PEtab v2 problem by pybnf.petab.import_job (#407).
# The PEtab *problem* (parameters/priors, observables/noise, measurements,
# conditions) is recovered exactly and round-trips through a re-export. The
# run-recipe below (job_type + algorithm settings, the per-experiment method:,
# and output/verbosity) is SUPPLIED, not recovered: PEtab is a problem spec with
# no home for the method, so it is not part of the round-trip identity.

job_type = cmaes
population_size = 32
max_iterations = 2000
cmaes_restarts = 12
cmaes_restart_strategy = ipop
cmaes_ipop_factor = 2.0
cmaes_stop_tol = 1e-4
wall_time_sim = 10
verbosity = 1
sbml_backend = bngsim
random_seed = 1
output_dir = output

edition = 2
model: model_Elowitz_Nature2000.xml
noise_model = lognormal, sigma = fit sigma
observable: fluorescence, formula: GFP*scale + background
experiment: experiment1, method: ode, data: experiment1.exp
loguniform_var = KM 1e-05 1000
loguniform_var = background 1e-05 1000
loguniform_var = eff 1e-05 1000
loguniform_var = eff_GFP 1e-05 1000
loguniform_var = init_GFP 1e-05 1000
loguniform_var = init_GFP_mRNA 1e-05 1000
loguniform_var = init_X_mRNA 1e-05 1000
loguniform_var = init_X_protein 1e-05 1000
loguniform_var = init_Y_mRNA 1e-05 1000
loguniform_var = init_Y_protein 1e-05 1000
loguniform_var = init_Z_mRNA 1e-05 1000
loguniform_var = init_Z_protein 1e-05 1000
loguniform_var = n_Hill 1e-05 1000
loguniform_var = scale 1e-05 1000
loguniform_var = sigma 1e-05 1000
loguniform_var = tau_mRNA 1e-05 1000
loguniform_var = tau_mRNA_GFP 1e-05 1000
loguniform_var = tau_prot 1e-05 1000
loguniform_var = tau_prot_GFP 1e-05 1000
loguniform_var = tps_active 1e-05 1000
loguniform_var = tps_repr 1e-05 1000
