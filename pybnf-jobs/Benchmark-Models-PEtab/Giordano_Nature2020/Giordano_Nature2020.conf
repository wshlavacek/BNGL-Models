# Imported from a PEtab v2 problem by pybnf.petab.import_job (#407).
# The PEtab *problem* (parameters/priors, observables/noise, measurements,
# conditions) is recovered exactly and round-trips through a re-export. The
# run-recipe below (job_type + algorithm settings, the per-experiment method:,
# and output/verbosity) is SUPPLIED, not recovered: PEtab is a problem spec with
# no home for the method, so it is not part of the round-trip identity.

job_type = gntr
population_size = 20
max_iterations = 500
wall_time_sim = 10
verbosity = 1
sbml_backend = bngsim
random_seed = 1
output_dir = output

edition = 2
model: model_Giordano_Nature2020.xml
objective = chi_sq
noise_model CumulativeDiagnosed = gaussian, sigma = fit sd_TotalCases
noise_model Extinct = gaussian, sigma = fit sd_Deaths
noise_model DiagnosedHealed = gaussian, sigma = fit sd_Recovered
noise_model observable_CurrentCases = gaussian, sigma = fit sd_CurrentCases
noise_model Diagnosed = gaussian, sigma = fit sd_DiagHome
noise_model Recognized = gaussian, sigma = fit sd_Hospit
noise_model Threatened = gaussian, sigma = fit sd_ICU
observable: observable_CurrentCases, formula: Threatened + (Diagnosed + Recognized)
