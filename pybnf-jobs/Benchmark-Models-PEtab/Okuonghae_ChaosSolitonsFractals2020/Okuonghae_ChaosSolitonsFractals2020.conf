# Imported from a PEtab v2 problem by pybnf.petab.import_job (#407).
# The PEtab *problem* (parameters/priors, observables/noise, measurements,
# conditions) is recovered exactly and round-trips through a re-export. The
# run-recipe below (job_type + algorithm settings, the per-experiment method:,
# and output/verbosity) is SUPPLIED, not recovered: PEtab is a problem spec with
# no home for the method, so it is not part of the round-trip identity.

job_type = cmaes
population_size = 32
max_iterations = 2000
cmaes_restarts = 12
cmaes_restart_strategy = ipop
cmaes_ipop_factor = 2.0
cmaes_stop_tol = 1e-4
wall_time_sim = 10
verbosity = 1
sbml_backend = bngsim
random_seed = 1
output_dir = output

edition = 2
model: model_Okuonghae_ChaosSolitonsFractals2020.xml
objective = chi_sq
noise_model detected_cumulative = gaussian, sigma = fit sd_Cumulative
noise_model detected = gaussian, sigma = fit sd_ActiveCases
condition: cond1, perturbations: delta = 0, eps = 0
experiment: experiment____cond1, condition: cond1, method: ode, data: experiment____cond1.exp
loguniform_var = alpha 1e-05 1000
loguniform_var = d_0 1e-05 1000
loguniform_var = d_D 1e-05 1000
loguniform_var = gamma_0 1e-05 1000
loguniform_var = gamma_a 1e-05 1000
loguniform_var = gamma_i 1e-05 1000
loguniform_var = nu 1e-05 1000
loguniform_var = psi 1e-05 1000
loguniform_var = sigma 1e-05 1000
loguniform_var = theta 1e-13 1000
loguniform_var = asymptomatic_start 1 10000
loguniform_var = symptomatic_start 1 10000
loguniform_var = exposed_start 1 1000
loguniform_var = transmission_rate_effective 1e-05 1000
loguniform_var = sd_Cumulative 1e-05 1000
loguniform_var = sd_ActiveCases 1e-05 1000
