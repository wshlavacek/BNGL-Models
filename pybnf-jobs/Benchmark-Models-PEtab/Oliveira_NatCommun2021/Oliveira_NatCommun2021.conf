# Imported from a PEtab v2 problem by pybnf.petab.import_job (#407).
# The PEtab *problem* (parameters/priors, observables/noise, measurements,
# conditions) is recovered exactly and round-trips through a re-export. The
# run-recipe below (job_type + algorithm settings, the per-experiment method:,
# and output/verbosity) is SUPPLIED, not recovered: PEtab is a problem spec with
# no home for the method, so it is not part of the round-trip identity.

job_type = gntr
population_size = 20
max_iterations = 500
wall_time_sim = 10
verbosity = 1
sbml_backend = bngsim
random_seed = 1
output_dir = output

edition = 2
model: Oliveira_NatCommun2021_model.xml
objective = sos
condition: interior, perturbations: beta_2_multiplier = 0
experiment: experiment____interior, condition: interior, method: ode, data: experiment____interior.exp
loguniform_var = beta_0 1e-08 2
loguniform_var = beta_1 1e-08 2
loguniform_var = beta_2 1e-08 2
loguniform_var = t_1 9 40
loguniform_var = t_2 40 191
loguniform_var = delta_ 1e-08 0.75
loguniform_var = h_hosp_rate 0.05 0.25
loguniform_var = gamma_h 0.0833333333 0.25
loguniform_var = gamma_u 0.0833333333 0.3333333333
loguniform_var = exposed_init_concentration 1e-12 1
loguniform_var = asymptomatic_init_concentration 1e-12 1
loguniform_var = symptomatic_init_concentration 1e-12 1
