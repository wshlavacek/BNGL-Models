# Imported from a PEtab v2 problem by pybnf.petab.import_job (#407).
# The PEtab *problem* (parameters/priors, observables/noise, measurements,
# conditions) is recovered exactly and round-trips through a re-export. The
# run-recipe below (job_type + algorithm settings, the per-experiment method:,
# and output/verbosity) is SUPPLIED, not recovered: PEtab is a problem spec with
# no home for the method, so it is not part of the round-trip identity.

job_type = gntr
population_size = 20
max_iterations = 500
wall_time_sim = 10
verbosity = 1
sbml_backend = bngsim
random_seed = 1
output_dir = output

edition = 2
model: model_Rahman_MBS2016.xml
objective = chi_sq
observable: observable_prevalence, formula: (-susceptible/(treated_weak + (treated_moderate + (treated_normal + (infected_weak + (infected_moderate + (infected_normal + susceptible)))))) + 1.0)*100.0
experiment: experiment1, method: ode, data: experiment1.exp
loguniform_var = infected_normal_transmission_rate_relative 0.1 1000
loguniform_var = infected_moderate_transmission_rate 0.0001 1
loguniform_var = infected_weak_transmission_rate_relative 0.1 1000
loguniform_var = infected_weak_treatment_rate 0.0001 1
loguniform_var = infected_normal_worsen_rate 0.0001 1
loguniform_var = infected_moderate_worsen_rate 0.0001 1
loguniform_var = treated_moderate_improve_rate 0.0001 1
loguniform_var = treated_weak_improve_rate 0.0001 1
loguniform_var = behavioural_change_rate 1e-09 1e-05
