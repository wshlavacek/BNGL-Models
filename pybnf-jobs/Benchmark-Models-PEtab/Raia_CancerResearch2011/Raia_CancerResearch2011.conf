# Imported from a PEtab v2 problem by pybnf.petab.import_job (#407).
# The PEtab *problem* (parameters/priors, observables/noise, measurements,
# conditions) is recovered exactly and round-trips through a re-export. The
# run-recipe below (job_type + algorithm settings, the per-experiment method:,
# and output/verbosity) is SUPPLIED, not recovered: PEtab is a problem spec with
# no home for the method, so it is not part of the round-trip identity.

job_type = gntr
population_size = 20
max_iterations = 500
wall_time_sim = 10
verbosity = 1
sbml_backend = bngsim
random_seed = 1
output_dir = output

edition = 2
model: model_Raia_CancerResearch2011.xml
objective = chi_sq
noise_model observable_CD274mRNA = gaussian, sigma = prediction_formula CD274mRNA*scaling_CD274mRNA*sd_CD274mRNA_rel + sd_CD274mRNA_abs
noise_model observable_IL13_cell = gaussian, sigma = prediction_formula scaling_IL13_cell*sd_IL13_cell_rel*(p_IL13_Rec_i + (p_IL13_Rec + (IL13_DecoyR + IL13_Rec))) + sd_IL13_cell_abs
noise_model observable_RecSurf = gaussian, sigma = prediction_formula sd_RecSurf_abs + sd_RecSurf_rel*(p_IL13_Rec + (IL13_Rec + Rec))
noise_model SOCS3 = gaussian, sigma = prediction_formula SOCS3*sd_SOCS3_rel + sd_SOCS3_abs
noise_model observable_SOCS3mRNA = gaussian, sigma = prediction_formula SOCS3mRNA*scaling_SOCS3mRNA*sd_SOCS3mRNA_rel + sd_SOCS3mRNA_abs
noise_model observable_pIL4Ra = gaussian, sigma = prediction_formula scaling_pIL4Ra*sd_pIL4Ra_rel*(p_IL13_Rec + p_IL13_Rec_i) + sd_pIL4Ra_abs
noise_model observable_pJAK2 = gaussian, sigma = prediction_formula pJAK2*scaling_pJAK2*sd_pJAK2_rel + sd_pJAK2_abs
noise_model pSTAT5 = gaussian, sigma = prediction_formula pSTAT5*sd_pSTAT5_rel + sd_pSTAT5_abs
observable: observable_CD274mRNA, formula: CD274mRNA*scaling_CD274mRNA
observable: observable_IL13_cell, formula: scaling_IL13_cell*(p_IL13_Rec_i + (p_IL13_Rec + (IL13_DecoyR + IL13_Rec)))
observable: observable_RecSurf, formula: IL13_Rec + Rec + p_IL13_Rec
observable: observable_SOCS3mRNA, formula: SOCS3mRNA*scaling_SOCS3mRNA
observable: observable_pIL4Ra, formula: scaling_pIL4Ra*(p_IL13_Rec + p_IL13_Rec_i)
observable: observable_pJAK2, formula: pJAK2*scaling_pJAK2
condition: model1_data1, perturbations: il13_level = 0
condition: model1_data2, perturbations: il13_level = 20
condition: model1_data3, perturbations: il13_level = 4
condition: model1_data4, perturbations: il13_level = 80
experiment: experiment____model1_data1, condition: model1_data1, method: ode, data: experiment____model1_data1.exp
experiment: experiment____model1_data2, condition: model1_data2, method: ode, data: experiment____model1_data2.exp
experiment: experiment____model1_data3, condition: model1_data3, method: ode, data: experiment____model1_data3.exp
experiment: experiment____model1_data4, condition: model1_data4, method: ode, data: experiment____model1_data4.exp
loguniform_var = CD274mRNA_production 1e-05 1000
loguniform_var = DecoyR_binding 1e-05 1000
loguniform_var = JAK2_p_inhibition 1e-05 1000
loguniform_var = JAK2_phosphorylation 1e-05 1000
loguniform_var = Kon_IL13Rec 1e-05 1000
loguniform_var = Rec_intern 1e-05 1000
loguniform_var = Rec_phosphorylation 1e-05 1000
loguniform_var = Rec_recycle 1e-05 1000
loguniform_var = SOCS3_accumulation 1e-05 1000
loguniform_var = SOCS3_degradation 1e-05 1000
loguniform_var = SOCS3_translation 1e-05 1000
loguniform_var = SOCS3mRNA_production 1e-05 1000
loguniform_var = STAT5_phosphorylation 1e-05 1000
loguniform_var = init_Rec_i 1e-05 1000
loguniform_var = pJAK2_dephosphorylation 1e-05 1000
loguniform_var = pRec_degradation 1e-05 1000
loguniform_var = pRec_intern 1e-05 1000
loguniform_var = pSTAT5_dephosphorylation 1e-05 1000
loguniform_var = scaling_CD274mRNA 1e-05 1000
loguniform_var = scaling_IL13_cell 1e-05 1000
loguniform_var = scaling_SOCS3mRNA 1e-05 1000
loguniform_var = scaling_pIL4Ra 1e-05 1000
loguniform_var = scaling_pJAK2 1e-05 1000
loguniform_var = sd_SOCS3mRNA_abs 1e-05 1000
loguniform_var = sd_RecSurf_abs 1e-05 1000
loguniform_var = sd_pSTAT5_rel 1e-05 1000
loguniform_var = sd_IL13_cell_rel 1e-05 1000
loguniform_var = sd_RecSurf_rel 1e-05 1000
loguniform_var = sd_pJAK2_abs 1e-05 1000
loguniform_var = sd_pIL4Ra_abs 1e-05 1000
loguniform_var = sd_CD274mRNA_rel 1e-05 1000
loguniform_var = sd_SOCS3mRNA_rel 1e-05 1000
loguniform_var = sd_pIL4Ra_rel 1e-05 1000
loguniform_var = sd_IL13_cell_abs 1e-05 1000
loguniform_var = sd_SOCS3_rel 1e-05 1000
loguniform_var = sd_CD274mRNA_abs 1e-05 1000
loguniform_var = sd_pSTAT5_abs 1e-05 1000
loguniform_var = sd_SOCS3_abs 1e-05 1000
loguniform_var = sd_pJAK2_rel 1e-05 1000
