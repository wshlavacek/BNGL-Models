# Imported from a PEtab v2 problem by pybnf.petab.import_job (#407).
# The PEtab *problem* (parameters/priors, observables/noise, measurements,
# conditions) is recovered exactly and round-trips through a re-export. The
# run-recipe below (job_type + algorithm settings, the per-experiment method:,
# and output/verbosity) is SUPPLIED, not recovered: PEtab is a problem spec with
# no home for the method, so it is not part of the round-trip identity.

job_type = cmaes
population_size = 32
max_iterations = 2000
cmaes_restarts = 12
cmaes_restart_strategy = ipop
cmaes_ipop_factor = 2.0
cmaes_stop_tol = 1e-4
wall_time_sim = 10
verbosity = 1
sbml_backend = bngsim
random_seed = 1
output_dir = output

edition = 2
model: model_Smith_BMCSystBiol2013.xml
objective = sos
observable: PI3K_activity__2B, formula: sc_PI3K * IRS1_TyrP_PI3K
observable: Glucose_uptake__2B, formula: sc_GLUT_2B * cellsurface_GLUT4
observable: Cell_Bound_Ins__2B, formula: sc_BINS*(Ins_InR + (Ins_2_InR_P + Ins_InR_P))
observable: IRSYp__2C, formula: sc_PIRS * IRS1_TyrP
observable: PTP_activ__2D, formula: PTP1B*sc_PTP/(PTP1B + PTP1B_ox)
observable: Glucose_uptake__120__3B, formula: sc_GLUT_3B_120 * cellsurface_GLUT4
observable: Glucose_uptake__240__3B, formula: sc_GLUT_3B_240 * cellsurface_GLUT4
observable: MnSOD_fold_induction__3C, formula: sc_SOD2 * cytoplasm_SOD2
