# Imported from a PEtab v2 problem by pybnf.petab.import_job (#407).
# The PEtab *problem* (parameters/priors, observables/noise, measurements,
# conditions) is recovered exactly and round-trips through a re-export. The
# run-recipe below (job_type + algorithm settings, the per-experiment method:,
# and output/verbosity) is SUPPLIED, not recovered: PEtab is a problem spec with
# no home for the method, so it is not part of the round-trip identity.

output_dir=output
edition = 2

model: model_Sneyd_PNAS2002.xml
job_type = gntr
noise_model = gaussian, sigma = fit sigma
observable: open_probability, formula: (0.9 * IPR_A + 0.1 * IPR_O)^4

condition: Ca_dose_response__1, perturbations: IP3 = 10, Ca = 0.1
condition: Ca_dose_response__2, perturbations: IP3 = 10, Ca = 0.2
condition: Ca_dose_response__3, perturbations: IP3 = 10, Ca = 0.4
condition: Ca_dose_response__4, perturbations: IP3 = 10, Ca = 1
condition: Ca_dose_response__5, perturbations: IP3 = 10, Ca = 3
condition: Ca_dose_response__6, perturbations: IP3 = 10, Ca = 10
condition: IP3_dose_response__1, perturbations: IP3 = 3, Ca = 0.4
condition: IP3_dose_response__2, perturbations: IP3 = 5, Ca = 0.4
condition: IP3_dose_response__3, perturbations: IP3 = 10, Ca = 0.4
experiment: experiment____Ca_dose_response__1, condition: Ca_dose_response__1, method: ode, data: experiment____Ca_dose_response__1.exp
experiment: experiment____Ca_dose_response__2, condition: Ca_dose_response__2, method: ode, data: experiment____Ca_dose_response__2.exp
experiment: experiment____Ca_dose_response__3, condition: Ca_dose_response__3, method: ode, data: experiment____Ca_dose_response__3.exp
experiment: experiment____Ca_dose_response__4, condition: Ca_dose_response__4, method: ode, data: experiment____Ca_dose_response__4.exp
experiment: experiment____Ca_dose_response__5, condition: Ca_dose_response__5, method: ode, data: experiment____Ca_dose_response__5.exp
experiment: experiment____Ca_dose_response__6, condition: Ca_dose_response__6, method: ode, data: experiment____Ca_dose_response__6.exp
experiment: experiment____IP3_dose_response__1, condition: IP3_dose_response__1, method: ode, data: experiment____IP3_dose_response__1.exp
experiment: experiment____IP3_dose_response__2, condition: IP3_dose_response__2, method: ode, data: experiment____IP3_dose_response__2.exp
experiment: experiment____IP3_dose_response__3, condition: IP3_dose_response__3, method: ode, data: experiment____IP3_dose_response__3.exp

loguniform_var = k1 0.001 100000
loguniform_var = k2 0.001 100000
loguniform_var = k3 0.001 100000
loguniform_var = k4 0.001 100000
loguniform_var = k_1 0.001 100000
loguniform_var = k_2 0.001 100000
loguniform_var = k_3 0.001 100000
loguniform_var = k_4 0.001 100000
loguniform_var = l2 0.001 100000
loguniform_var = l4 0.001 100000
loguniform_var = l6 0.001 100000
loguniform_var = l_2 0.001 100000
loguniform_var = l_4 0.001 100000
loguniform_var = l_6 0.001 100000
loguniform_var = sigma 1e-05 1000

population_size = 10
max_iterations = 300
verbosity = 1
sbml_backend = bngsim
random_seed = 1
