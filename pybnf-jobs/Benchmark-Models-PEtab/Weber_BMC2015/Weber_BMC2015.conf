# Imported from a PEtab v2 problem by pybnf.petab.import_job (#407).
# The PEtab *problem* (parameters/priors, observables/noise, measurements,
# conditions) is recovered exactly and round-trips through a re-export. The
# run-recipe below (job_type + algorithm settings, the per-experiment method:,
# and output/verbosity) is SUPPLIED, not recovered: PEtab is a problem spec with
# no home for the method, so it is not part of the round-trip identity.

job_type = gntr
population_size = 20
max_iterations = 500
wall_time_sim = 10
verbosity = 1
sbml_backend = bngsim
random_seed = 1
output_dir = output

edition = 2
model: model_Weber_BMC2015.xml
objective = chi_sq
noise_model yCERTpRN24 = gaussian, sigma = fit std_yCERTpRN24
noise_model yCERTt = gaussian, sigma = fix_at 244727220.419
noise_model yPI4K3BpRN24 = gaussian, sigma = fit std_yPI4K3BpRN24
noise_model yPI4K3Bt = gaussian, sigma = fix_at 887676.131
noise_model yPKDpN0 = gaussian, sigma = fit std_yPKDpN0
noise_model yPKDpN24 = gaussian, sigma = fit std_yPKDpN24
noise_model yPKDpN25 = gaussian, sigma = fit std_yPKDpN25
noise_model yPKDt = gaussian, sigma = fix_at 1910527.835
observable: yCERTpRN24, formula: CERT*scale_yCERTpRN24/(CERTTGNa + (CERT + CERTERa))
observable: yCERTt, formula: CERT + CERTERa + CERTTGNa
observable: yPI4K3BpRN24, formula: PI4K3Ba*scale_yPI4K3BpRN24/(PI4K3B + PI4K3Ba)
observable: yPI4K3Bt, formula: PI4K3B + PI4K3Ba
observable: yPKDpN0, formula: PKDDAGa*scale_yPKDpN0
observable: yPKDpN24, formula: PKDDAGa*scale_yPKDpN24
observable: yPKDpN25, formula: PKDDAGa*scale_yPKDpN25
observable: yPKDt, formula: PKD + PKDDAGa
condition: model1_data1, perturbations: Ect_Expr_CERT_flag = 0, Ect_Expr_PI4K3beta_flag = 0, PdBu_dose = 0, PdBu_time = 0, kb_NB142_70_dose = 0, kb_NB142_70_time = 0
condition: model1_data2, perturbations: Ect_Expr_CERT_flag = 0, Ect_Expr_PI4K3beta_flag = 1, PdBu_dose = 1, PdBu_time = 24, kb_NB142_70_dose = 0, kb_NB142_70_time = 0
condition: model1_data3, perturbations: Ect_Expr_CERT_flag = 1, Ect_Expr_PI4K3beta_flag = 0, PdBu_dose = 0, PdBu_time = 0, kb_NB142_70_dose = 10, kb_NB142_70_time = 24
experiment: experiment__model1_data1___model1_data2, preequilibrate: model1_data1, condition: model1_data2, method: ode, data: experiment__model1_data1___model1_data2.exp, experiment__model1_data1___model1_data2_rep2.exp, experiment__model1_data1___model1_data2_rep3.exp, experiment__model1_data1___model1_data2_rep4.exp, experiment__model1_data1___model1_data2_rep5.exp
experiment: experiment__model1_data1___model1_data3, preequilibrate: model1_data1, condition: model1_data3, method: ode, data: experiment__model1_data1___model1_data3.exp, experiment__model1_data1___model1_data3_rep2.exp, experiment__model1_data1___model1_data3_rep3.exp, experiment__model1_data1___model1_data3_rep4.exp
loguniform_var = a11 0.0001 100
loguniform_var = a12 0.0001 100
loguniform_var = a21 0.0001 100
loguniform_var = a22 0.0001 100
loguniform_var = a31 0.0001 100
