# Imported from a PEtab v2 problem by pybnf.petab.import_job (#407).
# The PEtab *problem* (parameters/priors, observables/noise, measurements,
# conditions) is recovered exactly and round-trips through a re-export. The
# run-recipe below (job_type + algorithm settings, the per-experiment method:,
# and output/verbosity) is SUPPLIED, not recovered: PEtab is a problem spec with
# no home for the method, so it is not part of the round-trip identity.

job_type = gntr
population_size = 20
max_iterations = 500
wall_time_sim = 10
verbosity = 1
sbml_backend = bngsim
random_seed = 1
output_dir = output

edition = 2
model: model_Zhao_QuantBiol2020.xml
objective = chi_sq
noise_model Confirmed_Infected = gaussian, sigma = formula noiseParameter1_observable_confirmed_infected
noise_model Susceptible = gaussian, sigma = read_exp_file _SD
noise_model Unquarantined_Infected = gaussian, sigma = read_exp_file _SD
noise_model Quarantined_Infected = gaussian, sigma = read_exp_file _SD
noise_model observable_cumulative_infected = gaussian, sigma = read_exp_file _SD
observable: observable_cumulative_infected, formula: Unquarantined_Infected + (Confirmed_Infected + Quarantined_Infected)
condition: model1_Wuhan_Stage_I, perturbations: Trigger_Stage_I = 1, Trigger_Stage_II = 0, Trigger_Stage_III = 0, Trigger_Wuhan = 1, Trigger_Hubei = 0, Trigger_China = 0
condition: model1_Wuhan_Stage_II, perturbations: Trigger_Stage_I = 0, Trigger_Stage_II = 1, Trigger_Stage_III = 0, Trigger_Wuhan = 1, Trigger_Hubei = 0, Trigger_China = 0
condition: model1_Wuhan_Stage_III, perturbations: Trigger_Stage_I = 0, Trigger_Stage_II = 0, Trigger_Stage_III = 1, Trigger_Wuhan = 1, Trigger_Hubei = 0, Trigger_China = 0
condition: model1_Hubei_Stage_I, perturbations: Trigger_Stage_I = 1, Trigger_Stage_II = 0, Trigger_Stage_III = 0, Trigger_Wuhan = 0, Trigger_Hubei = 1, Trigger_China = 0
condition: model1_Hubei_Stage_II, perturbations: Trigger_Stage_I = 0, Trigger_Stage_II = 1, Trigger_Stage_III = 0, Trigger_Wuhan = 0, Trigger_Hubei = 1, Trigger_China = 0
condition: model1_China_Stage_I, perturbations: Trigger_Stage_I = 1, Trigger_Stage_II = 0, Trigger_Stage_III = 0, Trigger_Wuhan = 0, Trigger_Hubei = 0, Trigger_China = 1
condition: model1_China_Stage_II, perturbations: Trigger_Stage_I = 0, Trigger_Stage_II = 1, Trigger_Stage_III = 0, Trigger_Wuhan = 0, Trigger_Hubei = 0, Trigger_China = 1
experiment: experiment____model1_Wuhan_Stage_I, condition: model1_Wuhan_Stage_I, method: ode, measurement_params: experiment____model1_Wuhan_Stage_I_measparams.tsv, data: experiment____model1_Wuhan_Stage_I.exp
experiment: experiment____model1_Wuhan_Stage_II, condition: model1_Wuhan_Stage_II, method: ode, measurement_params: experiment____model1_Wuhan_Stage_II_measparams.tsv, data: experiment____model1_Wuhan_Stage_II.exp
experiment: experiment____model1_Wuhan_Stage_III, condition: model1_Wuhan_Stage_III, method: ode, measurement_params: experiment____model1_Wuhan_Stage_III_measparams.tsv, data: experiment____model1_Wuhan_Stage_III.exp
experiment: experiment____model1_Hubei_Stage_I, condition: model1_Hubei_Stage_I, method: ode, measurement_params: experiment____model1_Hubei_Stage_I_measparams.tsv, data: experiment____model1_Hubei_Stage_I.exp
experiment: experiment____model1_Hubei_Stage_II, condition: model1_Hubei_Stage_II, method: ode, measurement_params: experiment____model1_Hubei_Stage_II_measparams.tsv, data: experiment____model1_Hubei_Stage_II.exp
experiment: experiment____model1_China_Stage_I, condition: model1_China_Stage_I, method: ode, measurement_params: experiment____model1_China_Stage_I_measparams.tsv, data: experiment____model1_China_Stage_I.exp
experiment: experiment____model1_China_Stage_II, condition: model1_China_Stage_II, method: ode, measurement_params: experiment____model1_China_Stage_II_measparams.tsv, data: experiment____model1_China_Stage_II.exp
uniform_var = R_Stage_I_Wuhan 0.001 100
