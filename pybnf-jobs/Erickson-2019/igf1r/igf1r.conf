# IGF1 / IGF1R receptor activation -- deterministic ODE, competition dose-response.
# Fit the two site affinities + cross-site cooperativity to the Kiselyov Fig-5B competition
# curve. NATIVE-ONLY (not PEtab-exportable) because of `normalization = init`.
#
# Real-world PyBNF edition-2 fitting job. The FITTING PROBLEM (this 3-parameter K1/K2/K1prime
# fit to Fig 5B, normalized to the no-competitor baseline) is from:
#   Erickson KE, Rukhlenko OS, Shahinuzzaman M, Slavkova KP, Kholodenko BN, Hlavacek WS, et al.
#   "Modeling cell line-specific recruitment of signaling proteins to the insulin-like growth
#   factor 1 receptor." PLoS Comput Biol 2019; 15(1):e1006706.  PMCID: PMC6353226
#   DOI: 10.1371/journal.pcbi.1006706   (parameter estimation performed with BioNetFit 1)
# The underlying model + data are from:
#   Kiselyov VV, Versteyhe S, Gauguin L, De Meyts P. "Harmonic oscillator model of the insulin
#   and IGF1 receptors' allosteric binding and activation." Mol Syst Biol 2009; 5:243.
#   PMID: 19225456  DOI: 10.1038/msb.2008.78
#   (F5B.exp: the Fig-5B radioligand competition curve, IGF1_hot_bound vs. cold-ligand dose,
#    with per-point SD.  PyBNF 2019 corpus problem 15-igf1r, Mitra et al., iScience 2019 --
#    which fits the fuller 7-rate-constant model; this example is the distilled 3-affinity fit.)
#
# A radioligand competition assay: labelled ("hot") IGF1 is held fixed at 7 pM (= 8852 copies/
# cell, the model's seed default) while unlabelled ("cold") IGF1 is titrated; the readout is
# hot-ligand binding vs. cold dose. Expressed as a parameter scan over IGF1_cold_conc (the
# data's independent-variable column), each dose integrated to steady state (t_end = 14400 s).
#
# NATIVE-ONLY (NOT PEtab-exportable): `normalization = init` normalizes the simulated
# IGF1_hot_bound to its no-competitor (first-scan-point) value, a PyBNF-native transform with no
# PEtab v2 shape (export.py:798-827). export_job raises NotImplementedError -- expected, not a
# defect. See skills/curate-pybnf-job/references/petab-compliance.md. (The data are already
# reported relative to the no-competitor baseline; hence the init normalization.)
#
# NOTE on nominals: the model's nominal K1 = 9.2 nM and K2 = 483 nM ARE the Kiselyov 2009
#   Table-1 Site-1 / Site-2 KDs (a meaningful published starting point, not an arbitrary GenFit
#   seed); a bounded fit stays in their neighborhood. They are used for the reproduction figure
#   (see README.md); the published fit used scatter search + Simplex refinement on a cluster.
#
# Run (with BNGPATH set, from this folder):
#   cd pybnf-jobs/Erickson-2019/igf1r && pybnf -c igf1r.conf

output_dir = output

edition = 2
bngl_backend = bngsim

model: igf1r.bngl

#######################
### Fitting Options ###
#######################

# Scatter Search (as the classic conf).
job_type = ss

# F5B.exp carries per-point _SD columns -> chi_sq.
objective = chi_sq

# Normalize the simulated observable to its initial (no-competitor) value before comparison --
# the data are reported relative to the no-competitor baseline. NATIVE-ONLY (see banner).
normalization = init

max_iterations = 50
population_size = 12
verbosity = 2

# Refine the best fit with a local Simplex search (as the classic conf).
refine = 1
simplex_max_iterations = 20

###################
### Experiment ###
###################

# Dose-response: a parameter scan over IGF1_cold_conc (the data's independent-variable column),
# each dose integrated to t_end = 14400 s. Observable IGF1_hot_bound.
experiment: F5B, type: parameter_scan, t_end: 14400, data: F5B.exp

##################
### Parameters ###
##################

# The two site affinities (M) and the cross-site cooperativity (dimensionless), bound to the
# model ids BY NAME (ADR-0034, no __FREE alias), on a random log scale (as the classic conf).
loguniform_var = K1 1e-15 1
loguniform_var = K2 1e-15 1
loguniform_var = K1prime 1e-15 1
