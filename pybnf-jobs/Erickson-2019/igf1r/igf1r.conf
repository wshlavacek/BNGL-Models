# IGF1 / IGF1R harmonic-oscillator binding fit -- Erickson 2019's ACTUAL published fit, on the
# PyBNF EDITION-2 (new-era) surface. This is the PRIMARY igf1r job; igf1r_legacy.conf is the
# SI-verbatim edition-1 twin (provenance + BNG2.pl reproduction oracle).
#
# Fit SEVEN rate constants to THREE Kiselyov-2009 datasets simultaneously (competition Fig 5B +
# dissociation Fig 5D at 20 and 60 min); the eighth constant, a2prime, is fixed in the model by
# the detailed-balance constraint (Erickson Eq 1). Best-fit target = Erickson 2019 Table 1.
#
#   Erickson KE, ..., Hlavacek WS, et al. PLoS Comput Biol 2019; 15(1):e1006706. PMC6353226.
#   Model + Fig 5B/5D data: Kiselyov VV, ..., De Meyts P. Mol Syst Biol 2009; 5:243. PMID 19225456.
#
# WHY THIS RUNS IN EDITION-2 (issue lanl/PyBNF#474): the two F5D experiments are a stateful
# 2 h-preincubate -> wash -> cold-competition-scan protocol. Edition-2 now expresses it declaratively
#   * `preequilibrate: incubate` + `equil_t_end: 7200`  -- the fixed-time pre-incubation at 24 pM hot;
#   * `condition: wash`  -- a SPECIES setConcentration intervention (free hot -> 0; the competitor is
#     re-asserted so it tracks the scanned dose);
#   * `type: parameter_scan`  -- the measured dose-response, each dose reset to the carried post-wash
#     state (bngsim's native carried-state scan, needs bngsim >= 0.11.34 / lanl/bngsim#11).
# So there is NO in-model `begin actions` block -- the whole protocol is synthesized from the lines
# below. (The legacy job kept the actions in igf1r_legacy.bngl and rode the datasets on the model= line.)
#
# Run (from this folder):
#   pybnf -c igf1r.conf

output_dir=output

# Edition-2 config language (PEtab-aligned experiment:/condition:/data:) + the bngsim backend
# (edition >= 2 => bngsim; the carried-state parameter_scan needs bngsim >= 0.11.34).
edition = 2
bngl_backend = bngsim

# The binding model, no actions block (the simulation is synthesized from the experiments below).
model: igf1r.bngl

#######################
### Fitting Options ###
#######################

# Scatter search + Simplex refinement, as the authors' BioNetFit run (genetic algorithm there).
job_type = ss

# objfunc=2 in BioNetFit == weighted least squares by the _SD column == chi_sq.
objective = chi_sq

# divide_by_init=1 in BioNetFit == normalization=init: divide each simulated observable column by
# its value at the first scan row before comparison to the (already-normalized) data. (Whole-fit
# form; a PyBNF prediction transform with no PEtab v2 shape -- this job is native-only for now.)
normalization = init

max_iterations = 50
population_size = 20
refine = 1
simplex_max_iterations = 30
verbosity = 1

##################
### Conditions ###
##################

# The F5D pre-incubation: 24 pM hot IGF1 (24e-12 * NA * Vecf = 30350 copies) loaded onto the
# receptors. Set as a species amount so it is an explicit mid-protocol state (the model default is
# 7 pM, the F5B condition).
condition: incubate, perturbations: "IGF1(ds,hs,label~hot)" = 30350

# The F5D wash (the intervention between pre-incubation and the measured scan): zero the FREE hot
# ligand (bound hot remains on the receptors -- what dissociates), and (re-)assert the cold
# competitor as a function of the scanned parameter IGF1_cold_conc so it titrates per dose.
condition: wash, perturbations: "IGF1(ds,hs,label~hot)" = 0, "IGF1(ds,hs,label~cold)" = IGF1_cold_conc*(NA*Vecf)

###################
### Experiments ###
###################

# F5B: 4 h steady-state competition at the model-default 7 pM hot; a plain dose-response scan over
# the cold dose (the data's independent-variable column IGF1_cold_conc), read at t_end = 14400 s.
experiment: F5B, type: parameter_scan, t_end: 14400, data: F5B.exp

# F5D_20min / F5D_60min: 2 h pre-incubation at 24 pM hot (preequilibrate: incubate, fixed
# equil_t_end: 7200) -> wash -> cold-competition dose-response, each dose reset to the post-wash
# state, read at 20 min (1200 s) / 60 min (3600 s).
experiment: F5D_20min, preequilibrate: incubate, condition: wash, equil_t_end: 7200, type: parameter_scan, t_end: 1200, data: F5D_20min.exp
experiment: F5D_60min, preequilibrate: incubate, condition: wash, equil_t_end: 7200, type: parameter_scan, t_end: 3600, data: F5D_60min.exp

##################
### Parameters ###
##################

# Seven free rate constants, bound to model ids BY NAME (ADR-0034); bounds verbatim from the
# authors' SI IGF1R_fit.conf. a1prime = kcr; a2prime is derived in-model by detailed balance.
loguniform_var = a1_perMpers 1e5 1e6
loguniform_var = d1 1e-3 1e-1
loguniform_var = a2_perMpers 1e3 1e5
loguniform_var = d2 1e-5 1e-3
loguniform_var = kcr 1e-4 1e-1
loguniform_var = d1prime 1e-7 1e-3
loguniform_var = d2prime 1e-4 1e-1
