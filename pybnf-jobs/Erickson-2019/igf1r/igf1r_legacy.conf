# LEGACY (edition-1) -- SI-verbatim provenance + BNG2.pl reproduction oracle. The PRIMARY
# edition-2 job is igf1r.conf / igf1r.bngl (issue lanl/PyBNF#474). Kept, clearly labeled,
# because it is byte-identical to the paper's SI file that produced Table 1 (see VALIDATION.md).
# IGF1 / IGF1R harmonic-oscillator binding fit -- Erickson 2019's ACTUAL published fit.
# Fit SEVEN rate constants to THREE Kiselyov-2009 datasets simultaneously (competition Fig 5B +
# dissociation Fig 5D at 20 and 60 min); the eighth constant, a2prime, is fixed in the model by
# the detailed-balance constraint (Erickson Eq 1). Best-fit target = Erickson 2019 Table 1.
#
#   Erickson KE, ..., Hlavacek WS, et al. PLoS Comput Biol 2019; 15(1):e1006706. PMC6353226.
#   Model + Fig 5B/5D data: Kiselyov VV, ..., De Meyts P. Mol Syst Biol 2009; 5:243. PMID 19225456.
#
# LEGACY (edition-1) PyBNF JOB. This job is NOT edition-2: the F5D experiments need a stateful
# 2 h-preincubate -> wash -> cold-competition-scan protocol that PyBNF's `experiment:` directives
# cannot express (config.py:1487 forbids parameter_scan + pre-equilibration). So the simulation
# actions live in igf1r_legacy.bngl and the three datasets ride the `model=` line (colon-separated); the
# parameter_scan suffixes (F5B / F5D_20min / F5D_60min) match the three .exp files. There is no
# `edition`/`bngl_backend` line -> PyBNF defaults to legacy mode + the classic BNG2.pl backend
# (BNGPATH). This mirrors the authors' SI BioNetFit conf ("S2 .../IGF1R_fit.conf"), translated to
# PyBNF keys: objfunc=2 -> objfunc=chi_sq (weighted LS by _SD); divide_by_init=1 -> normalization
# =init; loguniform_var bounds kept verbatim. The free-parameter tokens use PyBNF's `X__FREE`
# spelling (BioNetFit wrote `X__FREE__`).
#
# NATIVE-ONLY (not PEtab-exportable): normalization=init + in-model parameter_scan protocol.
#
# Run (with BNGPATH set, from this folder):
#   cd pybnf-jobs/Erickson-2019/igf1r && pybnf -c igf1r_legacy.conf

output_dir=output

# The binding model + the THREE fit datasets (colon-separated; suffixes match the scan suffixes).
model=igf1r_legacy.bngl : F5B.exp, F5D_20min.exp, F5D_60min.exp

#######################
### Fitting Options ###
#######################

# Scatter search + Simplex refinement, as the authors' BioNetFit run (genetic algorithm there).
fit_type=ss

# objfunc=2 in BioNetFit == weighted least squares by the _SD column == PyBNF chi_sq.
objfunc=chi_sq

# divide_by_init=1 in BioNetFit == normalization=init: divide each simulated observable column by
# its value at the first scan row before comparison to the (already-normalized) data.
normalization=init

max_iterations=50
population_size=20
refine=1
simplex_max_iterations=30
verbosity=1

##################
### Parameters ###
##################

# Seven free rate constants -- bounds verbatim from the authors' SI IGF1R_fit.conf.
#   a1_perMpers,a2_perMpers /M/s ; d1,d2,d1prime,d2prime,kcr /s. a1prime=kcr; a2prime by det. bal.
loguniform_var=a1_perMpers__FREE 1e5 1e6
loguniform_var=d1__FREE 1e-3 1e-1
loguniform_var=a2_perMpers__FREE 1e3 1e5
loguniform_var=d2__FREE 1e-5 1e-3
loguniform_var=kcr__FREE 1e-4 1e-1
loguniform_var=d1prime__FREE 1e-7 1e-3
loguniform_var=d2prime__FREE 1e-4 1e-1
