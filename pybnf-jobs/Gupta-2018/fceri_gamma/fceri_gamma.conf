# FceRI (IgE receptor) gamma-chain signaling -- STOCHASTIC (Gillespie SSA), parameter recovery.
# Recover 20 rate/probability constants from SYNTHETIC data. PEtab-v2-exportable.
#
# Real-world PyBNF edition-2 fitting job. The benchmark model is from:
#   Gupta A, Mendes P. "An Overview of Network-Based and -Free Approaches for Stochastic
#   Simulation of Biochemical Systems." Computation 2018; 6(1):9.
#   DOI: 10.3390/computation6010009
# As a fitting problem, SYNTHETIC data (fceri_gamma2.exp) were generated at the study's
# ground-truth parameters (fceri_gamma2_ground_truth.bngl) and the fit tries to RECOVER them.
# (Part of the PyBNF 2019 paper corpus, Mitra et al., iScience 2019.)
#
# The network is expanded ONCE by BNG2.pl -- ~58,000 reactions, generated under the model's
# retained generate_network({max_iter=>100}) directive -- and every simulation is a Gillespie
# SSA run (method: ssa); the deterministic ODE path would miss the discrete, noisy dynamics of
# the small molecule counts (Lig 6000, Rec 400, Lyn 28, Syk 400). smoothing averages replicate
# SSA trajectories per parameter set to give the optimizer a less noisy objective.
#
# PEtab-EXPORTABLE (sos objective, plain-name observables, no normalization/BPSL): verify with
#   scripts/petab_roundtrip.py --job-type ss --method ssa (export -> lint -> import).
#
# HEAVY / cluster-scale: expanding the ~58k-reaction network (minutes) and then running SSA on it
#   -- 12 population x 50 iterations x 3 replicates -- is a cluster job. A single build + a few
#   SSA runs at the ground-truth parameters (the reproduction) is workstation-feasible; the tier-1
#   parse + PEtab round-trip are backend-free. Mark heavy=True in the manifest.
#
# Run (with BNGPATH set, from this folder):
#   cd pybnf-jobs/Gupta-2018/fceri_gamma && pybnf -c fceri_gamma.conf   # cluster-scale; see above

output_dir = output

edition = 2
bngl_backend = bngsim

model: fceri_gamma2.bngl

#######################
### General Options ###
#######################

delete_old_files = 1
wall_time_sim = 3600        # SSA on the ~58k-reaction network can be slow per parameter set

#######################
### Fitting Options ###
#######################

# Scatter Search (as the classic conf).
job_type = ss

# Synthetic data carry no _SD columns -> sum of squares.
objective = sos

max_iterations = 50
population_size = 12
verbosity = 2

# Average 3 replicate SSA trajectories per parameter set to smooth the stochastic objective.
smoothing = 3

# Refine the best fit with a local Simplex search (as the classic conf).
refine = 1
simplex_max_iterations = 20

###################
### Experiment ###
###################

# One stochastic experiment: the network is simulated with the Gillespie SSA (method: ssa) on the
# data's time grid. fceri_gamma2.exp's columns (LynFree, RecMon, RecPbeta, RecPgamma, RecSyk,
# RecSykPS) ARE the model observable names.
experiment: fceri_gamma2, method: ssa, data: fceri_gamma2.exp

##################
### Parameters ###
##################

# The 20 free rate/probability constants, bound to the model ids BY NAME (ADR-0034, no __FREE
# alias), on random log scales (as the classic conf). (km1/km2 are fixed at 0, not fit.)
# Rate constants:
loguniform_var = kp1 1e-6 1e2
loguniform_var = kp2 1e-6 1e2
loguniform_var = kpL 1e-6 1e2
loguniform_var = kmL 1e-6 1e2
loguniform_var = kpLs 1e-6 1e2
loguniform_var = kmLs 1e-6 1e2
loguniform_var = kpS 1e-6 1e2
loguniform_var = kmS 1e-6 1e2
loguniform_var = kpSs 1e-6 1e2
loguniform_var = kmSs 1e-6 1e2
# Phosphorylation/dephosphorylation constants:
loguniform_var = pLb 1e-4 1e4
loguniform_var = pLbs 1e-4 1e4
loguniform_var = pLg 1e-4 1e4
loguniform_var = pLgs 1e-4 1e4
loguniform_var = pLS 1e-4 1e4
loguniform_var = pLSs 1e-4 1e4
loguniform_var = pSS 1e-4 1e4
loguniform_var = pSSs 1e-4 1e4
loguniform_var = dm 1e-4 1e4
loguniform_var = dc 1e-4 1e4
