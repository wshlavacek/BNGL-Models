# Reduced 6-variable NF-kB model (Jaruszewicz-Blonska et al. 2023) fit to the original
# Lipniacki-2004 model -- COMBINATION experiment (Fig 2, S1 Table). Edition-2 PyBNF `de` fit.
#
# Source paper:
#   Jaruszewicz-Blonska J, Kosiuk I, Prus W, Lipniacki T. "A plausible identifiable model
#   of the canonical NF-kB signaling pathway." PLoS ONE 2023; 18(6): e0286416.
#   DOI 10.1371/journal.pone.0286416.
#
# WHAT IS FIT: the 13 reduced-model parameters (Table 1) are recovered by fitting the reduced model
#   to reproduce the ORIGINAL 15-variable Lipniacki-2004 model across the combination experiment --
#   6 TNF protocols (tonic + 5 pulsatile) x {WT, A20KO}, 914 independent data points (S1 Table). This
#   is the paper's headline "refitting the reduced model to the original one" (Fig 2), done with
#   PyBioNetFit. Ground-truth-recovery job: "the paper's result" = Table 1; Gate 3b recovers it.
#   Gate 3a (reduced @ Table 1) reproduces the paper's reported AMD*_WT=1.29 / AMD*_A20KO=1.16.
#
# Measured (in silico) variables (S1 Table): IKKa, nuclear NF-kB, A20, total IkBa protein
#   IkBa* (= IkBa + 1 - NFkB_n), IkBa mRNA. WT = 5 observables; A20KO = 4 (A20 excluded).
#
# OBJECTIVE / NORMALIZATION -- the paper's EXACT Eq-7 objective (lanl/PyBNF#479, ADR-0066):
#   The paper minimizes the sum of squared LOG-differences of geometric-mean-normalized
#   trajectories with a rho=0.03*max measurement floor (Methods). Reproduced EXACTLY:
#     noise_model = lognormal, sigma = fix_at 1   -> Gaussian residual on log10 (fixed unit sigma)
#                                                    = the paper's squared-log objective
#     normalization <obs> = floor 0.03, scale     -> floor: x' = x + 0.03*max(x) (paper's rho floor);
#                                                    scale: per-series analytic optimal scale =
#                                                    geomean(data)/geomean(sim) for the log family
#                                                    = the paper's ÷geomean.
#   floor AND scale are applied SYMMETRICALLY to the simulated and the experimental column, so the
#   12 .exp ship RAW original-model output (no floor, no peak, no geomean, no _SD). See VALIDATION.md.
#
# PROTOCOL delivery: 12 per-protocol/genotype model files (generated from reduced_combination.bngl
#   by validation/gen_combination_models.py) with the TNF ON windows baked in; A20KO files drop the
#   A20-synthesis rule. They are joined in ONE multi-model fit sharing the 13 free parameters -- this
#   is required because the bngsim backend can perturb only FREE parameters via `condition:`, and the
#   TNF window parameters are not fit. Each experiment binds its model with `model:` and its .exp.
#
# Run (with BNGPATH set, from this folder):
#   cd pybnf-jobs/Jaruszewicz-Blonska-2023/reduced_combination && pybnf -c reduced_combination.conf

output_dir = output

edition = 2
bngl_backend = bngsim

# 12 per-protocol/genotype models (windows baked; A20KO = A20-synthesis rule removed), shared params.
model: reduced_combination_continuous_wt.bngl
model: reduced_combination_continuous_a20ko.bngl
model: reduced_combination_pulse5_60_wt.bngl
model: reduced_combination_pulse5_60_a20ko.bngl
model: reduced_combination_pulse5_100_wt.bngl
model: reduced_combination_pulse5_100_a20ko.bngl
model: reduced_combination_pulse5_200_wt.bngl
model: reduced_combination_pulse5_200_a20ko.bngl
model: reduced_combination_pulse22_5_wt.bngl
model: reduced_combination_pulse22_5_a20ko.bngl
model: reduced_combination_pulse45_wt.bngl
model: reduced_combination_pulse45_a20ko.bngl

#######################
### General Options ###
#######################

delete_old_files = 1
verbosity = 2
wall_time_sim = 30
max_failed_simulations = 8000

#######################
### Fitting Options ###
#######################

job_type = de

# The paper's EXACT Eq-7 objective (lanl/PyBNF#479): fixed-sigma log-normal (Gaussian residual on
# log10) = the paper's squared-log objective; floor + per-series analytic scale reproduce the paper's
# rho=0.03 floor and geometric-mean normalization, applied symmetrically to sim and data. The 12 .exp
# targets are RAW original-model output.
noise_model = lognormal, sigma = fix_at 1
normalization IKK_a     = floor 0.03, scale
normalization NFkB_n    = floor 0.03, scale
normalization A20       = floor 0.03, scale
normalization IkBa_star = floor 0.03, scale
normalization tIkBa     = floor 0.03, scale

population_size = 100
max_iterations = 150
refine = 1
random_seed = 1

###################
### Experiments ###
###################
# Each experiment binds its per-protocol/genotype model (model:) and its S1-Table target (data:).
# 6 protocols x {WT, A20KO} = 12 experiments = 914 independent data points, fit jointly.
experiment: cont_wt,  model: reduced_combination_continuous_wt.bngl,   data: reduced_combination_continuous_wt.exp
experiment: cont_ko,  model: reduced_combination_continuous_a20ko.bngl, data: reduced_combination_continuous_a20ko.exp
experiment: p560_wt,  model: reduced_combination_pulse5_60_wt.bngl,    data: reduced_combination_pulse5_60_wt.exp
experiment: p560_ko,  model: reduced_combination_pulse5_60_a20ko.bngl, data: reduced_combination_pulse5_60_a20ko.exp
experiment: p5100_wt, model: reduced_combination_pulse5_100_wt.bngl,   data: reduced_combination_pulse5_100_wt.exp
experiment: p5100_ko, model: reduced_combination_pulse5_100_a20ko.bngl, data: reduced_combination_pulse5_100_a20ko.exp
experiment: p5200_wt, model: reduced_combination_pulse5_200_wt.bngl,   data: reduced_combination_pulse5_200_wt.exp
experiment: p5200_ko, model: reduced_combination_pulse5_200_a20ko.bngl, data: reduced_combination_pulse5_200_a20ko.exp
experiment: p225_wt,  model: reduced_combination_pulse22_5_wt.bngl,    data: reduced_combination_pulse22_5_wt.exp
experiment: p225_ko,  model: reduced_combination_pulse22_5_a20ko.bngl, data: reduced_combination_pulse22_5_a20ko.exp
experiment: p45_wt,   model: reduced_combination_pulse45_wt.bngl,      data: reduced_combination_pulse45_wt.exp
experiment: p45_ko,   model: reduced_combination_pulse45_a20ko.bngl,   data: reduced_combination_pulse45_a20ko.exp

##################
### Parameters ###
##################
# 13 reduced-model parameters, bound by NAME (ADR-0034). Nominals = Table 1 FITTED values.
# loguniform bounds = Table1 /10 .. x10 (same as reduced_onoff). Gate 3b checks recovery of Table 1.
loguniform_var = k_deg   0.0000107  0.00107
loguniform_var = k_1     0.000195   0.0195
loguniform_var = k_3     0.000145   0.0145
loguniform_var = k_2     0.00357    0.357
loguniform_var = a_3     0.00946    0.946
loguniform_var = delta   0.01083    1.083
loguniform_var = epsilon 0.00428    0.428
loguniform_var = c_deg   0.0000106  0.00106
loguniform_var = c_4a    0.000313   0.0313
loguniform_var = a_2     0.00763    0.763
loguniform_var = c_5a    0.00000578 0.000578
loguniform_var = i_1a    0.0000595  0.00595
loguniform_var = c_3a    0.0000372  0.00372
