# Reduced 6-variable NF-kB model (Jaruszewicz-Blonska et al. 2023) fit to the original
# Lipniacki-2004 model -- ON-OFF protocol (Table 2). Edition-2 PyBNF `de` fit.
#
# Source paper:
#   Jaruszewicz-Blonska J, Kosiuk I, Prus W, Lipniacki T. "A plausible identifiable model
#   of the canonical NF-kB signaling pathway." PLoS ONE 2023; 18(6): e0286416.
#   DOI 10.1371/journal.pone.0286416.
#
# WHAT IS FIT: the 13 parameters of the reduced model (Table 1) are recovered by fitting the
#   reduced model to reproduce the ORIGINAL 15-variable Lipniacki-2004 model's on-off trajectory
#   (the paper's "refitting the reduced model to the original one", done with PyBioNetFit). The
#   fit target is SYNTHETIC (original-model output), so this is a ground-truth-recovery job:
#   "the paper's result" = Table 1 fitted values, and Gate 3b checks the fit recovers them.
#
# PROTOCOL (Table 2): TNF ON 0-120 min, OFF 120-720 min. Measured (in silico) variables:
#   IKKa, nuclear NF-kB, A20, total IkBa protein IkBa* (= IkBa + 1 - NFkB_n), IkBa mRNA. WT uses
#   all 5; A20KO uses 4 (A20 excluded). Time points = Table 2, in reduced_onoff_{wt,a20ko}.exp.
#
# OBJECTIVE / NORMALIZATION -- the paper's EXACT Eq-7 objective (lanl/PyBNF#479, ADR-0066):
#   The paper minimizes the sum of squared LOG-differences of geometric-mean-normalized
#   trajectories, with a rho=0.03*max measurement floor (Methods). This is reproduced EXACTLY with
#   standard tokens:
#     noise_model = lognormal, sigma = fix_at 1        -> Gaussian residual on log10 (fixed unit
#                                                          sigma) = the paper's squared-log objective
#     normalization <obs> = floor 0.03, scale          -> floor: x' = x + 0.03*max(x) (the paper's
#                                                          rho floor); scale: per-series analytic
#                                                          optimal scale = geomean(data)/geomean(sim)
#                                                          for the log family = the paper's ÷geomean.
#   floor AND scale are applied SYMMETRICALLY to the simulated and the experimental column, so the
#   .exp ships RAW original-model output (no floor, no peak, no geomean, no _SD) -- see
#   reduced_onoff_{wt,a20ko}.exp. This is the paper's objective, not an analog. See VALIDATION.md.
#
# Run (with BNGPATH set, from this folder):
#   cd pybnf-jobs/Jaruszewicz-Blonska-2023/reduced_onoff && pybnf -c reduced_onoff.conf

output_dir = output

edition = 2
bngl_backend = bngsim

model: reduced_onoff.bngl

#######################
### General Options ###
#######################

delete_old_files = 1
verbosity = 2
# fast 7-species ODE; a stiff/oscillatory bad set should fail fast rather than grind.
wall_time_sim = 30
max_failed_simulations = 4000

#######################
### Fitting Options ###
#######################

job_type = de

# The paper's EXACT Eq-7 objective (lanl/PyBNF#479): a fixed-sigma log-normal (Gaussian residual on
# log10) is the paper's squared-log objective; the floor + per-series analytic scale reproduce the
# paper's rho=0.03 measurement floor and geometric-mean normalization, applied symmetrically to sim
# and data. The .exp targets are RAW original-model output.
noise_model = lognormal, sigma = fix_at 1
normalization IKK_a     = floor 0.03, scale
normalization NFkB_n    = floor 0.03, scale
normalization A20       = floor 0.03, scale
normalization IkBa_star = floor 0.03, scale
normalization tIkBa     = floor 0.03, scale

population_size = 100
max_iterations = 200
refine = 1
random_seed = 1

###################
### Experiments ###
###################

# total IkBa protein IkBa* = free IkBa + NFkB-bound IkBa = IkBa + (1 - NFkB_n) (conserved NFkB=1).
# Defined as a model function (output column) in reduced_onoff.bngl.

# A20KO: no A20 synthesis (A20 already seeds at 0) -> A20 stays 0, A20->IKKa feedback removed.
condition: a20ko, perturbations: c_deg = 0

experiment: onoff_wt, data: reduced_onoff_wt.exp
experiment: onoff_a20ko, condition: a20ko, data: reduced_onoff_a20ko.exp

##################
### Parameters ###
##################
# 13 reduced-model parameters bound to model ids BY NAME (ADR-0034). Nominals in reduced_onoff.bngl
# are Table 1 FITTED values. loguniform bounds = Table1 value /10 .. x10 (a real 2-decade recovery
# test; the paper's Monte Carlo identifiability finds geometric SD up to ~3.5, so the truth sits
# well inside these bounds). Gate 3b checks the fit lands back near Table 1.
#
#   id       Table-1 fitted   bounds (lo .. hi)
loguniform_var = k_deg   0.0000107  0.00107
loguniform_var = k_1     0.000195   0.0195
loguniform_var = k_3     0.000145   0.0145
loguniform_var = k_2     0.00357    0.357
loguniform_var = a_3     0.00946    0.946
loguniform_var = delta   0.01083    1.083
loguniform_var = epsilon 0.00428    0.428
loguniform_var = c_deg   0.0000106  0.00106
loguniform_var = c_4a    0.000313   0.0313
loguniform_var = a_2     0.00763    0.763
loguniform_var = c_5a    0.00000578 0.000578
loguniform_var = i_1a    0.0000595  0.00595
loguniform_var = c_3a    0.0000372  0.00372
