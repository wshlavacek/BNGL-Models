# JNK / p38 / ATF2 phosphoswitch, anisomycin time course -- deterministic ODE (~50 species).
#
# Real-world PyBNF edition-2 fitting job derived from:
#   Kirsch K, Zeke A, Toke O, ... Remenyi A. "Co-regulation of the transcription
#   controlling ATF2 phosphoswitch by JNK and p38." Nat Commun 2020; 11(1):5769.
#   PMCID: PMC7666158   DOI: 10.1038/s41467-020-19582-3
#   (The authors provide this rule-based model as Supplementary Software 1; the model's
#   actions block generates their Fig. 7b -- so it is a natural real-world example.)
#
# Fit target: WT pp-ATF2(T69/T71) western-blot time course after anisomycin stimulation
#   of HEK293T cells, 0-41 min (Source Data workbook, sheet Figure_4 / Fig. 4a,
#   "Anti-ppATF2(T69/T71) treated/untreated", mean +/- SD over n=3). Extracted by
#   extract_exp.py -> fig7b_timecourse.exp (t in seconds). The published model was fit to
#   exactly this data plus the parallel p38-ATF2 NanoBit signal (Supplementary Table 2:
#   keq6,keq7,kstim6,kstim7,dp1,dp2,dp3,dp4 were "fitted from WB/NanoBit, Fig7b").
#
# Experimental design: pre-equilibrate at basal MAPK activity (Stim = 0 -> keq6/keq7),
#   then apply anisomycin (Stim = 1 -> kstim6/kstim7) and measure over 0-2466 s. PyBNF
#   synthesizes the two-phase protocol from preequilibrate: basal -> condition: stim.
#
# NATIVE-ONLY: the data are treated/untreated ratios (fold change vs the unstimulated
#   control), so the conf uses `normalization = init` -- which PyBNF's export_job cannot
#   express in PEtab v2 (NotImplementedError), exactly like the shipped igf1r.conf and the
#   Rukhlenko-2022/cstar_trka example. Verified with a tier-1 parse check + a bounded
#   bngsim fit + reproduction of Fig. 4a, NOT with the PEtab round-trip. See
#   skills/curate-pybnf-job/references/petab-compliance.md.
#
# Run (with BNGPATH set, from this folder):
#   cd pybnf-jobs/Kirsch-2020/fig7b_timecourse && pybnf -c fig7b_timecourse.conf

output_dir = output

# Opt into the edition-2 config language (PEtab-aligned experiment:/condition:/data:).
edition = 2

# In-process bngsim backend (the new-era default).
bngl_backend = bngsim

# The model (no `begin actions` block -- the protocol below synthesizes the sim).
model: fig7b_timecourse.bngl

#######################
### General Options ###
#######################

delete_old_files = 1
wall_time_sim = 3600        # ~50-species network; generous per-simulation ceiling

###################
### Conditions  ###
###################
# The Stim gate selects basal (keq*) vs anisomycin-stimulated (kstim*) MAPK activation.
condition: basal, perturbations: Stim = 0
condition: stim,  perturbations: Stim = 1

###################
### Experiments ###
###################
# Pre-equilibrate under `basal` (no stimulus, unmeasured, to steady state) -> perturb to
# `stim` (anisomycin) -> measure fig7b_timecourse.exp over its time grid. State carries
# across the two phases with no reset (ADR-0052). The .exp column header IS the model
# observable name (pT69pT71); its _SD column selects chi_sq.
experiment: fig7b, preequilibrate: basal, condition: stim, data: fig7b_timecourse.exp

#######################
### Fitting Options ###
#######################

# Differential evolution (a global metaheuristic, as the paper corpus uses).
job_type = de

# The data are treated/untreated fold changes -> normalize each simulated observable to
# its basal (t=0) value before comparison (whole-fit form; NOT PEtab-exportable).
normalization = init

# fig7b_timecourse.exp carries a pT69pT71_SD column -> Gaussian chi-square (per-point sigma).
objective = chi_sq

max_iterations = 50
population_size = 12
verbosity = 2

##################
### Parameters ###
##################
# The eight cell-based rate constants the paper fit to the Fig. 7b / Fig. 4a time courses
# (Supplementary Table 2, "fitted from WB / NanoBit"), bound to the model ids BY NAME
# (ADR-0034, no __FREE alias), each log-scaled and bracketing the published value by ~+/-
# one decade. keq* = basal activation, kstim* = anisomycin-stimulated activation, dp* =
# phosphatases. (The docking/catalytic rates kon*/koff*/k1-k4 were fixed in vitro.)
#
#   id       published    role
#   keq7     4.695e-6     basal    MKK7 -> JNK activation
#   kstim7   9.074e-5     stim     MKK7 -> JNK activation
#   keq6     1.74e-5      basal    MKK6 -> p38 activation
#   kstim6   1.16e-4      stim     MKK6 -> p38 activation
#   dp1      6.26e-4      phosphatase on pp-JNK
#   dp2      1.76e-3      phosphatase on pp-p38
#   dp3      9.54e-3      phosphatase on ATF2 pT69 / pT71
#   dp4      4.50e-3      phosphatase on ATF2 pS90
loguniform_var = keq7    4.695e-7  4.695e-5
loguniform_var = kstim7  9.074e-6  9.074e-4
loguniform_var = keq6    1.74e-6   1.74e-4
loguniform_var = kstim6  1.16e-5   1.16e-3
loguniform_var = dp1     6.26e-5   6.26e-3
loguniform_var = dp2     1.76e-4   1.76e-2
loguniform_var = dp3     9.54e-4   9.54e-2
loguniform_var = dp4     4.50e-4   4.50e-2
