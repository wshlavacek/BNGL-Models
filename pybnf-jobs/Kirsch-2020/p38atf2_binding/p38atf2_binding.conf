# JNK / p38 / ATF2 phosphoswitch -- p38-ATF2 TAD binding time course (NanoBit).
# Deterministic ODE (~50 species). Real-world PyBNF edition-2 fitting job derived from:
#   Kirsch K, Zeke A, Toke O, ... Remenyi A. "Co-regulation of the transcription
#   controlling ATF2 phosphoswitch by JNK and p38." Nat Commun 2020; 11(1):5769.
#   PMCID: PMC7666158   DOI: 10.1038/s41467-020-19582-3
#   (The authors provide this rule-based model as Supplementary Software 1.)
#
# FIT TARGET: WT p38-ATF2 TAD binary interaction after anisomycin stimulation of HEK293T
#   cells, 0-41 min -- the luciferase-complementation (NanoBit) "treated/untreated" signal
#   (Source Data workbook, sheet Figure_4 / Fig. 4a, WT column; the same data are overlaid
#   with the model calc in the Fig. 7b "p38 + ATF2 interaction" panel). Extracted by
#   extract_exp.py -> p38atf2_binding.exp (t in seconds; mean +/- SD, n=3 technical reps).
#   This is the model's p38:ATF2 COMPLEX observable (p38ATF2all), NOT the T69/T71
#   phosphorylation (pT69pT71). See README.md for the provenance audit that established this.
#
#   The complex rises then FALLS (peak ~9 min): pp-JNK phosphorylates S90 (F~p), which
#   sterically evicts p38 from the FRS -- the phosphoswitch. The model reproduces this
#   transient at the authors' published parameters (median 5.8% rel err); pT69pT71
#   (monotonic) cannot, which is why the earlier mapping to pT69pT71 was wrong.
#
# Experimental design: pre-equilibrate at basal MAPK activity (Stim = 0 -> keq6/keq7),
#   then apply anisomycin (Stim = 1 -> kstim6/kstim7) and measure over 0-2466 s. PyBNF
#   synthesizes the two-phase protocol from preequilibrate: basal -> condition: stim.
#
# NATIVE-ONLY: the data are treated/untreated ratios (fold change vs the unstimulated
#   control), so the conf uses `normalization = init` -- which PyBNF's export_job cannot
#   express in PEtab v2 (NotImplementedError), exactly like the shipped igf1r.conf and the
#   Rukhlenko-2022/cstar_trka example. Verified with a tier-1 parse check + a bounded
#   bngsim fit + reproduction, NOT with the PEtab round-trip. See
#   skills/curate-pybnf-job/references/petab-compliance.md.
#
# Run (with BNGPATH set, from this folder):
#   cd pybnf-jobs/Kirsch-2020/p38atf2_binding && pybnf -c p38atf2_binding.conf

output_dir = output

# Opt into the edition-2 config language (PEtab-aligned experiment:/condition:/data:).
edition = 2

# In-process bngsim backend (the new-era default).
bngl_backend = bngsim

# The model (no `begin actions` block -- the protocol below synthesizes the sim).
model: p38atf2_binding.bngl

#######################
### General Options ###
#######################

delete_old_files = 1
wall_time_sim = 3600        # ~50-species network; generous per-simulation ceiling

###################
### Conditions  ###
###################
# The Stim gate selects basal (keq*) vs anisomycin-stimulated (kstim*) MAPK activation.
condition: basal, perturbations: Stim = 0
condition: stim,  perturbations: Stim = 1

###################
### Experiments ###
###################
# Pre-equilibrate under `basal` (no stimulus, unmeasured, to steady state) -> perturb to
# `stim` (anisomycin) -> measure p38atf2_binding.exp over its time grid. State carries
# across the two phases with no reset (ADR-0052). The .exp column header IS the model
# observable name (p38ATF2all); its _SD column selects chi_sq.
experiment: binding, preequilibrate: basal, condition: stim, data: p38atf2_binding.exp

#######################
### Fitting Options ###
#######################

# Differential evolution (a global metaheuristic, as the paper corpus uses).
job_type = de

# The data are treated/untreated fold changes -> normalize each simulated observable to
# its basal (t=0) value before comparison (whole-fit form; NOT PEtab-exportable).
normalization = init

# p38atf2_binding.exp carries a p38ATF2all_SD column -> Gaussian chi-square (per-point sigma).
objective = chi_sq

max_iterations = 50
population_size = 12
verbosity = 2

##################
### Parameters ###
##################
# The FOUR p38-arm rate constants the paper fit to the p38-ATF2 NanoBit data (Supplementary
# Table 2, "data" = "Fig7b - p38-ATF2", fitted-from = NanoBit), bound to the model ids BY
# NAME (ADR-0034, no __FREE alias), each log-scaled and bracketing the published value by
# ~+/- one decade. The pp-JNK-arm (keq7,kstim7,dp1), in-vitro (kon*,koff*,k1-k4) and
# pp-ATF2 (dp3) constants are held FIXED at their published values -- the paper determined
# them from other datasets (pp-JNK WB / in-vitro kinetics / pp-ATF2 WB), so re-fitting them
# here would not be faithful to the paper's decomposition.
#
#   id       published    role
#   keq6     1.74e-5      basal    MKK6 -> p38 activation
#   kstim6   1.16e-4      stim     MKK6 -> p38 activation
#   dp2      1.76e-3      phosphatase on pp-p38
#   dp4      4.50e-3      phosphatase on ATF2 pS90 (governs S90-P-driven p38 eviction = decay)
loguniform_var = keq6    1.74e-6   1.74e-4
loguniform_var = kstim6  1.16e-5   1.16e-3
loguniform_var = dp2     1.76e-4   1.76e-2
loguniform_var = dp4     4.50e-4   4.50e-2
