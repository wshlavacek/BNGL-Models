# JNK / p38 / ATF2 phosphoswitch -- fit to QUALITATIVE p38-recruitment facts (BPSL, native-only).
#
# Real-world PyBNF example derived from:
#   Kirsch K, Zeke A, Toke O, ... Remenyi A. "Co-regulation of the transcription
#   controlling ATF2 phosphoswitch by JNK and p38." Nat Commun 2020; 11(1):5769.
#   PMCID: PMC7666158   DOI: 10.1038/s41467-020-19582-3   (Supplementary Software 1)
#
# The constraint-bearing sibling of ../fig7b_timecourse. Instead of a quantitative time
# course, it fits the paper's SIGNATURE qualitative claim -- JNK phosphorylation of the
# ATF2 F-site (S90) sterically blocks p38's F-site (FRS) recruitment (the "phosphoswitch")
# -- as PyBNF BPSL .prop constraints on `p38ATF2all` (total p38:ATF2 TAD complex, the
# NanoBit binding readout), evaluated at the stimulated steady state (t = 20000 s):
#   * S90N          -- p38 binds MORE than WT      (F-site removed; jnki < s90n)   s90n.prop
#   * JNK inhibitor -- p38 binds MORE than WT      (S90-P block relieved)          jnki.prop
#   * MUT4          -- p38 binds LESS than WT      (F-motif crippled)              mut4.prop
#   * WT            -- p38 does recruit; ATF2 gets phosphorylated  (anchor)        wt.prop
# Confirmed at the published parameters: s90n (0.025) > jnki (0.0073) > wt (0.0031) > mut4
# (0.0022) uM of p38:ATF2 complex (see phosphoswitch_bpsl_switch.png).
#
# STRUCTURE (Miller2025 pattern): a BPSL constraint experiment cannot apply a
# non-free-parameter condition, so each mutant/inhibitor is baked into its OWN model copy
# (deltas from Supplementary Table 2), and each experiment binds that model. The four free
# cell params bind by name across all copies. Regenerate the mutant models with ./make_models.sh.
#
# NATIVE-ONLY: attaching BPSL .prop constraints makes the job NOT PEtab-v2-exportable
# (export_job raises NotImplementedError). Verify with `job_type = check` (constraint
# satisfaction), NOT petab_roundtrip.py. See
# skills/curate-pybnf-job/references/bpsl-constraints.md.
#
# Run (with BNGPATH set, from this folder):
#   ./make_models.sh                          # (re)generate the mutant models
#   pybnf -c phosphoswitch_bpsl.conf          # fit the cell params to the qualitative facts
#   pybnf -c phosphoswitch_bpsl_check.conf    # or: check satisfaction at published params

output_dir = output

# Opt into the edition-2 config language.
edition = 2

# In-process bngsim backend (the new-era default).
bngl_backend = bngsim

# One model per condition, mutant deltas baked in (generated by make_models.sh).
model: phosphoswitch_bpsl.bngl        # WT: kon2=17.2, k1=3.52, k2=0.78
model: phosphoswitch_bpsl_jnki.bngl   # JNK inhibitor: k1=0, k2=0
model: phosphoswitch_bpsl_s90n.bngl   # S90N: kon2=77.1, k2=0
model: phosphoswitch_bpsl_mut4.bngl   # MUT4: kon2=1.2

#######################
### General Options ###
#######################

delete_old_files = 1
wall_time_sim = 3600

###################
### Experiments ###
###################
# Constraint-only experiments (a .prop with no .exp): each binds its condition model and
# carries its own timing (t_end required); each integrates from the seed to the stimulated
# steady state (settled well before t_end = 20000 s). Experiment names ARE the BPSL
# suffixes, so jnki/s90n/mut4.prop reference `wt.p38ATF2all` and s90n.prop references
# `jnki.p38ATF2all` (cross-condition comparisons). type: time_course is required for .prop.
experiment: wt,   model: phosphoswitch_bpsl.bngl,      type: time_course, t_end: 20000, n_steps: 200, data: wt.prop
experiment: jnki, model: phosphoswitch_bpsl_jnki.bngl, type: time_course, t_end: 20000, n_steps: 200, data: jnki.prop
experiment: s90n, model: phosphoswitch_bpsl_s90n.bngl, type: time_course, t_end: 20000, n_steps: 200, data: s90n.prop
experiment: mut4, model: phosphoswitch_bpsl_mut4.bngl, type: time_course, t_end: 20000, n_steps: 200, data: mut4.prop

#######################
### Fitting Options ###
#######################

# Differential evolution: the BPSL constraints become soft weighted penalties (the whole
# objective here -- there is no quantitative .exp), so the fit calibrates the cell params
# to the qualitative recruitment facts. (For pure verification use job_type = check.)
job_type = de

# Edition 2 requires an objective even for a constraint-only job; there is no quantitative
# .exp, so `sos` scores nothing and the BPSL penalties are the whole objective.
objective = sos

# Global multiplier on the qualitative penalty block (hinge family). 1.0 = use .prop weights.
constraint_scale = 1.0

max_iterations = 50
population_size = 12
verbosity = 2

##################
### Parameters ###
##################
# Four cell-level rate constants that shift where p38 recruitment settles (shared across
# all four condition models), bound by name (ADR-0034, no __FREE), each loguniform over
# ~+/- half a decade around the published value (Supplementary Table 2). The mutant deltas
# (kon2, k1, k2) that PRODUCE the orderings are baked into the models, not fit.
#
#   id       published    role
#   dp2      1.76e-3      phosphatase on pp-p38   (sets active-p38 level)
#   dp4      4.50e-3      phosphatase on ATF2 pS90 (how fast the S90-P block is reversed)
#   kstim6   1.16e-4      stimulated p38 activation
#   kstim7   9.074e-5     stimulated JNK activation (drives S90 phosphorylation)
loguniform_var = dp2    5.6e-4   5.6e-3
loguniform_var = dp4    1.4e-3   1.4e-2
loguniform_var = kstim6 3.7e-5   3.7e-4
loguniform_var = kstim7 2.9e-5   2.9e-4
