# JNK / p38 / ATF2 phosphoswitch -- BPSL constraint SATISFACTION at published parameters.
#
# job_type = check evaluates the .prop constraints at a single parameter set (no fitting)
# and reports "Satisfied N out of M constraints". Here the parameters are the published
# best-fit values baked into the four condition models (make_models.sh), so this verifies
# that the paper's own model reproduces the qualitative p38-recruitment orderings.
# Companion to phosphoswitch_bpsl.conf (which FITS the same constraints). See that file and
# skills/curate-pybnf-job/references/bpsl-constraints.md for the full write-up.
#
# Run (with BNGPATH set, from this folder):
#   ./make_models.sh && pybnf -c phosphoswitch_bpsl_check.conf

output_dir = output_check

edition = 2
bngl_backend = bngsim

model: phosphoswitch_bpsl.bngl
model: phosphoswitch_bpsl_jnki.bngl
model: phosphoswitch_bpsl_s90n.bngl
model: phosphoswitch_bpsl_mut4.bngl

delete_old_files = 1
wall_time_sim = 3600

###################
### Experiments ###
###################
experiment: wt,   model: phosphoswitch_bpsl.bngl,      type: time_course, t_end: 20000, n_steps: 200, data: wt.prop
experiment: jnki, model: phosphoswitch_bpsl_jnki.bngl, type: time_course, t_end: 20000, n_steps: 200, data: jnki.prop
experiment: s90n, model: phosphoswitch_bpsl_s90n.bngl, type: time_course, t_end: 20000, n_steps: 200, data: s90n.prop
experiment: mut4, model: phosphoswitch_bpsl_mut4.bngl, type: time_course, t_end: 20000, n_steps: 200, data: mut4.prop

#######################
### Fitting Options ###
#######################
# Model checking against the BPSL constraints -- evaluate at the (published) model
# parameters, report satisfaction, no search. No *_var free parameters.
job_type = check
objective = sos
constraint_scale = 1.0
verbosity = 2
