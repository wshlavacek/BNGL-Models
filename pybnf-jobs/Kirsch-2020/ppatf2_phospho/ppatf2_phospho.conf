# JNK / p38 / ATF2 phosphoswitch -- pp-ATF2(T69/T71) phosphorylation time course.
# Deterministic ODE (~50 species). Real-world PyBNF edition-2 fitting job derived from:
#   Kirsch K, Zeke A, Toke O, ... Remenyi A. "Co-regulation of the transcription
#   controlling ATF2 phosphoswitch by JNK and p38." Nat Commun 2020; 11(1):5769.
#   PMCID: PMC7666158   DOI: 10.1038/s41467-020-19582-3
#   (The authors provide this rule-based model as Supplementary Software 1.)
#
# FIT TARGET: the WT pp-ATF2(pT69/pT71) phosphorylation level (ABSOLUTE uM) after anisomycin
#   stimulation, 0-40 min, in TWO conditions from the Fig. 7b "pp-ATF2 (pT69/pT71)" panel:
#     * CTR      (control)      -> ppatf2_phospho_ctr.exp   (model pT69pT71, nominal params)
#     * JNK-IN-8 (JNK inhibitor)-> ppatf2_phospho_jnki.exp  (model pT69pT71 with k1 = k2 = 0)
#   This panel's data are NOT in the paper's Source Data workbook (no Figure_7 sheet), so the
#   .exp values were DIGITIZED from the panel (digitize.py; linear axes; ~+/-0.03 uM; no error
#   bars -> sos). This is the T69/T71 PHOSPHORYLATION observable -- monotonic saturating rise;
#   it is a DIFFERENT quantity from the p38-ATF2 BINDING curve (peak-decay) fit by the sibling
#   slug p38atf2_binding. See README.md for the provenance audit.
#
# Experimental design: pre-equilibrate at basal MAPK activity (Stim = 0) -> apply anisomycin
#   (Stim = 1) -> measure. The JNK-IN-8 experiment carries the inhibitor (k1 = k2 = 0) through
#   BOTH phases. State carries across phases with no reset (ADR-0052).
#
# NATIVE-ONLY vs PEtab: the fit uses `sos` (unweighted least squares; the panel has no error
#   bars) with NO normalization (absolute uM), so it is quantitative. It stays edition-2 /
#   bngsim; PEtab-exportability is not asserted here (the sibling binding slug is the
#   native-only `normalization` exemplar).
#
# Run (with BNGPATH set, from this folder):
#   cd pybnf-jobs/Kirsch-2020/ppatf2_phospho && pybnf -c ppatf2_phospho.conf

output_dir = output

edition = 2
bngl_backend = bngsim

model: ppatf2_phospho.bngl

#######################
### General Options ###
#######################

delete_old_files = 1
wall_time_sim = 3600

###################
### Conditions  ###
###################
# CTR: only the Stim gate toggles. JNK-IN-8: additionally k1 = k2 = 0 (JNK catalytically
# dead) in both the equilibration and the stimulation phase.
condition: basal,      perturbations: Stim = 0
condition: stim,       perturbations: Stim = 1
condition: basal_jnki, perturbations: Stim = 0, k1 = 0, k2 = 0
condition: stim_jnki,  perturbations: Stim = 1, k1 = 0, k2 = 0

###################
### Experiments ###
###################
# Two experiments share the single free parameter dp3. The .exp column header IS the model
# observable name (pT69pT71); with no _SD column the objective is sos.
experiment: ctr,  preequilibrate: basal,      condition: stim,      data: ppatf2_phospho_ctr.exp
experiment: jnki, preequilibrate: basal_jnki, condition: stim_jnki, data: ppatf2_phospho_jnki.exp

#######################
### Fitting Options ###
#######################

job_type = de

# Absolute uM data, no error bars -> unweighted sum of squares.
objective = sos

max_iterations = 30
population_size = 10
verbosity = 2

##################
### Parameters ###
##################
# dp3 = the ATF2 pT69/pT71 phosphatase -- the ONE parameter the paper fit to the pp-ATF2 WB
# (Supplementary Table 2, "data" = "Fig7b - pp-ATF2", fitted-from = WB). Every other constant
# is held at its published value: the paper determined the pp-JNK arm (keq7,kstim7,dp1) from
# pp-JNK WB, the p38 arm (keq6,kstim6,dp2,dp4) from p38-ATF2 NanoBit, and kon*/koff*/k1-k4 in
# vitro. dp3 governs the plateau height of the monotonic phospho rise; log-scaled +/- 1 decade.
loguniform_var = dp3     9.54e-4   9.54e-2
