# EGFR activation & higher-order clustering (Kozer et al. 2013) -- deterministic ODE,
# network-generating. Time course + dose-response fit in one job. PEtab-v2-exportable.
#
# Real-world PyBNF edition-2 fitting job derived from:
#   Kozer N, Barua D, Orchard S, Nice EC, Burgess AW, Hlavacek WS, Clayton AHA.
#   "Exploring higher-order EGFR oligomerisation and phosphorylation -- a combined
#   experimental and theoretical approach." Mol BioSyst 2013; 9(7):1849-1863.
#   PMCID: PMC3698845   DOI: 10.1039/c3mb70073a   PMID: 23629589
#   (Part of the PyBNF 2019 paper corpus, Mitra et al., iScience 2019; BioNetFit 1 problem 2.)
#
# Fit target: preprocessed data of Kozer et al. (2013), each dataset scaled so its own
#   measurement average is 1 (the alpha*_pre scale factors relate model output to signal):
#   * timecourse.exp   -- EGFR cluster density (pre2_time, Fig. 3B) and phospho-EGFR
#                         (pre4_time, Fig. 3D) vs. time at a fixed ligand dose LT = 30 nM.
#   * doseresponse.exp -- EGFR cluster density (pre1_dose, Fig. 2B) and phospho-EGFR
#                         (pre3_dose, Fig. 2D) vs. EGF dose LT (a parameter scan; ADR-0046),
#                         each dose run to a fixed endpoint t_end = 1200 s.
#   Both .exp carry per-point _SD columns -> the chi_sq (Gaussian, per-point sigma) objective.
#
# PEtab-EXPORTABLE: the observables are arithmetic scalings of model species/molecule counts
#   (pre*_dose/pre*_time = alpha*_pre * Clusters|pEGFR) and the objective is chi_sq -- inside
#   the PEtab-exportable subset. Verified with scripts/petab_roundtrip.py (export -> lint ->
#   import, clean). See skills/curate-pybnf-job/references/petab-compliance.md.
#
# NETWORK CAP: egfr_ode.bngl RETAINS one actions line,
#   generate_network({overwrite=>1,max_stoich=>{EGF=>4,EGFR=>4}}).
#   That max_stoich cap is what makes the crosslinking+ring network FINITE -- the rules alone
#   do not bound oligomer size. pybnf captures this line; if it were stripped, pybnf would
#   default to a bare generate_network({overwrite=>1}) with no cap -> unbounded -> never
#   terminates. See the paper-level README and curate-pybnf-job/references/real-world-anatomy.md.
#
# HEAVY (cluster-scale network): even capped at tetramers the network takes several minutes to
#   generate through BNG2.pl, and the published fit used large populations on a cluster. A full
#   workstation fit is impractical; the tier-1 parse and PEtab round-trip are backend-free, and
#   the network-free NFsim sibling (../egfr_nf) runs the same problem without network generation.
#
# Run (with BNGPATH set, from this folder):
#   cd pybnf-jobs/Kozer-2013-2014/egfr_ode && pybnf -c egfr_ode.conf

output_dir = output

# Opt into the edition-2 config language (PEtab-aligned experiment:/condition:/data:).
edition = 2

# In-process bngsim backend (the new-era default).
bngl_backend = bngsim

# The model (no `begin actions` block -- the experiments below synthesize the sims).
model: egfr_ode.bngl

#######################
### General Options ###
#######################

delete_old_files = 1
wall_time_sim = 3600        # cluster-scale ectodomain/tail crosslinking network

#######################
### Fitting Options ###
#######################

# Differential evolution (the paper compares DE/aDE/PSO/SS; DE here).
job_type = de

# Gaussian noise, sigma read per point from the _SD columns.
objective = chi_sq

max_iterations = 50
population_size = 12
verbosity = 2

###################
### Experiments ###
###################

# Time course (independent variable `time`): observables pre2_time, pre4_time at LT = 30 nM.
experiment: timecourse, data: timecourse.exp

# Dose-response: a parameter scan over the ligand dose LT (the data's independent-variable
# column). Each dose runs to a fixed endpoint t_end = 1200 s. Observables pre1_dose, pre3_dose.
experiment: doseresponse, type: parameter_scan, t_end: 1200, data: doseresponse.exp

##################
### Parameters ###
##################
# Nine free parameters bound to the model ids BY NAME (ADR-0034, no __FREE alias). Four
# observable-scale factors (alpha*_pre, linear, 0x-200x the published value) and five rate
# constants (k_o/k_c/kaf/kar/chi_r, log scale, 0.01x-100x the published value; obtained by
# fitting in the paper). See Table 1 of Kozer et al. (2013) for the fixed binding/crosslinking
# constants.
#
#   id          published     role
#   alpha2_pre  0.30214449    cluster-density scale, time course (Fig. 3B)
#   alpha4_pre  0.28729663    phospho-EGFR scale, time course (Fig. 3D)
#   alpha1_pre  0.262289257   cluster-density scale, dose-response (Fig. 2B)
#   alpha3_pre  0.414521959   phospho-EGFR scale, dose-response (Fig. 2D)
#   k_o         6             ligand-mediated activating tail conformation change (/s)
#   k_c         1.6           ligand-independent deactivating tail conformation change (/s)
#   kaf         15.4          EGFR tail-tail association (/s)
#   kar         8.89          EGFR tail-tail dissociation (/s)
#   chi_r       43700         ring-closure enhancement factor (nM)
uniform_var = alpha2_pre 0 60.428898
uniform_var = alpha4_pre 0 57.459326
uniform_var = alpha1_pre 0 52.4578514
uniform_var = alpha3_pre 0 82.9043918

loguniform_var = k_o 0.06 600
loguniform_var = k_c 0.016 160
loguniform_var = kaf 0.154 1540
loguniform_var = kar 0.0889 889
loguniform_var = chi_r 437 4370000
