# EGFR activation & higher-order clustering -- NETWORK-FREE (NFsim). Mitra-2019 formulation / 2013 data.
# Time course + dose-response fit in one job. PEtab-v2-exportable.
#
# Real-world PyBNF edition-2 fitting job. The NETWORK-FREE model is the PyBioNetFit / BioNetFit-1
#   "example 2" model -- an UNBOUNDED network-free NFsim reformulation of the EGFR clustering model
#   of Kozer et al. (2013), fit to the same average-normalized 2013 datasets as ../egfr_ode:
#   Kozer N, ..., Clayton AHA. "Exploring higher-order EGFR oligomerisation and phosphorylation..."
#   Mol BioSyst 2013; 9(7):1849-1863. PMCID: PMC3698845  DOI: 10.1039/c3mb70073a  PMID: 23629589.
#   (Part of the PyBNF 2019 paper corpus, Mitra et al., iScience 2019; BioNetFit 1 problem 2.)
# NOTE: this is NOT the Kozer 2014 SI model (bi500182x_si_001.txt = a capped-ODE+Grb2 model,
#   not reproduced here). See VALIDATION.md Gate 2.
#
# The network-free (NFsim) sibling of ../egfr_ode. EGFR forms unbounded ectodomain-crosslinked
# oligomers, so the reaction network is not finite -- simulated network-free with NFsim
# (method: nf). The same two Kozer datasets are fit as in egfr_ode:
#   * timecourse.exp   -- cluster density (pre2_time, Fig. 3B) and phospho-EGFR (pre4_time,
#                         Fig. 3D) vs. time at fixed EGF dose 30 nM.
#   * doseresponse.exp -- cluster density (pre1_dose, Fig. 2B) and phospho-EGFR (pre3_dose,
#                         Fig. 2D) vs. EGF dose LT_nM (a network-free parameter scan; ADR-0046),
#                         each dose run to a fixed endpoint t_end = 600 s.
#   Both .exp carry per-point _SD columns -> the chi_sq objective.
#
# PEtab-EXPORTABLE: verified with scripts/petab_roundtrip.py --method nf (export -> lint ->
#   import, clean). See skills/curate-pybnf-job/references/petab-compliance.md.
#
# HEAVY (NFsim is cluster-scale): NFsim steps event-by-event over ~10^3-10^4 molecules and some
#   parameter sets exceed wall_time_sim. The published fit used a cluster. A full workstation
#   fit is impractical, but a single simulation at the PyBNF best-fit parameters runs (see
#   make_reproduction.py) and the tier-1 parse + PEtab round-trip are backend-free.
#
# NOTE: this model's shipped nominals are GenFit STARTING values (from example2_starting_point.bngl),
#   NOT the fit. The PyBNF best-fit (Mitra 2019 Data S1, RuleHub 04-egfrnf/fit_ade) is used for the
#   reproduction figure and recorded in README.md.
#
# Run (with BNGPATH set, from this folder):
#   cd pybnf-jobs/Kozer-2013/egfr_nf && pybnf -c egfr_nf.conf

output_dir = output

edition = 2
bngl_backend = bngsim

model: egfr_nf.bngl

#######################
### General Options ###
#######################

delete_old_files = 1
wall_time_sim = 3600        # NFsim on ~10^3-10^4 molecules is cluster-scale

#######################
### Fitting Options ###
#######################

# Scatter Search (as the classic conf).
job_type = ss

# Gaussian noise, sigma read per point from the _SD columns.
objective = chi_sq

max_iterations = 50
population_size = 12
verbosity = 2

# Refine the best fit with a local Simplex search (as the classic conf).
refine = 1
simplex_max_iterations = 20

###################
### Experiments ###
###################

# Time course (independent variable `time`), simulated network-free: pre2_time, pre4_time at 30 nM.
# gml / complex are NFsim options (raise the global molecule limit and track molecular complexes)
# the large EGFR clustering state space needs, as the classic model set them.
experiment: timecourse, method: nf, gml: 1000000, complex: 1, data: timecourse.exp

# Dose-response: a network-free parameter scan over LT_nM (the data's independent-variable
# column), each dose run to t_end = 600 s. Observables pre1_dose, pre3_dose.
experiment: doseresponse, type: parameter_scan, method: nf, t_end: 600, gml: 1000000, complex: 1, data: doseresponse.exp

##################
### Parameters ###
##################
# Nine free parameters bound to the model ids BY NAME (ADR-0034, no __FREE alias). Four
# observable-scale factors (alpha*_pre, linear, 0x-200x the published value -- much smaller
# here than in egfr_ode because NFsim outputs molecule counts, not nM) and five rate constants
# (k_o/k_c/kaf/kar/chi_r, log scale, 0.01x-100x the published value; obtained by fitting).
uniform_var = alpha1_pre 0 5.12581E-05
uniform_var = alpha2_pre 0 5.66338E-05
uniform_var = alpha3_pre 0 8.99271E-05
uniform_var = alpha4_pre 0 5.60084E-05

loguniform_var = k_o 0.06 600
loguniform_var = k_c 0.016 160
loguniform_var = kaf 0.154 1540
loguniform_var = kar 0.0889 889
loguniform_var = chi_r 437 4370000
