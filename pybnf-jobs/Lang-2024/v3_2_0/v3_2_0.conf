# =====================================================================================
# RPE-1 cell-cycle model (Lang et al. 2024) -- edition-2 PyBNF fit of 8 nuclear observables
# to single-cell trajectory data.  ODE; the paper's headline parameter-estimation problem
# (177 of 205 parameters estimated over a single wildtype condition, 600 time points).
#
# Real-world PyBNF edition-2 fitting job derived from:
#   Lang PF, Penas DR, Banga JR, Weindl D, Novak B. "Reusable rule-based cell cycle model
#   explains compartment-resolved dynamics of 16 observables in RPE-1 cells."
#   PLoS Comput Biol 2024; 20(1):e1011151.  DOI 10.1371/journal.pcbi.1011151.
# PEtab problem transcribed from paulflang/cell_cycle_petab @ versions/v3.2.0 (commit d562d3d):
#   parameters_v3.2.0.tsv / observables_v3.2.0.tsv / experimentalCondition_v3.2.0.tsv /
#   v3.2.0.yaml, fit to Stallaert_CellSystems2021_Data_2rounds.tsv.
#
# Fit target -- 8 nuclear observables (Stallaert et al. Cell Systems 2021 single-cell RPE-1
#   medians, duplicated to 2 cell cycles to enforce oscillation; v3_2_0.exp, 600 time points
#   to t=1.36e5).  Each column is a model FUNCTION obs_*__nuc_median() = offset + scale*sum,
#   so the .exp header carries parentheses; the manifest lists them without.
#
# Noise: the PEtab noiseFormula is noiseParameter1 + noiseParameter2 = 0 + 1 = 1 (both fixed,
#   Gaussian, lin) -> a constant unit sigma -> the objective is plain sum-of-squares (sos).
#
# HEAVY (cluster-scale search).  The network is tiny (73 species, 332 reactions, ~0.4 s/sim),
#   but 177 free parameters over one condition is not locally convergent -- the paper fit it
#   with cooperative scatter search (saCeSS) on a cluster.  The manifest marks heavy=True;
#   the budget below is a cluster starting point, NOT a workstation run.  See VALIDATION.md:
#   the PEtab nominalValues used as .bngl nominals are a reference point, not the converged
#   optimum, so a short local fit reaches a finite objective but does not reproduce the paper.
#
# Run (with BNGPATH set, from this folder):
#   cd pybnf-jobs/Lang-2024/v3_2_0 && pybnf -c v3_2_0.conf     # cluster-scale; parallelize
# =====================================================================================

output_dir = output

# Opt into the edition-2 config language (PEtab-aligned experiment:/data:).
edition = 2

# In-process bngsim backend (the new-era default).
bngl_backend = bngsim

# The model (no begin actions block -- the experiment below synthesizes the time course over
# the wt initial concentrations baked into the seed species).
model: v3_2_0.bngl

#######################
### General Options ###
#######################

delete_old_files = 1
verbosity = 1

# Per-simulation wall-time cap (s).  A well-behaved sim on this 73-species network is ~0.4 s;
# random trial parameter sets in a 177-D search can be very stiff, so cull them fast rather
# than let them grind against the 3600 s default (scored as failed simulations).
wall_time_sim = 120
max_failed_simulations = 100000

#######################
### Fitting Options ###
#######################

# Differential evolution -- a robust global metaheuristic (the paper used cooperative
# scatter search, saCeSS; PyBNF's `ss` is the nearest analog, `de` is the workhorse).
job_type = de

# Plain sum of squares: the PEtab noise model is a fixed unit Gaussian sigma (no _SD columns
# in v3_2_0.exp), so sos is the exact objective and stays inside the PEtab-exportable subset.
objective = sos

# Search budget -- CLUSTER-SCALE for 177 free parameters (raise/parallelize with islands).
# These are a starting point, not a converged run; a real fit needs far more evaluations.
population_size = 354
max_iterations = 3000
refine = 1

###################
### Experiments ###
###################

# One time course: 8 nuclear observables over the wt condition, t = 0..1.36e5 (600 points).
# First .exp column is `time`, so this is inferred as a time_course; the simulation outputs at
# exactly the data's time points.  Single condition -> no condition:/perturbations: needed.
experiment: v3_2_0, data: v3_2_0.exp

##################
### Parameters ###
##################
# 177 free parameters bound to model ids BY NAME (ADR-0034, no __FREE alias), bracketing the
# PEtab lower/upper bounds.  Kinetic rate constants search on a log10 scale (loguniform);
# three log-scaled rates whose PEtab lower bound is 0 (kDpApc_1, kDpE2f1, kPhC25A) can't be
# log-searched, so they use a linear uniform prior over [0, upper].  Initial concentrations
# and the 16 observation-model parameters (offsets o*, scales s*) search on a linear scale.
#
# 114 kinetic + 47 initial-condition (of 73; 26 fixed) + 16 observation = 177 estimated.

