# COVID-19 regional epidemic, New York-Newark-Jersey City MSA (NY-NJ-PA) -- deterministic
# ODE fit of DAILY new detected COVID-19 case counts over a single epidemic wave (the
# first wave: model day t = 50..151, i.e. 2020-03-11..2020-06-20; model day 0 = 2020-01-21).
#
# Real-world PyBNF edition-2 fitting job derived from:
#   Mallela A, Lin YT, Hlavacek WS. "Differential contagiousness of respiratory disease
#   across the United States." Epidemics 2023; 45:100718.  DOI 10.1016/j.epidem.2023.100718.
#   (the single-phase, 6-parameter per-MSA compartmental model; MAP R0 across 280 MSAs).
# Model lineage: Lin YT, et al. "Daily Forecasting of Regional Epidemics of Coronavirus
#   Disease with Bayesian Uncertainty Quantification, United States." Emerg Infect Dis
#   2021; 27(3):767-778.  DOI 10.3201/eid2703.203364.
#
# This is a port of the authors' OWN PyBioNetFit setup (DataS1/PyBioNetFit/New York-Newark-
#   Jersey City, NY-NJ-PA/) from their legacy edition-1 adaptive-MCMC SAMPLING run
#   (fit_type=am, objfunc=neg_bin_dynamic) to an edition-2 `de` FIT -- cheaper and simpler
#   than reproducing the Bayesian posterior. The five model free parameters and their
#   uniform bounds, and both the count likelihood and its differencing, are exactly the
#   authors' conf; only the algorithm (sampler -> optimizer) and the edition-2 surface differ.
#
# NATIVE-ONLY (not PEtab-exportable): the negative-binomial count likelihood was removed
#   from PEtab v2, so this job cannot round-trip through PEtab (like Erickson-2019/igf1r).
#   Verified by export_job raising NotImplementedError + a real bngsim fit; NOT by a PEtab
#   round-trip. See skills/curate-pybnf-job/references/petab-compliance.md.
#
# Fit data -- DAILY new detected cases (NOT cumulative, despite the `_Cum` observable name):
#   nyc.exp -- `# time CumNum_detected_cases_Cum()`, one row per day t = 50..151. The model
#   observable CumNum_detected_cases_Cum() is a running (cumulative-like) count; the per-
#   observable `cumulative` flag below differences it row-to-row into daily incidence before
#   scoring (the explicit, family-independent successor to neg_bin_dynamic's legacy `_Cum`
#   substring convention). CumNum_detected_cases_Cum() is a model FUNCTION -> parens in the
#   .exp header; listed without parens in _manifest.py and in the noise_model line below.
#
# Run (with BNGPATH set, from this folder):
#   cd pybnf-jobs/Lin-2021/nyc && pybnf -c nyc.conf

output_dir = output

# Opt into the edition-2 config language (PEtab-aligned experiment:/data:).
edition = 2

# In-process bngsim backend (the new-era default). The model's counter() time mechanism
# (rule `0->counter() 1`, gating if(t>sigma) social distancing) needs integration to start
# at t=0; the data grid starts at t=50, but the synthesized time course forces a leading
# t=0 baseline (pset.py), so counter() == simulation time under bngsim.
bngl_backend = bngsim

# The model (no `begin actions` block -- the experiment below synthesizes the time course).
model: nyc.bngl

#######################
### General Options ###
#######################

delete_old_files = 1

# Per-simulation wall-time cap (s). At the corrected census S0 (~19.2M), a high-beta trial
# parameter set produces an explosive, very stiff epidemic that integrates slowly around the
# day-63 social-distancing discontinuity; such sets do not fit and are better failed fast than
# left to grind against the 3600 s default. A well-behaved sim on this 31-species network is
# well under 1 s, so 30 s only culls the pathological trials (scored as failed simulations).
wall_time_sim = 30
max_failed_simulations = 2000

#######################
### Fitting Options ###
#######################

# Differential evolution -- a plain FIT, replacing the authors' `am` (adaptive-MCMC sampler).
job_type = de

# Negative-binomial COUNT likelihood (the authors' objfunc=neg_bin_dynamic). Counts are
# over-dispersed non-negative integers, so least squares is wrong; neg_bin scores each count
# against the negative-binomial probability given the model's predicted MEAN.
#   * location = mean  -- MANDATORY: the ODE gives the MEAN count and the data were generated
#                         at the mean, while neg_bin defaults to the median (ADR-0031). The
#                         authors' neg_bin_dynamic pinned MEAN; this keeps parity.
#   * dispersion = fit r_disp -- the over-dispersion r is ESTIMATED as a free nuisance
#                         (the legacy hard-coded r__FREE; forbidden in edition 2). Declared
#                         below like any other free parameter.
# The whole-fit line names the global objective (required); the per-observable line adds the
# cumulative->incident transform (`cumulative` is per-observable ONLY -- a whole-fit
# cumulative is rejected, parse.py). Both name the same nuisance r_disp (deduped, objective.py).
noise_model = neg_bin, dispersion = fit r_disp, location = mean
noise_model CumNum_detected_cases_Cum = neg_bin, dispersion = fit r_disp, location = mean, cumulative

# Search budget. The authors ran adaptive MCMC for ~1e5 samples on a cluster; this de fit is
# a cheap workstation run. Raise population_size/max_iterations for a tighter optimum.
population_size = 30
max_iterations = 60
refine = 1
verbosity = 1

###################
### Experiments ###
###################

# One time course: daily detected cases over t = 50..151. First .exp column is `time`, so
# this is inferred as a time_course; the simulation outputs at exactly the data's days
# (plus the forced t=0 baseline).
experiment: nyc, data: nyc.exp

##################
### Parameters ###
##################
# Five model free parameters bound to the model ids BY NAME (ADR-0034, no __FREE alias), plus
# the negative-binomial dispersion nuisance r_disp. Bounds are the authors' conf verbatim.
# Nominals in nyc.bngl are an INDEPENDENT PyBNF `de` best fit (corrected census S0), NOT the
# shipped MLE_params.txt -- which does not reproduce the data with the placeholder S0/sigma
# (see VALIDATION.md). The de fit recovers t0 near the published value once S0 is corrected.
#
#   id       bounds   de nominal   published MLE   role
#   t0       0   60   26.633393    27.367359       start day of the regional epidemic
#   beta     0   10   0.537913     0.670589        transmission rate constant (/d)
#   lambda0  0   10   9.160433     0.105464        social-distancing relaxation eigenvalue (/d)
#   p0       0   1    0.591675     0.752098        social-distancing steady-state setpoint (fraction protected)
#   fD       0   1    0.883484     0.262349        fraction of mild symptomatic cases detected
#   r_disp   1   30   9.886720     11.213833       negative-binomial dispersion (likelihood only, not a model rate)
uniform_var = t0       0   60
uniform_var = beta     0   10
uniform_var = lambda0  0   10
uniform_var = p0       0   1
uniform_var = fD       0   1
loguniform_var = r_disp 1  30
