# COVID-19 regional epidemic, New York City MSA (NY-NJ-PA) -- deterministic ODE compartmental
# model with TWO-PHASE social distancing (n=1). Fit of DAILY new detected COVID-19 case counts
# over 2020-01-21..2020-07-09 (model day t = 0..170). Native-only (neg_bin count likelihood).
#
# Real-world PyBNF edition-2 fitting job derived from:
#   Lin YT, et al. "Daily Forecasting of Regional Epidemics of Coronavirus Disease with Bayesian
#   Uncertainty Quantification, United States." Emerg Infect Dis 2021; 27(3):767-778.
#   DOI 10.3201/eid2703.203364.  (the multi-phase forecasting model; NYC = "BigApple")
#
# Port of the authors' OWN PyBioNetFit setup (PyBNF examples/COVID19forecasting_aMCMC/BigApple/:
#   m1.bngl, m1.conf, m1.exp) from their legacy edition-1 adaptive-MCMC SAMPLING run (fit_type=am,
#   objfunc=neg_bin_dynamic) to an edition-2 `de` FIT. The nine model free parameters and their
#   uniform bounds, and both the count likelihood and its differencing, are the authors' conf.
#
# GOLD-STANDARD reproduction: unlike the single-phase `nyc/` slug (placeholder S0 in the shipped
#   DataS1 file -> published MLE does not reproduce), this model ships the correct NYC census S0
#   (19,216,182) and the published MAP REPRODUCES the data (median ~13% rel err), capturing the
#   broad NYC plateau (days ~68-85) that one social-distancing phase cannot. See VALIDATION.md.
#
# NATIVE-ONLY (not PEtab-exportable): neg_bin + mean-centering are outside the PEtab v2 subset.
#   Verify by export_job raising NotImplementedError + a real fit; NOT by a PEtab round-trip.
#
# Fit data -- DAILY new detected cases: nyc_multiphase.exp (`#time fDCs_Cum`, t = 0..170). The
#   model observable fDCs_Cum is the true cumulative detected-case count (integral of the detection
#   rate fD*(1-fA)*kL*nE5); the per-observable `cumulative` flag differences it row-to-row into
#   daily incidence before scoring. fDCs_Cum is a Molecules observable (no parens).
#
# Run (with BNGPATH set, from this folder):
#   cd pybnf-jobs/Lin-2021/nyc_multiphase && pybnf -c nyc_multiphase.conf

output_dir = output

edition = 2
bngl_backend = bngsim

# counter() seeds at 1 and grows at rate 1 -> the observable `t` = 1 + simulation_time; the
# synthesized time course forces a leading t=0 baseline (pset.py), so integration starts at 0.
model: nyc_multiphase.bngl

#######################
### General Options ###
#######################

delete_old_files = 1

# Per-simulation wall-time cap (s): at S0 ~19.2M a high-beta trial produces a very stiff epidemic
# at the phase-change discontinuities; such sets do not fit and are better failed fast than left to
# grind against the 3600 s default. A well-behaved sim on this ~35-species network is well under 1 s.
wall_time_sim = 30
max_failed_simulations = 4000

#######################
### Fitting Options ###
#######################

# Differential evolution -- a plain FIT, replacing the authors' `am` adaptive-MCMC sampler.
job_type = de

# Negative-binomial COUNT likelihood (the authors' objfunc=neg_bin_dynamic): over-dispersed integer
# counts scored against the model's predicted MEAN. location = mean is MANDATORY (the ODE gives the
# mean; neg_bin defaults to median). dispersion = fit r_disp estimates the over-dispersion as a free
# nuisance (the legacy r__FREE, forbidden in edition 2). The whole-fit line names the global
# objective; the per-observable line adds the cumulative->incident transform (`cumulative` is
# per-observable ONLY -- a whole-fit cumulative is rejected). Both name the same r_disp (deduped).
noise_model = neg_bin, dispersion = fit r_disp, location = mean
noise_model fDCs_Cum = neg_bin, dispersion = fit r_disp, location = mean, cumulative

# Search budget (10 free params -> a wider search than the 6-param nyc/ slug). Raise for a tighter
# optimum. The published MAP already reproduces, so nominals are validated independently of this fit.
population_size = 60
max_iterations = 80
refine = 1
verbosity = 1

###################
### Experiments ###
###################

# One time course: daily detected cases over t = 0..170 (first .exp column is `time`).
experiment: nyc_multiphase, data: nyc_multiphase.exp

##################
### Parameters ###
##################
# Nine model free parameters bound to the model ids BY NAME (ADR-0034, no __FREE alias), plus the
# negative-binomial dispersion nuisance r_disp. Bounds are the authors' m1.conf verbatim. Nominals
# in nyc_multiphase.bngl are the authors' published MAP (BigApple/adaptive_files/MLE_params.txt),
# which reproduces the data (see VALIDATION.md).
#
#   id         bounds        published MAP   role
#   t0         0    60       32.831672       start day of the regional epidemic
#   t_delta    0    60       0.072681        delay from t0 to phase-1 social distancing (sigma=t0+t_delta)
#   t_delta2   0    200      110.222846      delay from sigma to phase-2 (tau1=t0+t_delta+t_delta2)
#   beta       0    10       2.033369        transmission rate constant (/d)
#   lambda0    0    10       0.098304        phase-1 social-distancing relaxation eigenvalue (/d)
#   p0         0    1        0.872484        phase-1 setpoint (fraction protected)
#   lambda1    0    10       5.180963        phase-2 social-distancing relaxation eigenvalue (/d)
#   p1         0    1        0.736221        phase-2 setpoint (fraction protected)
#   fD         0    1        0.114511        fraction of mild symptomatic cases detected
#   r_disp     1    30 (log) 10.265565       negative-binomial dispersion (likelihood only, not a model rate;
#                                             authors' bound 0-30 -> 1-30 on a log scale, as the nyc/ slug)
uniform_var = t0       0   60
uniform_var = t_delta  0   60
uniform_var = t_delta2 0   200
uniform_var = beta     0   10
uniform_var = lambda0  0   10
uniform_var = p0       0   1
uniform_var = lambda1  0   10
uniform_var = p1       0   1
uniform_var = fD       0   1
loguniform_var = r_disp 1  30
