# MEK1/MEK2 isoform ERK-cascade model -- Bayesian uncertainty quantification by ADAPTIVE MCMC.
# EDITION-2 (new-era) port of the authors' MEK_isoform_aMCMC job: ONE model (wt.bngl) + four
# `condition:` perturbations (Mechanism A). Focused UQ on the two profile-likelihood-identifiable
# feedback rate constants (d3, u3), holding the other 25 rate constants FIXED at Kocieniewski &
# Lipniacki's Table-2 defaults (= Miller Table 2 = the wt.bngl nominal values).
#
#   Miller EF, Mallela A, Neumann J, Lin YT, Hlavacek WS, Posner RG. Front Immunol 2026; 17:1663008.
#   aMCMC sampler: Neumann J, Lin YT, Mallela A, Miller EF, et al. Bioinformatics 2022; 38:1770.
#   Base model: Kocieniewski & Lipniacki, Phys Biol 2013; 10:035006.
#   WT quant: Kamioka et al. JBC 2010; 285:33540 (Fig 3D). Qualitative: Catalanotti et al. NSMB 2009.
#
# THE PAPER'S RESULT = the (d3, u3) posterior (Fig 7 marginals; Fig 5/6 predictive bands; Table 4).
#
# ---- WHY ONE MODEL + CONDITIONS (edition-2 Mechanism A) --------------------------------------
# Unlike the DE job, here the perturbed parameters (b2/b4/p4/u4/b5) are FIXED (not fit), so the
# conditions perturb FIXED model parameters; the KO/T292D changes perturb the fixed IC parameters
# MEK1_0 / MEK1_0_T292p. Edition-2 conditions perturb any model parameter (ADR-0027; bngsim mutant
# path), and bngsim re-derives the seed-species initial concentrations from the perturbed params, so
# every perturbation is a param-only condition on the single WT model. T292D's b5/3 is written as the
# absolute value 4e-9/3 (b5 is fixed at K&L's 4e-9 here, so the division is a constant). Each
# experiment's regenerated network is byte-identical to the legacy per-variant model (Gate 2).
# Kept legacy twin: ../mek_isoform_amcmc_legacy/.
#
# NATIVE-ONLY (BPSL probit .prop + chi_sq_dynamic => not PEtab-v2-exportable).
#
# HEAVY: the paper ran 5 chains, each 25k burn-in + 25k adapt + 250k production. This conf defines
# ONE chain; run it 5x (different seeds) for the ensemble. For a workstation, cut max_iterations.
#
# Run (with BNGPATH set, from this folder):   pybnf -c mek_isoform_amcmc.conf

output_dir=output
edition = 2
bngl_backend = bngsim

model: wt.bngl

# Save full observable trajectories for every sampled parameter set (-> posterior-predictive bands).
output_trajectory = MEK_pRDS, scaled_pSOS1, scaled_pEGFR, scaled_pERK

###################
### Conditions  ###
###################
condition: n78g,  perturbations: b2 = 0, b4 = 0
condition: t292a, perturbations: p4 = 0
condition: ko,    perturbations: MEK1_0 = 0
condition: t292d, perturbations: MEK1_0 = 0, MEK1_0_T292p = 134000, u4 = 0, b5 = 1.3333333333333335e-9  # b5 fixed at K&L 4e-9 => b5/3 (emit path refuses relative-on-fixed); value = 4e-9/3 to full double precision

###################
### Experiments ###
###################
experiment: WT,    data: WT.exp, WT.prop
experiment: KO,    condition: ko,    data: KO.prop,    t_end: 3600, n_steps: 12
experiment: N78G,  condition: n78g,  data: N78G.prop,  t_end: 3600, n_steps: 12
experiment: T292A, condition: t292a, data: T292A.prop, t_end: 3600, n_steps: 12
experiment: T292D, condition: t292d, data: T292D.prop, t_end: 3600, n_steps: 12

#######################
### Fitting Options ###
#######################
# Adaptive MCMC (Neumann et al. 2022). One Markov chain (population_size=1). chi_sq_dynamic fits the
# noise level sigma as a free parameter; the BPSL orderings enter as probit terms (confidence/tolerance).
job_type = am
objective = chi_sq_dynamic
population_size = 1

# 25k burn-in + 25k adaptation + 250k production = 300k iterations. Cut for a workstation smoke run.
max_iterations = 300000
burn_in = 25000
adaptive = 25000
sample_every = 1
step_size = 0.0001
save_best_data = 1
verbosity = 0

##################
### Parameters ###
##################
# Six sampled parameters: 2 feedback rate constants (d3, u3), the noise hyperparameter (sigma), and
# 3 output scaling factors. Bounds = Table 3 "Bayesian UQ bounds". The other 25 rate constants are
# NOT declared free, so they stay at wt.bngl's nominal = K&L Table-2 defaults. starting_params seeds
# the chain (order = the var list below: d3, u3, sigma, scalepEGFR, scalepERK, scalepSos1).
loguniform_var = d3 1e-5 1e-1
loguniform_var = u3 1e-5 1e-1
loguniform_var = sigma__FREE 0.1 10
loguniform_var = scalepEGFR 3.0e-5 6.0e-5
loguniform_var = scalepERK 2.0e-6 5.0e-6
loguniform_var = scalepSos1 9.0e-5 3.0e-4

starting_params = 0.0008576067553095475 0.00044229730334415375 5.0 5.2709948217252634e-05 3.891540224026214e-06 0.00020032075222804925
