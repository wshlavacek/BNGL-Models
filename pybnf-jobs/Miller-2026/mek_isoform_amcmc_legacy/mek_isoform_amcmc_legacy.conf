# LEGACY (edition-1) TWIN -- archive/reference + BNG2.pl reproduction oracle. The PRIMARY job is the
# edition-2 ../mek_isoform_amcmc (one model + condition: perturbations). This edition-1 job is kept,
# clearly labeled, for SI-verbatim provenance and as the independent cross-engine reproduction oracle.
#
# MEK1/MEK2 isoform ERK-cascade model -- Bayesian uncertainty quantification by ADAPTIVE MCMC.
# Focused UQ on the two profile-likelihood-identifiable feedback rate constants (d3, u3), holding
# the other 25 rate constants FIXED at Kocieniewski & Lipniacki's original defaults (Miller Table 2).
# Faithful edition-1 (legacy) port of the authors' MEK_isoform_aMCMC job.
#
#   Miller EF, Mallela A, Neumann J, Lin YT, Hlavacek WS, Posner RG. Front Immunol 2026; 17:1663008.
#   aMCMC sampler: Neumann J, Lin YT, Mallela A, Miller EF, et al. Bioinformatics 2022; 38:1770.
#   Base model: Kocieniewski & Lipniacki, Phys Biol 2013; 10:035006.
#   WT quant data: Kamioka et al. J Biol Chem 2010; 285:33540 (Fig 3D). Qualitative orderings:
#   Catalanotti et al. Nat Struct Mol Biol 2009; 16:294. BPSL constraints = probit (confidence/tolerance).
#
# THE PAPER'S RESULT reproduced by this job = the (d3, u3) posterior (Fig 7 marginals; Fig 5/6
# posterior-predictive bands; Table 4 ESS / R-hat). "Bayesian UQ bounds" = Table 3, last column.
#
# ---- SCOPE vs the DE slug --------------------------------------------------------------------
# This is a SEPARATE analysis from ../mek_isoform_de (the 31-parameter MLE): the aMCMC baseline is
# Kocieniewski & Lipniacki's ORIGINAL parameterization (25 rate constants held at their Table-2
# defaults), with only d3, u3 (+ noise sigma + 3 output scaling factors) sampled. Paper Sec 2.4:
# "for simplicity, we considered only two adjustable model parameters."
#
# ---- WHY EDITION-1 (legacy) + NATIVE-ONLY ----------------------------------------------------
# Same as the DE slug: per-model perturbation of parameters via the `X__FREE` token idiom; `am`
# fit + `chi_sq_dynamic` noise model + BPSL constraints => native-only (not PEtab-exportable).
# No `edition`/`bngl_backend` line -> legacy + BNG2.pl. Each model runs its own action (c1=0.02).
# NOTE: the edition-2 twin ../mek_isoform_amcmc expresses these same perturbations as one model + four
# condition: blocks (fixed-param / IC perturbations enabled by lanl/PyBNF ADR-0027; output_trajectory
# by lanl/PyBNF#483).
#
# HEAVY: the paper ran 5 independent chains, each 25,000 burn-in + 25,000 adaptation + 250,000
# production iterations (~1.25M objective evaluations, ~5.15 days on 25 CPUs). This conf defines ONE
# chain; run it 5x (different seeds) for the 5-chain ensemble. For a workstation, cut max_iterations.
#
# Run (with BNGPATH set, from this folder):   pybnf -c mek_isoform_amcmc_legacy.conf

output_dir=output

model = MEK1_WT.bngl    : WT.exp, WT.prop
model = MEK1_KO.bngl    : KO.prop
model = MEK1_N78G.bngl  : N78G.prop
model = MEK1_T292A.bngl : T292A.prop
model = MEK1_T292D.bngl : T292D.prop

# Save full observable trajectories for every sampled parameter set (-> posterior-predictive bands).
output_trajectory = MEK_pRDS_WT, scaled_pSOS1, scaled_pEGFR, scaled_pERK, MEK_pRDS_KO, MEK_pRDS_N78G, MEK_pRDS_T292A, MEK_pRDS_T292D

#######################
### Fitting Options ###
#######################

# Adaptive MCMC (Neumann et al. 2022). One Markov chain (population_size=1).
fit_type=am
objfunc=chi_sq_dynamic
population_size=1

# 25k burn-in + 25k adaptation (learn the proposal covariance) + 250k production = 300k iterations.
max_iterations=300000
burn_in=25000
adaptive=25000
sample_every=1
step_size=0.0001
save_best_data=1
verbosity=0

##################
### Parameters ###
##################
# Six sampled parameters: 2 feedback rate constants (d3, u3), the noise hyperparameter (sigma), and
# 3 output scaling factors. Bounds = Table 3 "Bayesian UQ bounds". starting_params seeds the chain
# at the DE optimum (order matches the var list below: d3, u3, sigma, scalepEGFR, scalepERK, scalepSos1).
loguniform_var = d3__FREE 1e-5 1e-1          # EGFR-dimer degradation (identifiable)
loguniform_var = u3__FREE 1e-5 1e-1          # Sos1 feedback-site dephosphorylation (identifiable)
loguniform_var = sigma__FREE 0.1 10          # noise-model hyperparameter (chi_sq_dynamic)
loguniform_var = scalepEGFR__FREE 3.0e-5 6.0e-5
loguniform_var = scalepERK__FREE 2.0e-6 5.0e-6
loguniform_var = scalepSos1__FREE 9.0e-5 3.0e-4

starting_params = 0.0008576067553095475 0.00044229730334415375 5.0 5.2709948217252634e-05 3.891540224026214e-06 0.00020032075222804925
