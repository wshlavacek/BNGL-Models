# MEK1/MEK2 isoform ERK-cascade model -- global MLE by DIFFERENTIAL EVOLUTION, fusing the
# QUANTITATIVE WT time-series (WT.exp) with 90 QUALITATIVE up/down orderings (BPSL .prop).
# EDITION-2 (new-era) port of the authors' MEK_isoform_optimization_DE job: ONE model (wt.bngl)
# + four `condition:` perturbations for the KO/N78G/T292A/T292D cell lines (Mechanism A).
#
#   Miller EF, Mallela A, Neumann J, Lin YT, Hlavacek WS, Posner RG. Front Immunol 2026; 17:1663008.
#   Base ODE model: Kocieniewski P, Lipniacki T. Phys Biol 2013; 10:035006 (8 species, 41 rules).
#   Quantitative WT data: Kamioka et al. J Biol Chem 2010; 285:33540 (Fig 3D, HeLa + 50 ng/ml EGF).
#   Qualitative orderings: Catalanotti et al. Nat Struct Mol Biol 2009; 16:294 (Figs 3a/4h/4i/5d-g).
#
# THE PAPER'S RESULT = Table 3 "Best-fit value" (31 params) + Fig 1B (WT quant) + Fig 2 B/D/F/H.
# Reported DE objective = 24.0 (SI Table 7).
#
# ---- WHY ONE MODEL + CONDITIONS (edition-2 Mechanism A) --------------------------------------
# The four mutants perturb parameters (b2/b4/p4/u4/b5 -- some ALSO fit) and initial conditions
# (KO: MEK1_0=0; T292D: seed all MEK1 at Thr292p via MEK1_0=0 + MEK1_0_T292p=MEK1_0). A `condition:`
# now perturbs a FIXED model parameter or an IC-seeding parameter (MEK1_0), not only a free one
# (lanl/PyBNF, ADR-0027 realized in the bngsim mutant path). The KO/T292D initial-condition changes
# are param-only perturbations of MEK1_0 / MEK1_0_T292p; bngsim re-derives the seed-species initial
# concentrations from the perturbed params (_sync_species_initial_concentrations), so no species
# setConcentration is needed. Each experiment's regenerated network is byte-identical to the legacy
# per-variant model (Gate 2). Kept legacy twin: ../mek_isoform_de_legacy/.
#
# NATIVE-ONLY (BPSL .prop constraints => not PEtab-v2-exportable). Verify with the reproduction
# oracle (make_reproduction.py) + a bounded fit, NOT petab_roundtrip.py.
#
# Run (with BNGPATH set, from this folder):   pybnf -c mek_isoform_de.conf

output_dir=output
edition = 2
bngl_backend = bngsim

# ONE model (WT baseline; c1=0.02 stimulated signal, p2b_eff=p2b*5, no actions block).
model: wt.bngl

###################
### Conditions  ###
###################
# Each mutant is a named parameter/IC perturbation on the single WT model (Kocieniewski & Lipniacki
# p.8 (i)-(v) = Miller Methods). b2/b4/p4/u4/b5 are also fit (free) -> the condition overrides the
# fitted value for that experiment; MEK1_0 / MEK1_0_T292p are fixed ICs.
condition: n78g,  perturbations: b2 = 0, b4 = 0                                     # MEK1 dimerization ablation
condition: t292a, perturbations: p4 = 0                                            # Thr292 feedback ablation
condition: ko,    perturbations: MEK1_0 = 0                                         # MEK1 knockout (zero the T292~Y seed)
condition: t292d, perturbations: MEK1_0 = 0, MEK1_0_T292p = 134000, u4 = 0, b5 / 3 # constitutive Thr292p: seed swap + u4=0 + b5/3

###################
### Experiments ###
###################
# WT carries BOTH the quantitative time-series (WT.exp) and its BPSL orderings (WT.prop); the four
# mutants are constraint-only (t_end/n_steps give an output grid hitting every constraint time:
# 0/300/.../3600). The .prop reference cross-experiment observables (e.g. WT.prop -> KO.MEK_pRDS).
experiment: WT,    data: WT.exp, WT.prop
experiment: KO,    condition: ko,    data: KO.prop,    t_end: 3600, n_steps: 12
experiment: N78G,  condition: n78g,  data: N78G.prop,  t_end: 3600, n_steps: 12
experiment: T292A, condition: t292a, data: T292A.prop, t_end: 3600, n_steps: 12
experiment: T292D, condition: t292d, data: T292D.prop, t_end: 3600, n_steps: 12

#######################
### Fitting Options ###
#######################
# Differential evolution (the authors' algorithm). The 90 BPSL orderings enter the objective as soft
# weighted penalties (weight 0.001 each) added to the sum-of-squares on the 18 WT quant points.
job_type = de
objective = sos

# Authors: population_size=24, max_iterations=10000 on HPC. HEAVY -- lower for a workstation run.
population_size = 24
max_iterations = 10000
save_best_data = 1
verbosity = 2

##################
### Parameters ###
##################
# 28 rate constants + 3 output scaling factors = 31 free ids, bound BY NAME to model parameters
# (ADR-0034, no __FREE marker). Bounds = the authors' verbatim optimization bounds (= Table 3).
# The model uses p2b_eff = p2b*5; the free id `p2b` binds the fit base. scalepEGFR widened to
# [3e-5,3e-4] to bracket Table 3's own best-fit 1.1e-4 (audit correction, see VALIDATION.md).
loguniform_var = c2 9e-9 4e-6
loguniform_var = p3 9e-11 4e-8
loguniform_var = a1 1.27e-8 1.29e-6
loguniform_var = u3 8e-5 3e-2
loguniform_var = c1_L 0.0009 0.04
loguniform_var = t1 99 101
loguniform_var = d3 8e-5 3e-2
loguniform_var = b1 2e-9 6e-7
loguniform_var = n1 9e-5 4e-2
loguniform_var = b2 8e-7 3e-4
loguniform_var = n2 8e-5 3e-2
loguniform_var = b3 8e-7 3e-4
loguniform_var = n3 1e-3 5e-1
loguniform_var = b4 8e-7 3e-4
loguniform_var = n4 8e-5 3e-2
loguniform_var = i1 9e-4 4e-1
loguniform_var = a2 2e-9 6e-7
loguniform_var = i2 8e-4 3e-1
loguniform_var = p1 8e-9 4e-6
loguniform_var = u1 3e-4 7e-2
loguniform_var = p2a 8e-8 3e-5
loguniform_var = p2b 1e-6 5e-4
loguniform_var = u2 9e-4 4e-1
loguniform_var = p4 9e-11 3e-8
loguniform_var = u4 9e-6 4e-3
loguniform_var = b5 2e-10 6e-8
loguniform_var = n5 9e-6 4e-3
loguniform_var = u5 19 21
loguniform_var = scalepEGFR 3.0e-5 3.0e-4
loguniform_var = scalepERK 2.0e-6 5.0e-6
loguniform_var = scalepSos1 9.0e-5 3.0e-4
