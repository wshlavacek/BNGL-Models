# LEGACY (edition-1) TWIN -- archive/reference + BNG2.pl reproduction oracle. The PRIMARY job is the
# edition-2 ../mek_isoform_de (one model + condition: perturbations). This edition-1 job is kept,
# clearly labeled, for SI-verbatim provenance and as the independent cross-engine reproduction oracle.
#
# MEK1/MEK2 isoform ERK-cascade model -- global MLE parameterization by DIFFERENTIAL EVOLUTION,
# fusing QUANTITATIVE WT time-series (WT.exp) with 90 QUALITATIVE up/down orderings (BPSL .prop).
# Faithful edition-1 (legacy) port of the authors' MEK_isoform_optimization_DE job.
#
#   Miller EF, Mallela A, Neumann J, Lin YT, Hlavacek WS, Posner RG. "Using PyBioNetFit to
#   leverage qualitative and quantitative data in biological model parameterization and
#   uncertainty quantification." Front Immunol 2026; 17:1663008. doi:10.3389/fimmu.2026.1663008
#   Base ODE model: Kocieniewski P, Lipniacki T. Phys Biol 2013; 10:035006 (8 species, 41 rules).
#   Quantitative WT data: Kamioka et al. J Biol Chem 2010; 285:33540 (Fig 3D, HeLa + 50 ng/ml EGF).
#   Qualitative orderings: Catalanotti et al. Nat Struct Mol Biol 2009; 16:294 (Figs 3a/4h/4i/5d-g).
#
# THE PAPER'S RESULT reproduced by this job = Table 3 "Best-fit value" (31 params) + Fig 1B (WT
# quant) + Fig 2 B/D/F/H (qualitative satisfaction). Reported DE objective = 24.0 (SI Table 7).
#
# ---- WHY EDITION-1 (legacy), not edition-2 --------------------------------------------------
# The four mutant models zero out parameters that are ALSO fit (N78G: b2=b4=0; T292A: p4=0;
# T292D: u4=0, b5->b5/3, MEK1 seeded T292~Yp). Edition-1's `X__FREE` token substitution applies
# a fitted value ONLY where the token appears -- the variant models simply carry the literal (0,
# b5/3) instead, so the perturbation survives. Edition-2 bind-by-id (ADR-0034) overrides a
# parameter GLOBALLY by name (pset.py:_override_param_block_values), which would wipe out a
# variant's `b2 0`. So per-model perturbation of a fitted parameter needs the legacy token idiom.
# No `edition`/`bngl_backend` line => legacy mode + the classic BNG2.pl backend (BNGPATH). Each
# model's own `begin actions` block (setParameter c1=0.02 + simulate suffix) is executed by legacy
# PyBNF; the suffix (WT/KO/...) matches the .exp/.prop base name and the BPSL dotted references.
# NOTE: the edition-2 twin ../mek_isoform_de expresses these same perturbations as one model + four
# condition: blocks (fixed-param / IC perturbations enabled by lanl/PyBNF ADR-0027).
#
# NATIVE-ONLY (not PEtab-v2-exportable): attaching BPSL .prop constraints => export_job raises
# NotImplementedError. Verify with the reproduction oracle (make_reproduction.py) + a bounded fit,
# NOT petab_roundtrip.py. See skills/curate-pybnf-job/references/bpsl-constraints.md.
#
# Run (with BNGPATH set, from this folder):   pybnf -c mek_isoform_de_legacy.conf

output_dir=output

# One model per cell line (perturbation baked into each; the 31 free tokens bind across all five).
# WT carries BOTH the quantitative time-series (WT.exp) and its BPSL orderings (WT.prop); the four
# mutants are constraint-only (their EXP files are all-NaN -- quantitative data exist for WT only).
model = MEK1_WT.bngl    : WT.exp, WT.prop
model = MEK1_KO.bngl    : KO.prop
model = MEK1_N78G.bngl  : N78G.prop
model = MEK1_T292A.bngl : T292A.prop
model = MEK1_T292D.bngl : T292D.prop

#######################
### Fitting Options ###
#######################

# Differential evolution (the authors' algorithm). The 90 BPSL orderings enter the objective as
# soft weighted penalties (weight 0.001 each), added to the sum-of-squares on the 18 WT quant
# points: F(theta) = F_quant + F_qual  (Mitra et al. 2018; paper Eqs 5 + 11).
fit_type=de
objfunc=sos

# The authors ran population_size=24, max_iterations=10000 on an HPC (2825 obj evals, ~2 min/sim,
# 25 CPUs). HEAVY -- lower max_iterations for a workstation smoke/trending run (see VALIDATION.md).
population_size=24
max_iterations=10000
save_best_data=1
verbosity=2

##################
### Parameters ###
##################
# 28 rate constants + 3 output scaling factors = 31 free tokens. Bounds are the authors' verbatim
# optimization bounds (= Table 3 "Optimization bounds"), one/two decades around Kocieniewski &
# Lipniacki's Table-1 defaults. p2b = p2b__FREE*5 and (T292D) b5/3 are applied in the models.
loguniform_var = c2__FREE 9e-9 4e-6          # EGFR dimerization (ligand-driven)
loguniform_var = p3__FREE 9e-11 4e-8         # ERK -> Sos1 feedback phosphorylation
loguniform_var = a1__FREE 1.27e-8 1.29e-6    # Ras activation by EGFR-Sos1
loguniform_var = u3__FREE 8e-5 3e-2          # Sos1 feedback-site dephosphorylation
loguniform_var = c1_L__FREE 0.0009 0.04      # stimulated ligand-binding rate (see NOTE below)
loguniform_var = t1__FREE 99 101             # EGFR transphosphorylation
loguniform_var = d3__FREE 8e-5 3e-2          # ligand-bound EGFR-dimer degradation
loguniform_var = b1__FREE 2e-9 6e-7          # pEGFR-Sos1 association
loguniform_var = n1__FREE 9e-5 4e-2          # pEGFR-Sos1 dissociation
loguniform_var = b2__FREE 8e-7 3e-4          # MEK1 homodimer formation
loguniform_var = n2__FREE 8e-5 3e-2          # MEK1 homodimer dissociation
loguniform_var = b3__FREE 8e-7 3e-4          # MEK2 homodimer formation
loguniform_var = n3__FREE 1e-3 5e-1          # MEK2 homodimer dissociation
loguniform_var = b4__FREE 8e-7 3e-4          # MEK1-MEK2 heterodimer formation
loguniform_var = n4__FREE 8e-5 3e-2          # MEK1-MEK2 heterodimer dissociation
loguniform_var = i1__FREE 9e-4 4e-1          # Ras inactivation
loguniform_var = a2__FREE 2e-9 6e-7          # Raf activation by Ras-GTP
loguniform_var = i2__FREE 8e-4 3e-1          # Raf inactivation
loguniform_var = p1__FREE 8e-9 4e-6          # MEK1/2 activation by Raf
loguniform_var = u1__FREE 3e-4 7e-2          # MEK1/2 deactivation
loguniform_var = p2a__FREE 8e-8 3e-5         # ERK activation by MEK1
loguniform_var = p2b__FREE 1e-6 5e-4         # ERK activation by MEK2 (model uses p2b__FREE*5)
loguniform_var = u2__FREE 9e-4 4e-1          # ERK deactivation
loguniform_var = p4__FREE 9e-11 3e-8         # ERK -> MEK1 Thr292 feedback phosphorylation
loguniform_var = u4__FREE 9e-6 4e-3          # MEK1 Thr292 dephosphorylation
loguniform_var = b5__FREE 2e-10 6e-8         # PHP binding to MEK1-Thr292p
loguniform_var = n5__FREE 9e-6 4e-3          # PHP release from MEK1-Thr292p
loguniform_var = u5__FREE 19 21              # PHP-mediated MEK dephosphorylation
# Output scaling factors (copy number -> published AU). NOTE (audit correction): the authors'
# shipped conf bounded scalepEGFR to [3e-5, 6e-5], but Table 3's reported best-fit is 1.1e-4 and
# the model REQUIRES ~1.05e-4 to match the pEGFR peak (pEGFR_wt~9.5e4 copies x scale = 10 AU) --
# so [3e-5,6e-5] cannot reach the paper's own value. Widened to bracket it. See VALIDATION.md.
loguniform_var = scalepEGFR__FREE 3.0e-5 3.0e-4
loguniform_var = scalepERK__FREE 2.0e-6 5.0e-6
loguniform_var = scalepSos1__FREE 9.0e-5 3.0e-4

# NOTE (audit finding): c1_L__FREE is declared and reported (Table 3: 7.4e-3) but is NOT used by
# any reaction rule -- rule 4 uses `c1`, which each model's action fixes at 0.02 (Kocieniewski &
# Lipniacki's S0). So c1_L is INERT: its profile likelihood is flat (SI Fig 4) and it does not
# affect the objective (reproduction is identical whether c1_L = 7.4e-3 or anything in-bounds; the
# effective ligand signal is c1 = 0.02). Retained verbatim to mirror the authors' 31-parameter job.
