# Trivalent-ligand / bivalent-receptor aggregation -- NETWORK-FREE (NFsim), dose-response.
# Fit the bound-ligand fraction FL across a titration of total ligand. PEtab-v2-exportable.
#
# Real-world PyBNF edition-2 fitting job. The NETWORK-FREE model is from:
#   Monine MI, Posner RG, Savage PB, Faeder JR, Hlavacek WS. "Modeling multivalent
#   ligand-receptor interactions with steric constraints on configurations of cell-surface
#   receptor aggregates." Biophys J 2010; 98(1):48-56.  PMID: 20074516  DOI: 10.1016/j.bpj.2009.09.043
# The fit target FL (bound-ligand fraction) is the flow-cytometric binding titration of
#   Monine 2010 Fig 2a (Alexa-488 compound 6a to IgE-FceRI on RBL cells). The trivalent ligand
#   (compound 6a) was synthesized by Posner RG, et al. "Trivalent antigens for degranulation of
#   mast cells." Org Lett 2007; 9(18):3551-3554 (PMID 17691814) -- that paper reports DEGRANULATION,
#   not this binding titration.
#   (tlbr.exp: FL() vs. total ligand LTconc; the same problem as BioNetFit 1 example 3 and
#    PyBNF 2019 corpus problem 11-TLBR, Mitra et al., iScience 2019.)
#
# The trivalent ligand crosslinks bivalent receptors into aggregates that grow without bound, so
# the model has no finite reaction network and is simulated network-free with NFsim (method: nf).
# FL (bound-ligand fraction, = lambda/alpha) is read out across a titration of total ligand
# LTconc -- a parameter scan run to a fixed endpoint at each dose.
#
# PEtab-EXPORTABLE: verified with scripts/petab_roundtrip.py --job-type de --method nf
#   (export -> lint clean -> import). See skills/curate-pybnf-job/references/petab-compliance.md.
#
# NOTE: this model's shipped nominals (alpha=0.816, K1=0.467, K2=87.03) ARE Monine 2010's own
#   reported best-fit for the TLBR model (Table 1). Running the model as-is reproduces Fig 2a
#   (see make_reproduction.py + README.md). A separate PyBNF/Mitra-2019 re-fit (RuleHub
#   Published/Mitra2019/11-TLBR/fit_ss init7, sos=0.00214: alpha=0.746, K1=0.109, K2=33.6) lands
#   at a DIFFERENT point of the same sloppy K1-K2 valley (paper Fig S2) -- it reproduces the
#   normalized FL1 data but a different lambda curve; it is NOT Monine's reported result.
#   The published fit used differential evolution / scatter search with a large population on a
#   cluster; this conf uses a smaller population so it runs on a workstation. Raise population_size
#   for a full fit -- but note the fit is non-identifiable (see VALIDATION.md Gate 3b).
#
# Run (with BNGPATH set, from this folder):
#   cd pybnf-jobs/Monine-2010/tlbr && pybnf -c tlbr.conf

output_dir = output

edition = 2
bngl_backend = bngsim

model: tlbr.bngl

#######################
### General Options ###
#######################

# Kill a simulation and move on without it if it goes over 20 minutes.
wall_time_sim = 1200
delete_old_files = 1
output_every = 10

#######################
### Fitting Options ###
#######################

# Differential evolution (as the classic conf).
job_type = de

# Sum of squares (the scaled FL data carry no _SD columns).
objective = sos

max_iterations = 50
population_size = 50
verbosity = 2

# Average 3 network-free replicate runs per parameter set (stochastic NFsim output).
smoothing = 3

###################
### Experiment ###
###################

# Dose-response: a parameter scan over LTconc (the data's independent-variable column), each dose
# simulated network-free (method: nf) to a fixed endpoint t_end = 5000 s. (The classic model used
# steady_state=>1; NFsim cannot do a steady-state solve, so we integrate to t_end = 5000 s, the
# horizon the classic run used to reach steady state.)
experiment: tlbr, type: parameter_scan, method: nf, t_end: 5000, data: tlbr.exp

##################
### Parameters ###
##################

# Three free parameters bound to the model ids BY NAME (ADR-0034, no __FREE alias). alpha (the FL
# scaling) on a linear scale; the two affinities K1, K2 on log scales (0.01x-100x the Monine 2010
# Table-1 values K1=0.467, K2=87.03), exactly as the classic tlbr fit's bounds.
uniform_var = alpha 0.5 1.5
loguniform_var = K1 0.00467 46.7
loguniform_var = K2 0.8703 8703
