# 5DL1 two-state promoter -- EXACT MOMENT-ODE fit (deterministic twin of five_dl1_ssa).
#
# Real-world PyBNF edition-2 fitting job derived from:
#   Rijal K, Mehta P. eLife 2025;14:RP103877. DOI: 10.7554/eLife.103877
# Model: Fig. 3a. Fit design and reported parameters: Fig. 7 / Eq. 14 / Appendix 6.
# Experimental target: Jones DL, Brewster RC, Phillips R. Science 2014;346:1533-1536.
# DOI: 10.1126/science.1255301, Fig. 3A (5DL1 series), using the exact numeric
# array released with the Rijal/Mehta analysis. See README.md for provenance and adaptations.
#
# This job fits the SAME data and the SAME two free parameters as `five_dl1_ssa`, but obtains
# E[m] and E[m^2] by integrating the process's exact moment equations instead of by averaging
# SSA trajectories. The two-state model's propensities are all linear and its promoter
# indicator is binary, so the moment hierarchy closes exactly -- the model file's four species
# ARE the moments <g>, <m>, <gm>, <m^2>. See five_dl1_ode.bngl for the derivation.
#
# Consequences, and the reason this exists as a twin rather than a replacement:
#   * no Monte Carlo error, so no `smoothing` and a noise-free objective surface
#   * the objective is smooth and differentiable, so a gradient optimizer applies
#   * it is a deterministic reference the exact-SSA job can be validated against
# It is NOT a substitute for the SSA job: this closure is exact only because every propensity
# is linear. Any bimolecular step (e.g. explicit repressor binding) would break it, and the
# SSA job remains the general instrument.
#
# Run from this folder with BNGPATH set:
#   pybnf -c five_dl1_ode.conf

output_dir = output

edition = 2
bngl_backend = bngsim
model: five_dl1_ode.bngl

#######################
### General Options ###
#######################

delete_old_files = 1
wall_time_sim = 120
verbosity = 2
random_seed = 20250719

#######################
### Fitting Options  ###
#######################

# The moment-ODE objective is smooth and noise-free, so the general-objective trust region
# applies here where the SSA twin needs a metaheuristic. `sos` is Rijal Eq. 14: squared error
# in the mean plus squared error in the mRNA standard deviation.
job_type = gntr
objective = sos

population_size = 20
max_iterations = 200

###################
### Measurement ###
###################

# Deterministic moments read straight off the integrated network -- no ensemble averaging.
observable: Mean_mRNA, formula: m_mean
observable: mRNA_SD, formula: sqrt(m_second - m_mean^2)

# The source data are a Fano-factor-versus-mean curve. `mean_target` indexes that curve and sets
# the latent kon_R through the exact steady-state mean identity in the BNGL model. Each scan point
# is integrated to t=10 in units of 1/koff_R; the moment ODEs are fully relaxed well before then.
experiment: five_dl1, type: parameter_scan, method: ode, t_end: 10, data: five_dl1.exp

##################
### Parameters ###
##################

# Bounds keep r/gamma above the largest measured mean (5.46 molecules), so every scanned kon_R is
# nonnegative. Nominals are the Rijal Fig. 7 fit: r/gamma=87.48/9.80 and gamma=9.80.
uniform_var = r_over_gamma 5.50 18.0
loguniform_var = gamma 1.0 30.0
