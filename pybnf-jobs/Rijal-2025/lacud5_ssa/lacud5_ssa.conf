# lacUD5 two-state promoter -- exact SSA ensemble-moment fit with BNGsim.
#
# Real-world PyBNF edition-2 fitting job derived from:
#   Rijal K, Mehta P. eLife 2025;14:RP103877. DOI: 10.7554/eLife.103877
# Model: Fig. 3a. Fit design and reported parameters: Fig. 7 / Eq. 14 / Appendix 6.
# Experimental target: Jones DL, Brewster RC, Phillips R. Science 2014;346:1533-1536.
# DOI: 10.1126/science.1255301, Fig. 3A (lacUV5/lacUD5 series), using the exact numeric
# array released with the Rijal/Mehta analysis. See README.md for provenance and adaptations.
#
# Each exact SSA trajectory reports m and m^2. `smoothing` averages both columns over independent
# trajectories; the measurement layer then materializes E[m] and sqrt(E[m^2]-E[m]^2). Thus the
# ordinary `sos` objective is Rijal Eq. 14 (mean error squared + mRNA-SD error squared).
#
# Run from this folder with BNGPATH set:
#   pybnf -c lacud5_ssa.conf

output_dir = output

edition = 2
bngl_backend = bngsim
model: lacud5_ssa.bngl

#######################
### General Options ###
#######################

delete_old_files = 1
wall_time_sim = 120
verbosity = 2
random_seed = 20250719

#######################
### Fitting Options  ###
#######################

job_type = de
objective = sos

# Match the paper's 200-trajectory ensemble while keeping this a small workstation fit.
# make_reproduction.py defaults to 2,000 exact-SSA trajectories so the committed
# paper-comparison artifact has tighter Monte Carlo error.
smoothing = 200

population_size = 12
max_iterations = 30

###################
### Measurement ###
###################

# These are post-smoothing ensemble statistics, not single-trajectory observables.
observable: Mean_mRNA, formula: mRNA_count
observable: mRNA_SD, formula: sqrt(mRNA_squared - mRNA_count^2)

# The source data are a Fano-factor-versus-mean curve. `mean_target` indexes that curve and sets
# the latent kon_R through the exact steady-state mean identity in the BNGL model. Each scan point
# is simulated to t=10 in units of 1/koff_R, matching the steady-state horizon used for the paper's
# exact two-state benchmark (Rijal Figs. 4-6).
experiment: lacud5, type: parameter_scan, method: ssa, t_end: 10, data: lacud5.exp

##################
### Parameters ###
##################

# Bounds keep r/gamma above the largest measured mean (10 molecules), so every scanned kon_R is
# nonnegative. Nominals are the Rijal Fig. 7 fit: r/gamma=90.25/6.20 and gamma=6.20.
uniform_var = r_over_gamma 10.05 25.0
loguniform_var = gamma 1.0 25.0
