# cSTAR core signalling network, SKMEL-133 melanoma -- deterministic ODE, inhibitor panel.
#
# Real-world PyBNF fitting example derived from:
#   Rukhlenko OS, Halasz M, Rauch N, ... Kholodenko BN. "Control of cell state
#   transitions." Nature 2022; 609(7929):975-985.
#   PMCID: PMC9644236   DOI: 10.1038/s41586-022-05194-y
#   (The paper fit this model with pyBioNetFit; the .exp files are the authors' own fit
#   targets, from github.com/OleksiiR/cSTAR_Nature -> SKMEL-133_preproc/.)
#
# SKMEL-133 is a BRAF-V600E / PTEN-null, RAF-inhibitor-RESISTANT melanoma line. Unlike the
# Trk examples (ligand time courses), the design is a STEADY-STATE INHIBITOR PERTURBATION
# panel: equilibrate the network to its proliferative steady state (no drug), then apply a
# targeted-kinase inhibitor and read out the new steady state at 24 h (86400 s). Nine
# phospho / total-protein fold changes (vs. the no-drug baseline) are fit per perturbation.
# These are the authors' pyBioNetFit TRAINING data (single-drug dose responses; Methods p.24);
# the paper's published SKMEL-133 model-vs-data figure is Extended Data Fig. 17A (DPD vs
# dose/Kd, a derived output), and ED Fig. 16 is the SVM state separation. Underlying RPPA from
# Korkut et al., eLife 2015;4:e04640. Data carry per-point _SD -> chi_sq.
#
# Perturbations included here (dose1 = published I_<x>_conc; dose2 = 2x):
#   ERK inhibitor (dose1 + dose2), AKT inhibitor (dose1), SRC inhibitor (dose1). Each is a
#   Condition that sets one inhibitor's concentration parameter; PyBNF applies it (via
#   setParameter) after the drug-free pre-equilibration. These three inhibitors act purely
#   through the rate-law factor 1/(1+I_<x>_conc) with no sequestering binding, so the model
#   uses the parameter I_<x>_conc directly (== the free-inhibitor observable, exactly) --
#   see cstar_skmel133.bngl. (mTOR/PKC/CDK inhibitors act by competitive binding and are
#   left out of this parameter-driven panel.)
#
# NATIVE-ONLY: `normalization = init` (fold-change data) is NOT PEtab-v2-exportable --
#   like the shipped igf1r.conf. Verified with a tier-1 parse check + a bounded bngsim fit
#   + reproduction of the authors' fold changes, NOT with the PEtab round-trip. See
#   skills/curate-pybnf-job/references/petab-compliance.md.
#
# Run (with BNGPATH set, from this folder or with an absolute path):
#   pybnf -c cstar_skmel133.conf

output_dir = output

# Opt into the edition-2 config language (PEtab-aligned experiment:/condition:/data:).
edition = 2

# In-process bngsim backend (the new-era default).
bngl_backend = bngsim

# The model (no `begin actions` block -- the perturbations below synthesize the sims).
model: cstar_skmel133.bngl

#######################
### General Options ###
#######################

delete_old_files = 1
wall_time_sim = 3600

###################
### Conditions  ###
###################
# Baseline = no drug (the model defaults all inhibitor concentrations to 0). Each dose
# condition raises ONE inhibitor to its published concentration.
condition: dmso,      perturbations: I_ERK_conc = 0
condition: erk_dose1, perturbations: I_ERK_conc = 1.3122028733013222
condition: erk_dose2, perturbations: I_ERK_conc = 2.6244057466026444
condition: akt_dose1, perturbations: I_AKT_conc = 4.32073354133792
condition: src_dose1, perturbations: I_SRC_conc = 0.5173293874300976

###################
### Experiments ###
###################
# Pre-equilibrate under `dmso` (no drug, unmeasured, to steady state) -> apply one inhibitor
# -> measure the 24 h steady state. State carries across phases with no reset (ADR-0052).
# The .exp column headers ARE the model function names (with parentheses); each carries
# per-point _SD companions.
experiment: erk_dose1, preequilibrate: dmso, condition: erk_dose1, data: dose1_ERKinh.exp
experiment: erk_dose2, preequilibrate: dmso, condition: erk_dose2, data: dose2_ERKinh.exp
experiment: akt_dose1, preequilibrate: dmso, condition: akt_dose1, data: dose1_AKTinh.exp
experiment: src_dose1, preequilibrate: dmso, condition: src_dose1, data: dose1_SRCinh.exp

#######################
### Fitting Options ###
#######################

# Differential evolution (a global metaheuristic, as the paper corpus uses).
job_type = de

# The data are fold changes vs the no-drug baseline -> normalize each simulated observable
# to its initial (baseline) value before comparison (NOT PEtab-exportable -> native-only).
normalization = init

# The .exp files carry per-point _SD columns -> Gaussian chi-square.
objective = chi_sq

max_iterations = 50
population_size = 12
verbosity = 2

##################
### Parameters ###
##################
# Eight ERK/AKT/mTOR/CDK-axis connection coefficients (bare-id declarations in the model)
# that shape the measured fold changes, bound by name (ADR-0034, no __FREE), each on a log
# scale bracketing the published SKMEL-133 value by ~+/- one decade.
#
#   id           published   role
#   g_IRSERK     4.2243      IRS -> ERK
#   g_mTORERK    25          mTOR -> ERK (feedback)
#   g_SRCERK     10.742      SRC -> ERK
#   g_ERKAKT     0.16834     ERK -> AKT (the AKT rebound on ERK inhibition)
#   g_ERKSRC     98.898      ERK -> SRC
#   g_ERKCDK     79.800      ERK -> CDK -> RB (proliferation)
#   g_AKTmTOR    30          AKT -> mTOR -> S6K
#   g_CDKMYC     0.30487     CDK -> MYC
loguniform_var = g_IRSERK  0.42243  42.243
loguniform_var = g_mTORERK 2.5      250
loguniform_var = g_SRCERK  1.0742   107.42
loguniform_var = g_ERKAKT  0.016834 1.6834
loguniform_var = g_ERKSRC  9.8898   988.98
loguniform_var = g_ERKCDK  7.98     798.0
loguniform_var = g_AKTmTOR 3.0      300
loguniform_var = g_CDKMYC  0.030487 3.0487
