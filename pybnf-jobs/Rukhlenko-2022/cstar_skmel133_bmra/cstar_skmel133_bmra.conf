# cSTAR SKMEL-133 -- BMRA-CI-CONSTRAINED full connection-coefficient fit (real-world).
#
# Real-world PyBNF fitting example derived from:
#   Rukhlenko OS, Halasz M, Rauch N, ... Kholodenko BN. "Control of cell state
#   transitions." Nature 2022; 609(7929):975-985.
#   PMCID: PMC9644236   DOI: 10.1038/s41586-022-05194-y
#   Source model + data: github.com/OleksiiR/cSTAR_Nature
#     model  -> SKMEL-133_models/SKMEL-133-3.bngl
#     data   -> SKMEL-133_preproc/dose{1,2}_{ERK,AKT,SRC}inh.exp
#     BMRA   -> BMRA/results_SKMEL_133/SKMEL133_{rm,rs}_log_200_5K_withMyc.csv
#
# THE PAPER'S ACTUAL FIT (Methods p.24), reconstructed. The sibling ../cstar_skmel133 is a
# reduced 8-parameter DEMO. Here the FULL connection-coefficient set is freed and fit to the
# single-drug fold-change TRAINING data, UNDER the BMRA-inferred connection-coefficient
# confidence intervals imposed as INEQUALITY constraints:
#   "we constrained the parameters using the BMRA inferred connection coefficients within
#    their confidence intervals, and used ... pyBioNetFit ... which allows adding parameter
#    constraints in the forms of inequalities to the parameter fitting process." (p.24)
# The paper used scatter search (population 12, 50 iterations) + simplex, objective = sum of
# squares. We mirror that: job_type = ss, refine = 1 (simplex), chi_sq (the .exp carry _SD).
#
# WHAT IS FREE (23 params): the 20 g_XY crosstalk strengths (Eq. 24 alpha_Y^X =
# (1+g*Ya/K)/(1+Ya/K)) + the 3 DPD driving-force coefficients beta_j (Eq. 25). The K_XY and
# the restoring-force / landscape geometry are held at the authors' published values (the
# BMRA constraints act on the connection strengths). Bounds bracket the published value by
# ~+/-1 decade and span g=1 so each sign constraint is genuinely active.
#
# THE CONSTRAINTS (bmra_signs.prop, native-only BPSL): each BMRA-inferred connection pins
# the sign of its model coefficient (g>1 activation / g<1 inhibition, Eq. 24; degradation
# terms flipped), weighted by the BMRA confidence z=|mean|/std. Because PyBNF BPSL constrains
# model OBSERVABLES (not the Eq.14 Jacobian ratio the paper bounds), we enforce the robust,
# CI-supported content -- the connection's SIGN -- via cc_<edge>() carrier functions. See
# bmra_signs.prop and build_constraints.py. Verified: at the published parameters the model's
# g-signs match all 20 BMRA-inferred signs (job_type = check -> Satisfied 23/23).
#
# TRAINING = single-drug doses (ERK/AKT/SRC x dose1/dose2); the paper's VALIDATION set is the
# drug COMBINATIONS (not fit here). The mTOR/PKC/CDK single-drug arms act by competitive
# binding (dose needs setConcentration, which an edition-2 Condition cannot emit -- the
# igf1r / lanl-PyBNF#474 limitation), so they are omitted from the training set; see prep_exp.py.
#
# NATIVE-ONLY: `normalization ... = init` (fold-change data) AND the BPSL .prop both make this
# job non-PEtab-v2-exportable. Verify with tier-1 + `job_type = check` + a bounded fit + the
# fold-change reproduction, NOT with the PEtab round-trip.
#
# Run (with BNGPATH set, from this folder):
#   pybnf -c cstar_skmel133_bmra.conf
#   pybnf -c cstar_skmel133_bmra_check.conf     # satisfaction at the published parameters

output_dir = output

# Opt into the edition-2 config language (PEtab-aligned experiment:/condition:/data:).
edition = 2

# In-process bngsim backend (the new-era default).
bngl_backend = bngsim

# The model (no `begin actions` block -- the perturbations + constraint experiment below
# synthesize the sims). Carries the cc_<edge>() connection-sign carriers used by the .prop.
model: cstar_skmel133_bmra.bngl

#######################
### General Options ###
#######################

delete_old_files = 1
wall_time_sim = 3600

###################
### Conditions  ###
###################
# Baseline = no drug (all inhibitor concentrations default to 0). Each dose condition raises
# ONE parameter-driven inhibitor to its published concentration (dose2 = 2x dose1). These
# three inhibitors act purely via 1/(1+I_<x>_conc) with no binding, so setParameter is exact.
condition: dmso,      perturbations: I_ERK_conc = 0
condition: erk_dose1, perturbations: I_ERK_conc = 1.3122028733013222
condition: erk_dose2, perturbations: I_ERK_conc = 2.6244057466026444
condition: akt_dose1, perturbations: I_AKT_conc = 4.32073354133792
condition: akt_dose2, perturbations: I_AKT_conc = 8.64146708267584
condition: src_dose1, perturbations: I_SRC_conc = 0.5173293874300976
condition: src_dose2, perturbations: I_SRC_conc = 1.0346587748601952

###################
### Experiments ###
###################
# Six QUANTITATIVE fold-change experiments (training set): pre-equilibrate under `dmso`
# (no drug, unmeasured, to steady state) -> apply one inhibitor -> measure the 24 h (86400 s)
# steady state. Column headers ARE the model function names (with parentheses); per-point _SD.
experiment: erk_dose1, preequilibrate: dmso, condition: erk_dose1, data: dose1_ERKinh.exp
experiment: erk_dose2, preequilibrate: dmso, condition: erk_dose2, data: dose2_ERKinh.exp
experiment: akt_dose1, preequilibrate: dmso, condition: akt_dose1, data: dose1_AKTinh.exp
experiment: akt_dose2, preequilibrate: dmso, condition: akt_dose2, data: dose2_AKTinh.exp
experiment: src_dose1, preequilibrate: dmso, condition: src_dose1, data: dose1_SRCinh.exp
experiment: src_dose2, preequilibrate: dmso, condition: src_dose2, data: dose2_SRCinh.exp

# One CONSTRAINT-ONLY experiment (BPSL, no .exp): integrate the no-drug baseline to its
# steady state and evaluate the BMRA-CI sign constraints on the cc_<edge>() carriers at the
# settled state (the .prop uses `at 100000`). t_end required for a constraint-only experiment.
experiment: bmra, type: time_course, t_end: 100000, n_steps: 100, data: bmra_signs.prop

#######################
### Fitting Options ###
#######################

# Scatter search + simplex refinement -- the paper's own algorithm (Methods p.24). The BPSL
# constraints ride the objective as soft weighted penalties during the fit; job_type = check
# (cstar_skmel133_bmra_check.conf) reports their satisfaction at fixed parameters.
job_type = ss
refine = 1

# The .exp carry per-point _SD -> Gaussian chi-square on the fold changes.
objective = chi_sq

# Fold changes are relative to the no-drug baseline -> normalize EACH fold-change
# observable to its initial (pre-drug) value. PER-OBSERVABLE (ADR-0053), NOT global: a
# global `normalization` would also divide the constant cc_<edge>() carriers (constraint
# experiment) by their row-0 value and destroy the constraint signs. Names are bare (the
# directive grammar forbids parentheses). (Per-observable normalization is NOT PEtab-exportable.)
normalization FC_tIRS = init
normalization FC_IRSI = init
normalization FC_pERK = init
normalization FC_pAKT = init
normalization FC_pSRC = init
normalization FC_pPKC = init
normalization FC_pS6K = init
normalization FC_pRB = init
normalization FC_MYC = init

# Global multiplier on the qualitative (BPSL) penalty block. The paper imposed the BMRA
# CIs as (effectively hard) INEQUALITY constraints; PyBNF BPSL applies them as soft weighted
# penalties, so we lift the whole block well above the chi_sq scale (~1e4) to make the sign
# constraints binding. (The paper's exact penalty strength is unpublished -- Table S10.)
constraint_scale = 5000

# Paper budget: scatter search population 12, 50 iterations (Methods p.24). Heavy for a full
# 23-parameter fit; a shorter bounded run is used for routine verification.
max_iterations = 50
population_size = 12
verbosity = 2

##################
### Parameters ###
##################
# The FULL connection-coefficient set, bound by name (ADR-0034, no __FREE), each loguniform
# over ~+/-1 decade around the published SKMEL-133 value and spanning g=1 so the BMRA sign
# constraint is active. Published values are the authors' SKMEL-133-3.bngl nominals.
#
#   id           published   BMRA-inferred sign (see bmra_signs.prop)
# --- to ERK ---
loguniform_var = g_IRSERK  0.42   42      # 4.224  activation (g>1)
loguniform_var = g_mTORERK 2.5    250     # 25     activation
loguniform_var = g_SRCERK  1.07   107     # 10.74  activation
loguniform_var = g_CDKERK  0.0075 0.75    # 0.0748 inhibition (g<1)
# --- to AKT ---
loguniform_var = g_ERKAKT  0.0168 1.68    # 0.168  inhibition
loguniform_var = g_PKCAKT  0.28   28      # 2.831  activation
loguniform_var = g_CDKAKT  0.10   10      # 1.005  activation
loguniform_var = g_IRSAKT  5.4    540     # 54.29  activation
loguniform_var = g_MYCAKT  1.02   102     # 10.21  activation
# --- to SRC ---
loguniform_var = g_ERKSRC  9.9    989     # 98.90  activation
loguniform_var = g_PKCSRC  0.144  14.4    # 1.444  activation
loguniform_var = g_MYCSRC  0.043  4.3     # 0.432  inhibition
# --- to CDK ---
loguniform_var = g_ERKCDK  7.98   798     # 79.80  activation
loguniform_var = g_mTORCDK 2.6    260     # 26.04  activation
loguniform_var = g_MYCCDK  1.56   156     # 15.58  activation
# --- to mTOR ---
loguniform_var = g_AKTmTOR 3.0    300     # 30     activation
loguniform_var = g_SRCmTOR 3.5    350     # 35     activation
loguniform_var = g_PKCmTOR 2.16   216     # 21.59  activation
loguniform_var = g_CDKmTOR 3.2    320     # 32     activation
# --- to MYC (acts on degradation -> g<1 raises MYC) ---
loguniform_var = g_CDKMYC  0.030  3.0     # 0.305  inhibition (degradation term)
# --- DPD driving-force coefficients beta_j (Eq. 25); positive, structural +/- in the force ---
loguniform_var = beta_mTOR 0.00156 0.156  # 0.01565  (+ term)
loguniform_var = beta_PKC  0.0196  1.96   # 0.19599  (+ term)
loguniform_var = beta_SRC  0.00064 0.064  # 0.006381 (- term)
