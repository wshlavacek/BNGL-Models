# cSTAR SKMEL-133 -- PAPER-EXACT BMRA-CI-constrained connection-coefficient fit (real-world).
#
# Real-world PyBNF fitting example derived from:
#   Rukhlenko OS, Halasz M, Rauch N, ... Kholodenko BN. "Control of cell state
#   transitions." Nature 2022; 609(7929):975-985.
#   PMCID: PMC9644236   DOI: 10.1038/s41586-022-05194-y
#   Source model + data: github.com/OleksiiR/cSTAR_Nature
#     model  -> SKMEL-133_models/SKMEL-133-3.bngl
#     data   -> SKMEL-133_preproc/dose{1,2}_{ERK,AKT,SRC,PKC,mTOR,CDK}inh.exp
#     BMRA   -> BMRA/results_SKMEL_133/SKMEL133_{rm,rs}_log_200_5K_withMyc.csv (== Table S10)
#
# THE PAPER'S ACTUAL FIT (Methods p.24), reconstructed with the EXACT connection coefficients.
# The sibling ../cstar_skmel133_bmra imposes only the SIGN of each BMRA connection (a robust
# approximation); THIS slug imposes the paper's real object: the model's exact Eq.14 coefficient
#   r_ij = -(df_i/dx_j)/(df_i/dx_i) * (x_j/x_i)|ss = d ln x_i / d ln x_j
# constrained TWO-SIDED inside each BMRA confidence interval [mean-std, mean+std] (Table S10,
# with_MYC; the +/- are the BMRA posterior stds, k=1). The r_ij are emitted as model functions
# r_<tgt>_<src>() (see the .bngl and build_constraints.py); the decomposition r_ij = C_i * L_ij
# and its triple verification (analytic == numeric operational-MRA to 5e-9; BNG == python to 1e-9)
# are documented in VALIDATION.md.
#
# The paper: "we constrained the parameters using the BMRA inferred connection coefficients within
# their confidence intervals, and used ... pyBioNetFit ... which allows adding parameter constraints
# in the forms of inequalities to the parameter fitting process." (p.24). Algorithm: scatter search
# + simplex, objective = sum of squares. We mirror that: job_type = ss, refine = 1 (simplex),
# objective = chi_sq (the .exp carry per-point _SD).
#
# WHAT IS FREE (43 params): per signaling edge BOTH the crosstalk strength g_XY (Eq. 24
# alpha_Y^X = (1+g*Ya/K)/(1+Ya/K)) AND its half-saturation K_XY -- 20 g + 20 K = 40 -- plus the
# 3 DPD driving-force coefficients beta_j (Eq. 25). BOTH g and K are freed (unlike the sign-approx,
# which freezes K) because the exact r_ij depends on both (L_ij = w(g-1)/((1+w)(1+g*w)), w = x_j/K).
# The restoring-force / landscape geometry (alpha0, f0, Sd, Sp) and the module rate constants stay at
# the authors' published values -- the BMRA constraints act on the connections. Each bound brackets
# the published value by ~+/-1 decade (spanning g=1 so each two-sided CI is genuinely reachable).
#
# THE CONSTRAINTS (bmra_rij.prop, native-only BPSL): 40 two-sided signaling bounds (20 edges x
# {>, <}) weighted 1/std, plus 3 DPD-driving-force SIGN carriers cc_S<x>() (the model's PHYSICAL
# S/x units are not commensurate with BMRA's standardized DPD space -- r_Sj_model ~ 1e-3 vs BMRA
# ~ O(1); a genuine unit gap, so the DPD row is constrained by sign only; see VALIDATION.md). At
# the AUTHORS' published parameters job_type = check reports "Satisfied 39 out of 43": 16/20
# signaling edges + all 3 DPD signs already lie in-band; 4 edges -- AKT<-ERK (k=1.08), AKT<-PKC
# (k=2.10), AKT<-IRS (k=2.17), MYC<-CDK (k=1.79) -- sit just outside the +/-1 std band (all 20 are
# in-band at k=2.17). So the exact band is GENUINELY binding here, unlike the sign approximation
# which the published params satisfy trivially (23/23). This constrained fit pulls the free g/K to
# bring the out-of-band edges in while chi_sq tracks the fold-change training data.
#
# TRAINING = the six single-drug fold-change panels (ERK/AKT/SRC via setParameter 1/(1+I); PKC/mTOR/
# CDK via a competitive-binding setConcentration, lanl-PyBNF#474), 11 arms (dose1 x6 + dose2 x5;
# the authors' dose2_CDKinh.exp has no _SD columns -> not chi_sq-compatible, excluded; see
# prep_exp.py). The paper's VALIDATION set is the drug COMBINATIONS (not fit here).
#
# NATIVE-ONLY: `normalization ... = init` (fold-change data) AND the BPSL .prop both make this
# job non-PEtab-v2-exportable. Verify with tier-1 + `job_type = check` + a bounded fit + the
# fold-change reproduction, NOT with the PEtab round-trip.
#
# Run (with BNGPATH set, from this folder):
#   pybnf -c cstar_skmel133_bmra_exact.conf         # the BMRA-CI-constrained fit (heavy: 43 params)
#   pybnf -c cstar_skmel133_bmra_exact_check.conf   # satisfaction at the published params (39/43)

output_dir = output
edition = 2
bngl_backend = bngsim
model: cstar_skmel133_bmra_exact.bngl

#######################
### General Options ###
#######################

delete_old_files = 1
wall_time_sim = 3600

###################
### Conditions  ###
###################
# ERK/AKT/SRC inhibitors act via 1/(1+I_<x>_conc) with no binding -> setParameter (exact).
# mTOR/PKC/CDK act by COMPETITIVE BINDING -> a quoted-species setConcentration re-seeds the free
# inhibitor (lanl/PyBNF#474). dose2 = 2x dose1 (= published I).
#
# CRITICAL: pybnf carries setParameter perturbations ACROSS experiments (a shared model state),
# and pre-equilibration resets species concentrations but NOT parameters. So EVERY condition must
# explicitly reset the three setParameter inhibitors (I_ERK/AKT/SRC_conc) to their intended value
# -- otherwise a later arm's baseline inherits an earlier arm's drug and equilibrates to a drugged
# (low-DPD) state. `baseline` additionally zeroes the three binding species (for clean pre-equilibration).
condition: baseline,   perturbations: I_ERK_conc = 0, I_AKT_conc = 0, I_SRC_conc = 0, "IPKC(PKCBD)" = 0, "ImTOR(mTORBD)" = 0, "ICDK(CDKBD)" = 0
condition: erk_dose1,  perturbations: I_ERK_conc = 1.3122028733013222, I_AKT_conc = 0, I_SRC_conc = 0
condition: erk_dose2,  perturbations: I_ERK_conc = 2.6244057466026445, I_AKT_conc = 0, I_SRC_conc = 0
condition: akt_dose1,  perturbations: I_ERK_conc = 0, I_AKT_conc = 4.32073354133792, I_SRC_conc = 0
condition: akt_dose2,  perturbations: I_ERK_conc = 0, I_AKT_conc = 8.64146708267584, I_SRC_conc = 0
condition: src_dose1,  perturbations: I_ERK_conc = 0, I_AKT_conc = 0, I_SRC_conc = 0.5173293874300976
condition: src_dose2,  perturbations: I_ERK_conc = 0, I_AKT_conc = 0, I_SRC_conc = 1.0346587748601952
condition: pkc_dose1,  perturbations: I_ERK_conc = 0, I_AKT_conc = 0, I_SRC_conc = 0, "IPKC(PKCBD)" = 1.7250107623770197
condition: pkc_dose2,  perturbations: I_ERK_conc = 0, I_AKT_conc = 0, I_SRC_conc = 0, "IPKC(PKCBD)" = 3.4500215247540393
condition: mtor_dose1, perturbations: I_ERK_conc = 0, I_AKT_conc = 0, I_SRC_conc = 0, "ImTOR(mTORBD)" = 1.3510883690081217
condition: mtor_dose2, perturbations: I_ERK_conc = 0, I_AKT_conc = 0, I_SRC_conc = 0, "ImTOR(mTORBD)" = 2.7021767380162434
condition: cdk_dose1,  perturbations: I_ERK_conc = 0, I_AKT_conc = 0, I_SRC_conc = 0, "ICDK(CDKBD)" = 3.128238440223784

###################
### Experiments ###
###################
# The SIX-inhibitor single-drug fold-change training set (11 arms). Pre-equilibrate under
# `baseline` (drug-free, unmeasured, to steady state; the state carries over the setConcentration)
# -> apply one inhibitor -> measure the 24 h (86400 s) steady state.
experiment: erk_dose1,  preequilibrate: baseline, condition: erk_dose1,  data: dose1_ERKinh.exp
experiment: erk_dose2,  preequilibrate: baseline, condition: erk_dose2,  data: dose2_ERKinh.exp
experiment: akt_dose1,  preequilibrate: baseline, condition: akt_dose1,  data: dose1_AKTinh.exp
experiment: akt_dose2,  preequilibrate: baseline, condition: akt_dose2,  data: dose2_AKTinh.exp
experiment: src_dose1,  preequilibrate: baseline, condition: src_dose1,  data: dose1_SRCinh.exp
experiment: src_dose2,  preequilibrate: baseline, condition: src_dose2,  data: dose2_SRCinh.exp
experiment: pkc_dose1,  preequilibrate: baseline, condition: pkc_dose1,  data: dose1_PKCinh.exp
experiment: pkc_dose2,  preequilibrate: baseline, condition: pkc_dose2,  data: dose2_PKCinh.exp
experiment: mtor_dose1, preequilibrate: baseline, condition: mtor_dose1, data: dose1_mTORinh.exp
experiment: mtor_dose2, preequilibrate: baseline, condition: mtor_dose2, data: dose2_mTORinh.exp
experiment: cdk_dose1,  preequilibrate: baseline, condition: cdk_dose1,  data: dose1_CDKinh.exp

# CONSTRAINT-ONLY experiment (BPSL, no .exp): integrate the model from its all-off seed to steady
# state (t_end 5e5 s -- long enough for the slow IRS synthesis/degradation mode, tau ~ 1/vDegIRS ~
# 1e5 s, to settle), then evaluate the exact r_ij CIs (+ DPD sign) on the connection functions at
# t = 5e5 (the .prop uses `at 500000`).
#
# NO `condition:` here (deliberately). The model's nominal parameters ARE the drug-free proliferative
# state (all I_*_conc = 0, all inhibitor seeds 0), so the base model's own `bmra` simulation already
# lands in the intended basin (verified: pmTOR = 0.4091, Sval = 9.953 at t = 5e5). A `condition:`
# would instead bind the constraint to a MUTANT model, and in a `check` job (empty free-parameter
# PSet) building that mutant raises KeyError on the perturbed parameter (pset.py:956 indexes the
# empty param_set) -- so the constraint MUST ride the base simulation, exactly as the sign-approx
# slug does. The `bmra` action is emitted last in the synthesized `begin actions` block and inherits
# the preceding arm's state via `resetConcentrations()` (species reset to seed); the last measured
# arm (cdk_dose1) leaves all three setParameter inhibitors at 0 and perturbs only a species, so the
# reset returns the network to the pristine drug-free baseline before this integration.
experiment: bmra, type: time_course, t_end: 500000, n_steps: 50, data: bmra_rij.prop

#######################
### Fitting Options ###
#######################

# Scatter search + simplex refinement -- the paper's own algorithm (Methods p.24). The BPSL
# constraints ride the objective as soft weighted penalties during the fit; job_type = check
# (cstar_skmel133_bmra_exact_check.conf) reports their satisfaction at fixed parameters.
job_type = ss
refine = 1

# The .exp carry per-point _SD -> Gaussian chi-square on the fold changes.
objective = chi_sq

# Fold changes are relative to the no-drug baseline -> normalize EACH fold-change observable to its
# initial (pre-drug) value. PER-OBSERVABLE (ADR-0053), NOT global: a global `normalization` would
# also divide the constraint experiment's r_<tgt>_<src>() / cc_S<x>() columns by their row-0 value
# and corrupt the coefficients. Names are bare (the directive grammar forbids parentheses).
normalization FC_tIRS = init
normalization FC_IRSI = init
normalization FC_pERK = init
normalization FC_pAKT = init
normalization FC_pSRC = init
normalization FC_pPKC = init
normalization FC_pS6K = init
normalization FC_pRB = init
normalization FC_MYC = init

# Global multiplier on the BPSL penalty block. The static penalty is LINEAR: weight * violation *
# constraint_scale (weight = 1/std). At the published parameters the weighted violation block is
# ~3.15 while chi_sq ~ 6.3e3, so scale = 5000 lifts the block to ~1.6e4 -- above the chi_sq scale --
# making the BMRA CIs effectively-hard inequalities (the paper's intent; its exact penalty strength
# is unpublished). Matches the sign-approx slug's scale.
constraint_scale = 5000

# Paper budget: scatter search population 12, 50 iterations (Methods p.24). Heavy for a 43-parameter
# fit; a shorter bounded run (see VALIDATION.md) is used for routine verification.
max_iterations = 50
population_size = 12
verbosity = 2

