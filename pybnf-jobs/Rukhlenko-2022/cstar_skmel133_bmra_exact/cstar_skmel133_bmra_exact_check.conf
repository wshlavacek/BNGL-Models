# cSTAR SKMEL-133 -- PAPER-EXACT BMRA r_ij constraints: job_type = check at published params.
#
#   Rukhlenko OS, ... Kholodenko BN. "Control of cell state transitions." Nature 2022;
#   609(7929):975-985.  PMCID: PMC9644236  DOI: 10.1038/s41586-022-05194-y
#   Source: github.com/OleksiiR/cSTAR_Nature (SKMEL-133-3.bngl; SKMEL-133_preproc/*.exp; Table S10).
#
# This `check` job evaluates, at the authors' published SKMEL-133 parameters, whether the
# model's EXACT Eq.14 connection coefficients r_ij fall inside the BMRA confidence intervals
# [mean-std, mean+std] (Table S10, with_MYC; k=1). It reports "Satisfied M out of N" and writes
# an itemized bmra_constraint_eval.txt. Result: Satisfied 39 out of 43. See VALIDATION.md for the
# full analysis: 16/20 signaling edges (+ all 3 DPD signs) satisfy k=1 at published params; 4 --
# AKT<-ERK (k=1.08), AKT<-PKC (k=2.10), AKT<-IRS (k=2.17), MYC<-CDK (k=1.79) -- exceed the +/-1 std
# band (all 20 satisfy at k=2.17). Three of the four are AKT-incoming edges, whose upstream active
# forms (pIRS=0.027, pPKC=0.025) are tiny at this steady state, weakening the coefficients. So the
# exact band is genuinely binding, unlike the sign approximation which the published params satisfy
# trivially (23/23). See ../cstar_skmel133_bmra_exact.conf for the constrained fit.
#
# Run (BNGPATH set, from this folder):
#   pybnf -c cstar_skmel133_bmra_exact_check.conf

output_dir = output_check
edition = 2
bngl_backend = bngsim
model: cstar_skmel133_bmra_exact.bngl

delete_old_files = 1
wall_time_sim = 3600

###################
### Conditions  ###
###################
# ERK/AKT/SRC inhibitors act via 1/(1+I_<x>_conc) with no binding -> setParameter (exact).
# mTOR/PKC/CDK act by COMPETITIVE BINDING -> a quoted-species setConcentration re-seeds the free
# inhibitor (lanl/PyBNF#474). dose2 = 2x dose1 (= published I).
#
# CRITICAL: pybnf carries setParameter perturbations ACROSS experiments (a shared model state),
# and pre-equilibration resets species concentrations but NOT parameters. So EVERY condition must
# explicitly reset the three setParameter inhibitors (I_ERK/AKT/SRC_conc) to their intended value
# -- otherwise a later arm's baseline inherits an earlier arm's drug and equilibrates to a drugged
# (low-DPD) state. `baseline` additionally zeroes the three binding species (for the constraint
# experiment and clean pre-equilibration).
condition: baseline,   perturbations: I_ERK_conc = 0, I_AKT_conc = 0, I_SRC_conc = 0, "IPKC(PKCBD)" = 0, "ImTOR(mTORBD)" = 0, "ICDK(CDKBD)" = 0
condition: erk_dose1,  perturbations: I_ERK_conc = 1.3122028733013222, I_AKT_conc = 0, I_SRC_conc = 0
condition: erk_dose2,  perturbations: I_ERK_conc = 2.6244057466026445, I_AKT_conc = 0, I_SRC_conc = 0
condition: akt_dose1,  perturbations: I_ERK_conc = 0, I_AKT_conc = 4.32073354133792, I_SRC_conc = 0
condition: akt_dose2,  perturbations: I_ERK_conc = 0, I_AKT_conc = 8.64146708267584, I_SRC_conc = 0
condition: src_dose1,  perturbations: I_ERK_conc = 0, I_AKT_conc = 0, I_SRC_conc = 0.5173293874300976
condition: src_dose2,  perturbations: I_ERK_conc = 0, I_AKT_conc = 0, I_SRC_conc = 1.0346587748601952
condition: pkc_dose1,  perturbations: I_ERK_conc = 0, I_AKT_conc = 0, I_SRC_conc = 0, "IPKC(PKCBD)" = 1.7250107623770197
condition: pkc_dose2,  perturbations: I_ERK_conc = 0, I_AKT_conc = 0, I_SRC_conc = 0, "IPKC(PKCBD)" = 3.4500215247540393
condition: mtor_dose1, perturbations: I_ERK_conc = 0, I_AKT_conc = 0, I_SRC_conc = 0, "ImTOR(mTORBD)" = 1.3510883690081217
condition: mtor_dose2, perturbations: I_ERK_conc = 0, I_AKT_conc = 0, I_SRC_conc = 0, "ImTOR(mTORBD)" = 2.7021767380162434
condition: cdk_dose1,  perturbations: I_ERK_conc = 0, I_AKT_conc = 0, I_SRC_conc = 0, "ICDK(CDKBD)" = 3.128238440223784
# (cdk_dose2 omitted: the authors' dose2_CDKinh.exp has no _SD columns -> not chi_sq-compatible.)

###################
### Experiments ###
###################
# The SIX-inhibitor single-drug fold-change training set (11 arms). Pre-equilibrate under
# `baseline` (drug-free, unmeasured, to steady state; the state carries over the setConcentration)
# -> apply one inhibitor -> measure the 24 h (86400 s) steady state.
experiment: erk_dose1,  preequilibrate: baseline, condition: erk_dose1,  data: dose1_ERKinh.exp
experiment: erk_dose2,  preequilibrate: baseline, condition: erk_dose2,  data: dose2_ERKinh.exp
experiment: akt_dose1,  preequilibrate: baseline, condition: akt_dose1,  data: dose1_AKTinh.exp
experiment: akt_dose2,  preequilibrate: baseline, condition: akt_dose2,  data: dose2_AKTinh.exp
experiment: src_dose1,  preequilibrate: baseline, condition: src_dose1,  data: dose1_SRCinh.exp
experiment: src_dose2,  preequilibrate: baseline, condition: src_dose2,  data: dose2_SRCinh.exp
experiment: pkc_dose1,  preequilibrate: baseline, condition: pkc_dose1,  data: dose1_PKCinh.exp
experiment: pkc_dose2,  preequilibrate: baseline, condition: pkc_dose2,  data: dose2_PKCinh.exp
experiment: mtor_dose1, preequilibrate: baseline, condition: mtor_dose1, data: dose1_mTORinh.exp
experiment: mtor_dose2, preequilibrate: baseline, condition: mtor_dose2, data: dose2_mTORinh.exp
experiment: cdk_dose1,  preequilibrate: baseline, condition: cdk_dose1,  data: dose1_CDKinh.exp

# CONSTRAINT-ONLY experiment (BPSL, no .exp): integrate the model from its all-off seed to steady
# state (t_end 5e5 s -- long enough for the slow IRS synthesis/degradation mode, tau ~ 1/vDegIRS ~
# 1e5 s, to settle), then evaluate the exact r_ij CIs (+ DPD sign) on the connection functions at
# t = 5e5 (the .prop uses `at 500000`).
#
# NO `condition:` here (deliberately). The model's nominal parameters ARE the drug-free proliferative
# state (all I_*_conc = 0, all inhibitor seeds 0), so the base model's own `bmra` simulation already
# lands in the intended basin (verified: pmTOR = 0.4091, Sval = 9.953 at t = 5e5). A `condition:`
# would instead bind the constraint to a MUTANT model, and in a `check` job (empty free-parameter
# PSet) building that mutant raises KeyError on the perturbed parameter (pset.py:956 indexes the
# empty param_set) -- so the constraint MUST ride the base simulation, exactly as the sign-approx
# slug does. The `bmra` action is emitted last in the synthesized `begin actions` block and inherits
# the preceding arm's state via `resetConcentrations()` (species reset to seed); the last measured
# arm (cdk_dose1) leaves all three setParameter inhibitors at 0 and perturbs only a species, so the
# reset returns the network to the pristine drug-free baseline before this integration.
experiment: bmra, type: time_course, t_end: 500000, n_steps: 50, data: bmra_rij.prop

#######################
### Fitting Options ###
#######################
job_type = check
objective = chi_sq

normalization FC_tIRS = init
normalization FC_IRSI = init
normalization FC_pERK = init
normalization FC_pAKT = init
normalization FC_pSRC = init
normalization FC_pPKC = init
normalization FC_pS6K = init
normalization FC_pRB = init
normalization FC_MYC = init

constraint_scale = 1.0

max_iterations = 1
population_size = 1
verbosity = 2
