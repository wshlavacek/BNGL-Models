# cSTAR SKMEL-133 -- DPD / Waddington-landscape fit to QUALITATIVE facts (BPSL, native-only).
#
# Real-world PyBNF example derived from:
#   Rukhlenko OS, Halasz M, Rauch N, ... Kholodenko BN. "Control of cell state
#   transitions." Nature 2022; 609(7929):975-985.
#   PMCID: PMC9644236   DOI: 10.1038/s41586-022-05194-y
#   Source model: github.com/OleksiiR/cSTAR_Nature -> SKMEL-133_models/SKMEL-133-3.bngl
#
# This is the constraint-bearing sibling of ../cstar_skmel133. Instead of quantitative
# phospho fold changes, it fits the paper's QUALITATIVE claims about the cell-state
# coordinate (the DPD, S) on its bistable Waddington-like landscape, expressed as PyBNF
# BPSL .prop constraints on the model observable `Sval`:
#   * baseline (no drug)      -- stays proliferative           S > 2          (baseline.prop)
#   * AKT inhibitor alone      -- does NOT flip                 S > 0          (akt.prop)
#   * IRS inhibitor alone      -- does NOT flip                 S > 0          (irs.prop)
#   * IRS + AKT combined       -- SWITCHES to the death basin   S < 0          (combo.prop)
#                                 and below either single agent (super-additive synergy)
# This is the cSTAR headline for SKMEL-133: a combination crosses the landscape barrier
# that neither single agent does.
#
# STRUCTURE (Miller2025 pattern): a BPSL constraint experiment cannot apply a
# non-free-parameter condition, so each inhibitor dose is baked into its OWN model copy
# (I_<x>_conc parameters; doses AKTi=3, IRSi=4, combo IRSi=2 + AKTi=1.5) and each
# experiment binds that model. The free landscape params bind by name across all models.
# Regenerate the dose models with ./make_models.sh.
#
# NATIVE-ONLY: attaching BPSL .prop constraints makes the job NOT PEtab-v2-exportable
# (export_job raises NotImplementedError). Verify with `job_type = check` (constraint
# satisfaction), NOT petab_roundtrip.py. See
# skills/curate-pybnf-job/references/bpsl-constraints.md.
#
# Run (with BNGPATH set, from this folder or with an absolute path):
#   pybnf -c cstar_skmel133_bpsl.conf
# Check satisfaction at the published parameters:
#   see cstar_skmel133_bpsl_check.conf (job_type = check, no *_var lines).

output_dir = output_check

# Opt into the edition-2 config language.
edition = 2

# In-process bngsim backend (the new-era default).
bngl_backend = bngsim

# One model per perturbation, doses baked into I_<x>_conc (generated by make_models.sh).
model: cstar_skmel133_bpsl.bngl        # baseline: all inhibitors 0
model: cstar_skmel133_bpsl_akt.bngl    # I_AKT_conc = 3
model: cstar_skmel133_bpsl_irs.bngl    # I_IRS_conc = 4
model: cstar_skmel133_bpsl_combo.bngl  # I_IRS_conc = 2, I_AKT_conc = 1.5

#######################
### General Options ###
#######################

delete_old_files = 1
wall_time_sim = 3600

###################
### Experiments ###
###################
# Constraint-only experiments (a .prop with no .exp): each binds its dose-baked model and
# carries its own timing (t_end required); each integrates from the seed to the perturbed
# steady state (the DPD settles long before t_end = 1e5 s). Experiment names ARE the BPSL
# suffixes, so combo.prop references `akt_hi.Sval` / `irs_hi.Sval`, and akt/irs.prop
# reference `baseline.Sval` (cross-condition comparisons). type: time_course required for .prop.
experiment: baseline, model: cstar_skmel133_bpsl.bngl,       type: time_course, t_end: 100000, n_steps: 100, data: baseline.prop
experiment: akt_hi,   model: cstar_skmel133_bpsl_akt.bngl,   type: time_course, t_end: 100000, n_steps: 100, data: akt.prop
experiment: irs_hi,   model: cstar_skmel133_bpsl_irs.bngl,   type: time_course, t_end: 100000, n_steps: 100, data: irs.prop
experiment: combo,    model: cstar_skmel133_bpsl_combo.bngl, type: time_course, t_end: 100000, n_steps: 100, data: combo.prop

#######################
### Fitting Options ###
#######################

# Differential evolution: the BPSL constraints become soft weighted penalties (the whole
# objective here -- there is no quantitative .exp), so the fit calibrates the DPD landscape
# to the qualitative facts. (For pure verification at fixed parameters use job_type = check.)
job_type = check

# Edition 2 requires an objective to be named even for a constraint-only job; there is no
# quantitative .exp, so `sos` scores nothing and the BPSL penalties are the whole objective.
objective = sos

# Global multiplier on the qualitative penalty block (hinge family). 1.0 = use the .prop weights.
constraint_scale = 1.0

max_iterations = 50
population_size = 12
verbosity = 2

##################
### Parameters ###
##################
#
