# cSTAR TrkA + TrkB -- JOINT BMRA-CI-CONSTRAINED connection-coefficient fit (real-world).
#
# Real-world PyBNF fitting example derived from:
#   Rukhlenko OS, Halasz M, Rauch N, ... Kholodenko BN. "Control of cell state
#   transitions." Nature 2022; 609(7929):975-985.
#   PMCID: PMC9644236   DOI: 10.1038/s41586-022-05194-y
#   Source models + data: github.com/OleksiiR/cSTAR_Nature
#     models -> Trk_AB_models/{TrkA_S_model,TrkB_S_model}.bngl
#     data   -> RPPA_DA/RPPA_data_trusted.csv (+ RPPA_data_Trk_normalized_new.csv)
#     BMRA   -> BMRA/results/Trk{A,B}_{rm,rs}_10_log_200_5K.csv  (10-min posterior)
#
# THE PAPER'S ACTUAL Trk FIT (Methods p.22), reconstructed jointly. The paper fit the TrkA
# and TrkB models TOGETHER with pyBioNetFit (scatter search pop 20 + simplex; objective =
# sum of squares) to the ligand-stimulation phospho time courses, UNDER the BMRA-inferred
# connection-coefficient confidence intervals as INEQUALITY constraints:
#   "in addition to the training dataset, we constrained the parameters using the BMRA
#    inferred connection coefficients within their confidence intervals ... pyBioNetFit ...
#    allows adding parameter constraints in the forms of inequalities" (p.22)
# The two receptor models share the core enzymatic rate constants (vpTRK/vpRTK/vpERK/vpAKT,
# bound by name across both) but carry separate connection strengths (g_A_* vs g_B_*) and
# separate BMRA posteriors -- so the JOINT fit couples the two datasets through the shared
# core while each receptor's connections are constrained by its own BMRA CIs.
#
# THE CONSTRAINTS (bmra_A.prop / bmra_B.prop, native-only BPSL): each statistically-
# significant BMRA connection (10-min posterior CI >= 1 std from zero) pins the sign of its
# model coefficient (g>1 activation / g<1 inhibition, Eq. 24), weighted by z=|mean|/std.
# Low-confidence connections (CI includes 0) are left free -- the paper's own inclusion rule
# ("only interactions ... with statistically significant non-zero values are included", p.19).
# The DPD (STV) force coefficients are NOT constrained (the DPD is SVM-defined, not the BMRA
# STV row, and the phospho time courses do not involve Sval). See build_constraints.py.
# Verified: job_type = check -> Satisfied 11/11 at the published parameters.
#
# NATIVE-ONLY: `normalization ... = init` (fold-change data) AND the BPSL .prop both make
# this job non-PEtab-v2-exportable. Verify with tier-1 + `job_type = check` + a bounded fit
# + the fold-change reproduction, NOT the PEtab round-trip.
#
# Run (with BNGPATH set, from this folder):
#   pybnf -c cstar_trkab_bmra.conf
#   pybnf -c cstar_trkab_bmra_check.conf     # satisfaction at the published parameters

output_dir = output

edition = 2
bngl_backend = bngsim

# Two receptor models fit jointly (shared core params bind by name).
model: cstar_trka_bmra.bngl
model: cstar_trkb_bmra.bngl

#######################
### General Options ###
#######################

delete_old_files = 1
wall_time_sim = 3600

###################
### Conditions  ###
###################
# Ligand (NGF for TrkA, BDNF for TrkB) is gated by each model's Lig_on parameter (0 during
# equilibration, 1 once ligand is added). Conditions are model-qualified (multiple models).
condition: basal_A, model: cstar_trka_bmra.bngl, perturbations: Lig_on = 0
condition: stim_A,  model: cstar_trka_bmra.bngl, perturbations: Lig_on = 1
condition: basal_B, model: cstar_trkb_bmra.bngl, perturbations: Lig_on = 0
condition: stim_B,  model: cstar_trkb_bmra.bngl, perturbations: Lig_on = 1

###################
### Experiments ###
###################
# Two QUANTITATIVE time-course experiments (training set): pre-equilibrate WITHOUT ligand ->
# add ligand -> measure the 7 phospho fold changes over 0-45 min. Column headers ARE the
# model function names (with parentheses). The .exp carry no _SD -> sos.
experiment: trka, model: cstar_trka_bmra.bngl, preequilibrate: basal_A, condition: stim_A, data: cstar_trka.exp
experiment: trkb, model: cstar_trkb_bmra.bngl, preequilibrate: basal_B, condition: stim_B, data: cstar_trkb.exp

# Two CONSTRAINT-ONLY experiments (BPSL, no .exp): integrate each model to its no-ligand
# steady state and evaluate the BMRA-CI sign constraints on that model's cc_*() carriers.
experiment: bmra_A, model: cstar_trka_bmra.bngl, type: time_course, t_end: 100000, n_steps: 100, data: bmra_A.prop
experiment: bmra_B, model: cstar_trkb_bmra.bngl, type: time_course, t_end: 100000, n_steps: 100, data: bmra_B.prop

#######################
### Fitting Options ###
#######################

# Scatter search + simplex -- the paper's own algorithm (Methods p.22). The BPSL constraints
# ride the objective as soft weighted penalties during the fit.
job_type = ss
refine = 1

# The Trk .exp carry no _SD columns -> plain sum of squares.
objective = sos

# Fold changes vs t=0 -> normalize each fold-change observable to its initial value.
# PER-OBSERVABLE (ADR-0053), NOT global: a global `normalization` would also divide the
# constant cc_*() carriers by their row-0 value and destroy the constraint signs. Names are
# bare (the directive grammar forbids parentheses). (NOT PEtab-exportable.)
normalization FC_pTRK = init
normalization FC_pAdRTK = init
normalization FC_ppERK = init
normalization FC_pAKT = init
normalization FC_pJNK = init
normalization FC_pRSK = init
normalization FC_pS6K = init

# Lift the qualitative (BPSL) penalty block above the sos scale so the sign constraints are
# binding (the paper imposed the BMRA CIs as effectively hard inequalities; exact strength
# unpublished). See ../cstar_skmel133_bmra.
constraint_scale = 5000

# Paper budget: scatter search population 20 + simplex (Methods p.22). Heavy for a joint
# ~38-parameter fit; a shorter bounded run is used for routine verification.
max_iterations = 50
population_size = 20
verbosity = 2

##################
### Parameters ###
##################
# The full connection-coefficient set for both receptors + the shared core rate constants,
# bound by name (ADR-0034, no __FREE), each loguniform over ~+/-1 decade around the published
# value and spanning g=1 so the BMRA sign constraints are active. Published = the authors'
# Trk{A,B}_S_model.bngl nominals.
# --- shared core rate constants (bind by NAME across both models) ---
loguniform_var = vpTRK       0.02356   23.56    # published 0.2356
loguniform_var = vpRTK       0.012     12       # published 0.12
loguniform_var = vpERK       0.0006    0.6      # published 0.006
loguniform_var = vpAKT       0.00003   0.03     # published 0.0003
# --- TrkA connection strengths g_A_* (full set) ---
loguniform_var = g_A_S6KRTK   0.3366     33.66      # published 3.366
loguniform_var = g_A_ERKRTK   0.1        10         # published 1
loguniform_var = g_A_ERKJNK   0.3769     37.69      # published 3.769
loguniform_var = g_A_RTKERK   0.13       13         # published 1.3
loguniform_var = g_A_TRKERK   0.5        2200       # published 220
loguniform_var = g_A_S6KERK   0.013      1.3        # published 0.13
loguniform_var = g_A_AKTERK   0.0742     7.42       # published 0.742
loguniform_var = g_A_JNKERK   0.1756     17.56      # published 1.756
loguniform_var = g_A_RSKERK   0.0005     2          # published 0.005
loguniform_var = g_A_RTKAKT   0.15       15         # published 1.5
loguniform_var = g_A_TRKAKT   0.368      36.8       # published 3.68
loguniform_var = g_A_S6KAKT   0.0012     2          # published 0.012
loguniform_var = g_A_ERKAKT   0.5        180        # published 18
loguniform_var = g_A_JNKAKT   0.07       7          # published 0.7
loguniform_var = g_A_RSKAKT   0.15       15         # published 1.5
loguniform_var = g_A_AKTS6K   0.5        5000       # published 500
loguniform_var = kpRSKA      0.01       1          # published 0.1
# --- TrkB connection strengths g_B_* (full set) ---
loguniform_var = g_B_ERKRTK   0.46443    46.443     # published 4.6443
loguniform_var = g_B_RSKRTK   0.5        250        # published 25
loguniform_var = g_B_AKTRTK   0.5        140        # published 14
loguniform_var = g_B_ERKJNK   0.5        179.22     # published 17.922
loguniform_var = g_B_RTKERK   0.5        302.26     # published 30.226
loguniform_var = g_B_TRKERK   0.5        676.58     # published 67.658
loguniform_var = g_B_JNKERK   0.6        60         # published 6
loguniform_var = g_B_RSKERK   0.09       9          # published 0.9
loguniform_var = g_B_RTKAKT   0.5        1000       # published 100
loguniform_var = g_B_TRKAKT   0.5        300        # published 30
loguniform_var = g_B_S6KAKT   0.03683    3.683      # published 0.3683
loguniform_var = g_B_ERKAKT   1          100        # published 10
loguniform_var = g_B_RSKAKT   0.09       9          # published 0.9
loguniform_var = g_B_JNKAKT   0.06232    6.232      # published 0.6232
loguniform_var = g_B_AKTS6K   1          100        # published 10
loguniform_var = g_B_ERKS6K   0.6        60         # published 6
loguniform_var = kpRSKB      0.0018     0.18       # published 0.018