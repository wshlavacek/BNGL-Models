# cSTAR TrkA + TrkB -- JOINT PAPER-EXACT BMRA-CI-constrained connection-coefficient fit (real-world).
#
# Real-world PyBNF fitting example derived from:
#   Rukhlenko OS, Halasz M, Rauch N, ... Kholodenko BN. "Control of cell state
#   transitions." Nature 2022; 609(7929):975-985.  PMCID: PMC9644236.
#   Source models + data: github.com/OleksiiR/cSTAR_Nature
#     models -> Trk_AB_models/{TrkA_S_model,TrkB_S_model}.bngl
#     data   -> RPPA_DA/RPPA_data_trusted.csv (+ RPPA_data_Trk_normalized_new.csv)
#     BMRA   -> BMRA/results/Trk{A,B}_{rm,rs}_10_log_200_5K.csv  == Table S5 (10-min posterior)
#
# THE PAPER'S ACTUAL Trk FIT (Methods p.22), reconstructed jointly with the EXACT Eq.14
# connection coefficients (the sibling ../cstar_trkab_bmra imposes only their SIGN). The paper:
#   "the data were split into a training set and a validation set. The training set included the
#    time course of TrkA and TrkB phosphorylation measured by Western Blot and 10 min RPPA data
#    ... we constrained the parameters using the BMRA inferred connection coefficients within
#    their confidence intervals ... the connection coefficients defined in Eq. 14 must be within
#    the confidence intervals ... pyBioNetFit ... inequalities ... scatter search ... simplex ...
#    The validation set consisted of 45 min RPPA data." (p.22)
# So: fit the two ligand-stimulation phospho TIME COURSES (training) under the model's exact Eq.14
# r_ij constrained TWO-SIDED inside the 10-min BMRA CIs. job_type=ss, refine=1 (simplex), sos.
#
# WHAT IS CONSTRAINED (the exact r_ij, evaluated at the BASAL steady state -- see below):
#   TrkA: 10 edges into the standard nodes ERK/AKT/S6K (r_ij = C_i*L_ij, C_i the MM push-pull
#         self-normalization; verified analytic == operational-MRA to 1e-10).
#   TrkB: 12 edges into ERK/AKT/JNK/S6K + RSK<-ERK (a custom node: ERK enters RSK synthesis
#         linearly, not via a hyperbolic alpha).
#   NOT constrained (documented): the RTK/AdRTK receptor-dimerization node (dim0/1/2 states, no
#   clean closed-form Eq.14 C_i) -> RTK-incoming edges reported numerically (VALIDATION.md), like
#   the SKMEL IRS node. The DPD row is not constrained (SVM-defined; the time courses omit Sval).
#
# WHY THE BASAL STEADY STATE. Eq.14 defines r_ij at steady state (st.st.). The Trk ligand response
# is transient/adaptive (ppERK peaks ~10 min then relaxes back to basal), so there is no sustained
# stimulated steady state; the well-defined reference st.st. is the no-ligand (Lig_on=0) basal state
# -- the pre-perturbation reference Eq.25 itself uses. The constraint experiments run there.
#
# WHAT IS FREE (51 params): the shared core rate constants (vpTRK/vpRTK/vpERK/vpAKT, bound by name
# across both models) + per CONSTRAINED edge BOTH g_<tag>_<edge> and K_<tag>_<edge> (the exact r_ij
# depends on both; L_ij = w(g-1)/((1+w)(1+g*w)), w=x_j/K) + the RSK synthesis params (kpRSKA;
# kpRSKB, KpRSKB for the constrained TrkB RSK<-ERK). Each loguniform over ~+/-1 decade around the
# authors' Trk{A,B}_S_model.bngl nominal.
#
# NATIVE-ONLY (normalization=init + BPSL .prop): verify with tier-1 + job_type=check + a bounded
# fit + the fold-change reproduction, NOT the PEtab round-trip.
#
# Run (BNGPATH set, from this folder):
#   pybnf -c cstar_trkab_bmra_exact.conf          # the joint BMRA-CI-constrained fit (heavy: 51 params)
#   pybnf -c cstar_trkab_bmra_exact_check.conf    # satisfaction at the published params (40/46)

output_dir = output
edition = 2
bngl_backend = bngsim

model: cstar_trka_bmra_exact.bngl
model: cstar_trkb_bmra_exact.bngl

delete_old_files = 1
wall_time_sim = 3600

###################
### Conditions  ###
###################
condition: basal_A, model: cstar_trka_bmra_exact.bngl, perturbations: Lig_on = 0
condition: stim_A,  model: cstar_trka_bmra_exact.bngl, perturbations: Lig_on = 1
condition: basal_B, model: cstar_trkb_bmra_exact.bngl, perturbations: Lig_on = 0
condition: stim_B,  model: cstar_trkb_bmra_exact.bngl, perturbations: Lig_on = 1

###################
### Experiments ###
###################
# Constraint-only experiments FIRST so each evaluates the exact r_ij at the pristine no-ligand
# (Lig_on=0) basal steady state -- not a Lig_on=1 phase left over from the stim time course, and
# NOT a mutant (a `condition:` here would KeyError in the check job; see the SKMEL exact slug).
experiment: bmra_A, model: cstar_trka_bmra_exact.bngl, type: time_course, t_end: 100000, n_steps: 100, data: bmra_A_rij.prop
experiment: bmra_B, model: cstar_trkb_bmra_exact.bngl, type: time_course, t_end: 100000, n_steps: 100, data: bmra_B_rij.prop

# The two ligand-stimulation phospho time courses (training set): pre-equilibrate WITHOUT ligand
# -> add ligand -> measure the 7 phospho fold changes over 0-45 min (the .exp carry no _SD -> sos).
experiment: trka, model: cstar_trka_bmra_exact.bngl, preequilibrate: basal_A, condition: stim_A, data: cstar_trka.exp
experiment: trkb, model: cstar_trkb_bmra_exact.bngl, preequilibrate: basal_B, condition: stim_B, data: cstar_trkb.exp

#######################
### Fitting Options ###
#######################
job_type = ss
refine = 1
objective = sos

normalization FC_pTRK = init
normalization FC_pAdRTK = init
normalization FC_ppERK = init
normalization FC_pAKT = init
normalization FC_pJNK = init
normalization FC_pRSK = init
normalization FC_pS6K = init

# Lift the BPSL penalty block above the sos scale so the exact CIs bind (the paper's intent; exact
# strength unpublished). At the published params the training sos is ~35 and the weighted violation
# block is already ~50 (the two tight-CI edges -- RSK<-ERK std 0.019 -> weight 52, S6K<-AKT std 0.033
# -> weight 30 -- dominate), so a MODEST scale suffices; 20 makes the constraint block clearly
# dominant (~1000) while the training data still pulls within the feasible region. (A far larger
# scale would obliterate the data fit here, unlike the SKMEL chi_sq ~6e3 case.)
constraint_scale = 20

# Paper budget: scatter search population 20 + simplex (Methods p.22). Heavy for a joint 51-param
# fit; a shorter bounded run (see VALIDATION.md) is used for routine verification.
max_iterations = 50
population_size = 20
verbosity = 2

##################
### Parameters ###
##################
# --- shared core rate constants (bind by NAME across both models) ---
loguniform_var = vpTRK          0.2356 23.56      # published 2.356
loguniform_var = vpRTK          0.012 1.2      # published 0.12
loguniform_var = vpERK          0.0006 0.06      # published 0.006
loguniform_var = vpAKT          3e-05 0.003      # published 0.0003
