# cSTAR TrkA + TrkB -- JOINT PAPER-EXACT BMRA r_ij constraints: job_type = check at published params.
#
#   Rukhlenko OS, ... Kholodenko BN. "Control of cell state transitions." Nature 2022;
#   609(7929):975-985.  PMCID: PMC9644236.  Source: github.com/OleksiiR/cSTAR_Nature.
#
# Evaluates, at the authors' published TrkA/TrkB parameters, whether the models' EXACT Eq.14
# connection coefficients r_ij fall inside the BMRA confidence intervals [mean-std, mean+std]
# (Table S5, 10-min posterior; k=1). Reports "Satisfied M out of N" and writes itemized
# bmra_{A,B}_constraint_eval.txt. See ../cstar_trkab_bmra_exact.conf for the fit and VALIDATION.md.
#
# GROUNDING (Methods p.22): training = the Trk phospho time courses + 10-min RPPA; the connection
# coefficients (Eq.14) constrained within the BMRA CIs (10-min); 45-min RPPA = validation. The Trk
# ligand response is transient/adaptive, so Eq.14's steady-state r_ij are evaluated at the BASAL
# (Lig_on=0) steady state -- a true st.st. and the pre-perturbation reference.
#
# Run (BNGPATH set, from this folder):  pybnf -c cstar_trkab_bmra_exact_check.conf

output_dir = output_check
edition = 2
bngl_backend = bngsim

# Two receptor models checked jointly (shared core params bind by name).
model: cstar_trka_bmra_exact.bngl
model: cstar_trkb_bmra_exact.bngl

delete_old_files = 1
wall_time_sim = 3600

###################
### Conditions  ###
###################
# Ligand (NGF for TrkA, BDNF for TrkB) gated by each model's Lig_on parameter (0 during
# equilibration, 1 once ligand is added). Conditions are model-qualified.
condition: basal_A, model: cstar_trka_bmra_exact.bngl, perturbations: Lig_on = 0
condition: stim_A,  model: cstar_trka_bmra_exact.bngl, perturbations: Lig_on = 1
condition: basal_B, model: cstar_trkb_bmra_exact.bngl, perturbations: Lig_on = 0
condition: stim_B,  model: cstar_trkb_bmra_exact.bngl, perturbations: Lig_on = 1

###################
### Experiments ###
###################
# CONSTRAINT-ONLY experiments FIRST (BPSL, no .exp), so each runs at the model's pristine no-ligand
# base state (Lig_on=0 default): integrate to the basal steady state and evaluate the exact r_ij CIs
# at t=1e5 (the .prop uses `at 100000`). Listed before the stim time courses so the base model's
# bmra action is not preceded by a Lig_on=1 phase (the constraint MUST ride the base sim, not a
# mutant -- a `condition:` here would KeyError in a check job, as in the SKMEL exact slug).
experiment: bmra_A, model: cstar_trka_bmra_exact.bngl, type: time_course, t_end: 100000, n_steps: 100, data: bmra_A_rij.prop
experiment: bmra_B, model: cstar_trkb_bmra_exact.bngl, type: time_course, t_end: 100000, n_steps: 100, data: bmra_B_rij.prop

# The two ligand-stimulation phospho time courses (training set): pre-equilibrate WITHOUT ligand ->
# add ligand -> measure the 7 phospho fold changes over 0-45 min.
experiment: trka, model: cstar_trka_bmra_exact.bngl, preequilibrate: basal_A, condition: stim_A, data: cstar_trka.exp
experiment: trkb, model: cstar_trkb_bmra_exact.bngl, preequilibrate: basal_B, condition: stim_B, data: cstar_trkb.exp

#######################
### Fitting Options ###
#######################
job_type = check
objective = sos

normalization FC_pTRK = init
normalization FC_pAdRTK = init
normalization FC_ppERK = init
normalization FC_pAKT = init
normalization FC_pJNK = init
normalization FC_pRSK = init
normalization FC_pS6K = init

constraint_scale = 1.0

max_iterations = 1
population_size = 1
verbosity = 2
