# cSTAR core signalling network, TrkB / BDNF -- deterministic ODE, network-generating.
#
# Real-world PyBNF fitting example derived from:
#   Rukhlenko OS, Halasz M, Rauch N, ... Kholodenko BN. "Control of cell state
#   transitions." Nature 2022; 609(7929):975-985.
#   PMCID: PMC9644236   DOI: 10.1038/s41586-022-05194-y
#   (The paper fit this rule-based model -- 114 species, 645 reactions with the
#   TrkB-ErbB hetero-dimerization module -- with pyBioNetFit.)
#
# Twin of ../cstar_trka. Fit target: SH-SY5Y/TrkB cells stimulated with BDNF, DMSO
#   (no-inhibitor) arm, phospho fold changes at 0 / 10 / 45 min (Fig. 4B). Data extracted
#   from the authors' RPPA table (github.com/OleksiiR/cSTAR_Nature; pTrk from
#   RPPA_data_Trk_normalized_new.csv, TrkB columns), replicate-averaged and normalized to
#   t=0 -> fold change. See cstar_trkb.exp header and the folder README for the exact
#   antibody -> observable mapping. TrkB signalling is markedly stronger and more
#   sustained than TrkA (esp. pAdRTK/ERBB2, the autocatalytic amplifier).
#
# Experimental design: pre-equilibrate WITHOUT BDNF (Lig_on = 0), then add BDNF
#   (Lig_on = 1) and measure over 0-2700 s (= 45 min). PyBNF synthesizes the two-phase
#   protocol from the preequilibrate:/condition: fields.
#
# NATIVE-ONLY: `normalization = init` (fold-change data) is NOT PEtab-v2-exportable --
#   like the shipped igf1r.conf. Verified with a tier-1 parse check + a bounded bngsim
#   fit + reproduction of Fig. 4B, NOT with the PEtab round-trip. See
#   skills/curate-pybnf-job/references/petab-compliance.md.
#
# Run (with BNGPATH set, from this folder or with an absolute path):
#   pybnf -c cstar_trkb.conf

output_dir = output

# Opt into the edition-2 config language (PEtab-aligned experiment:/condition:/data:).
edition = 2

# In-process bngsim backend (the new-era default).
bngl_backend = bngsim

# The model (no `begin actions` block -- the protocol below synthesizes the sim).
model: cstar_trkb.bngl

#######################
### General Options ###
#######################

delete_old_files = 1
wall_time_sim = 3600        # 114-species network; generous per-simulation ceiling

###################
### Conditions  ###
###################
# BDNF is gated by the model parameter Lig_on (0 during equilibration, 1 once BDNF is added).
condition: basal, perturbations: Lig_on = 0
condition: stim,  perturbations: Lig_on = 1

###################
### Experiments ###
###################
# Pre-equilibrate under `basal` (no BDNF, unmeasured, to steady state) -> perturb to `stim`
# (BDNF present) -> measure cstar_trkb.exp over its time grid. State carries across the two
# phases with no reset (ADR-0052). The .exp column headers ARE the model function names.
experiment: cstar_trkb, preequilibrate: basal, condition: stim, data: cstar_trkb.exp

#######################
### Fitting Options ###
#######################

# Differential evolution (a global metaheuristic, as the paper corpus uses).
job_type = de

# The data are fold changes vs t=0 -> normalize each simulated observable to its initial
# value before comparison (whole-fit form; NOT PEtab-exportable -> native-only job).
normalization = init

# cstar_trkb.exp carries no _SD columns -> plain sum of squares.
objective = sos

max_iterations = 50
population_size = 12
verbosity = 2

##################
### Parameters ###
##################
# Eight core rate / coupling constants that shape the seven fitted phospho readouts,
# bound to the model ids BY NAME (ADR-0034, no __FREE alias), each on a log scale
# bracketing the published TrkB value by roughly +/- one decade. Note the TrkB-specific
# ids (g_B_*, kpRSKB) -- the network differs from TrkA.
#
#   id            published   role
#   vpTRK         2.356       Trk trans-phosphorylation (-> pTRK)
#   vpRTK         0.12        ERBB/AdRTK phosphorylation (-> pAdRTK; autocatalytic in TrkB)
#   g_B_TRKERK    67.658      Trk -> ERK activation strength (-> ppERK)
#   vpERK         0.006       ERK phosphorylation (-> ppERK)
#   g_B_TRKAKT    30          Trk -> AKT activation strength (-> pAKT)
#   vpAKT         0.0003      AKT phosphorylation (-> pAKT)
#   kpRSKB        0.018       ERK -> RSK activation (-> pRSK)
#   g_B_AKTS6K    10          AKT -> S6K activation (-> pS6K)
loguniform_var = vpTRK      0.2356  23.56
loguniform_var = vpRTK      0.012   1.2
loguniform_var = g_B_TRKERK 6.7658  676.58
loguniform_var = vpERK      0.0006  0.06
loguniform_var = g_B_TRKAKT 3.0     300
loguniform_var = vpAKT      0.00003 0.003
loguniform_var = kpRSKB     0.0018  0.18
loguniform_var = g_B_AKTS6K 1.0     100
