# Multisite EGFR phosphorylation, CHO EGFR-GFP cells (Salazar-Cavazos et al. 2020) --
# deterministic ODE. Joint fit of an EGF dose-response and a 25 nM EGF time course of
# single-molecule pull-down (SiMPull) multisite-phosphorylation data. PEtab-v2-exportable.
#
# Real-world PyBNF edition-2 fitting job derived from:
#   Salazar-Cavazos E, Franco Nitta C, Mitra ED, Wilson BS, Lidke KA, Hlavacek WS, Lidke DS.
#   "Multisite EGFR phosphorylation is regulated by adaptor protein abundances and dimer
#   lifetimes." Mol Biol Cell 2020; 31(7):695-708.
#   PMCID: PMC7202077   DOI: 10.1091/mbc.E19-09-0548
#
# This is the authors' OWN PyBioNetFit setup (supplement mc-e19-09-0548-s03/PyBNF-fitting-setup/:
#   190127_CHO_EGFR_forBNF.bngl, dose_resp.exp, EGF_25nM.exp, fit_v1_28.conf), ported from
#   legacy BioNetFit to the edition-2 / PEtab surface. The six free parameters, their log-scale
#   bounds, the de + chi_sq objective, and both data files are exactly the authors' fit_v1_28.conf.
#
# Fit target -- SiMPull % of EGFR phosphorylated, three antibodies (pY1068, pY1173, pan-PY):
#   * dose_resp.exp -- % phosphorylation vs. EGF dose EGFconc (0.5, 5, 50 nM), each dose run
#                      to a fixed endpoint t_end = 300 s (a parameter scan over EGFconc).
#   * EGF_25nM.exp  -- % phosphorylation vs. time (60, 120, 300 s) at a fixed 25 nM EGF dose.
#   Both .exp carry per-point _SD columns -> the chi_sq (Gaussian, per-point sigma) objective.
#   Columns pY1068_percent(), pY1173_percent(), phosR_per() are model FUNCTIONS (parens in the
#   .exp header; listed without parens in _manifest.py).
#
# PEtab-EXPORTABLE: observables are arithmetic model functions and the objective is chi_sq --
#   inside the PEtab-exportable subset. Verified with scripts/petab_roundtrip.py (export -> lint
#   clean -> import). See skills/curate-pybnf-job/references/petab-compliance.md.
#
# Network: finite without a cap (dimerization is a receptor state change II~u->II~b, not an
#   unbounded aggregate), 75 species, ~1 s to generate -> NOT heavy, no generate_network directive.
#
# Run (with BNGPATH set, from this folder):
#   cd pybnf-jobs/Salazar-Cavazos-2019/egfr_simpull && pybnf -c egfr_simpull.conf

output_dir = output

# Opt into the edition-2 config language (PEtab-aligned experiment:/data:).
edition = 2

# In-process bngsim backend (the new-era default).
bngl_backend = bngsim

# The model (no `begin actions` block -- the experiments below synthesize the sims).
model: egfr_simpull.bngl

#######################
### General Options ###
#######################

delete_old_files = 1

#######################
### Fitting Options ###
#######################

# Differential evolution, as the authors' fit_v1_28.conf (fit_type=de).
job_type = de

# Gaussian noise, sigma read per point from the _SD columns (authors' objfunc=chi_sq).
objective = chi_sq

# Search budget. The authors ran de with population_size=200, max_iterations=1000 on a cluster;
# this smaller budget runs on a workstation. Raise both for a full fit.
max_iterations = 50
population_size = 50
verbosity = 2

###################
### Experiments ###
###################

# EGF dose-response: a parameter scan over EGFconc (the data's independent-variable column),
# each dose run to a fixed endpoint t_end = 300 s. Observables pY1068_percent(), pY1173_percent(),
# phosR_per(). (Authors: parameter_scan suffix "dose_resp", par_scan_vals 0.5/5/50 nM, t_end 300.)
experiment: dose_resp, type: parameter_scan, t_end: 300, data: dose_resp.exp

# Time course at 25 nM EGF (model default EGFconc = 25 nM), sampled at 60/120/300 s.
# (Authors: simulate suffix "EGF_25nM", sample_times 60/120/300.)
experiment: egf25nm, data: EGF_25nM.exp

##################
### Parameters ###
##################
# Six free parameters bound to the model ids BY NAME (ADR-0034, no __FREE alias), all on a log
# scale over the authors' fit_v1_28.conf bounds. Nominals in the .bngl are the PyBNF best fit
# (190127_CHO_EGFR_best-fit.bngl); the search brackets them.
#
#   id                published (best-fit)   role
#   GRB2_total_0      169853                 total Grb2 copy number (molecules/cell)
#   SHC1_total_0      649426                 total Shc1 copy number (molecules/cell)
#   kdephosY1068_0    1.6588                 base dephosphorylation rate, Y1068 (/s)
#   ratio_kpkd_Y1068  0.15755                kphos/kdephos ratio at Y1068
#   kdephosYN_0       0.017182               base dephosphorylation rate, other sites YN (/s)
#   ratio_kpkd_YN     0.44476                kphos/kdephos ratio at YN
loguniform_var = GRB2_total_0 1E4 1E6
loguniform_var = SHC1_total_0 1E4 1E6
loguniform_var = kdephosY1068_0 0.1 100
loguniform_var = ratio_kpkd_Y1068 0.01 100
loguniform_var = kdephosYN_0 0.001 100
loguniform_var = ratio_kpkd_YN 0.01 100
