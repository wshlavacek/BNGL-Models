# <Biology one-liner> (<First-author Year>) -- <ODE|SSA|NFsim>, <network-generating?>.
#
# Real-world example derived from:
#   <Authors>. "<Title>." <Journal> <Year>; <vol:pages>. PMCID: PMC#######  DOI: ##
# Fit target: <which figure/table the .exp came from, and how it was obtained
#   (source table / digitized panel + calibration)>.
#
# Expressed on PyBNF's edition-2 (new-era) config surface, inside the
# PEtab-exportable subset (verified with scripts/petab_roundtrip.py).
#
# Run from INSIDE the job folder (with BNGPATH set) -- all relative paths (model:, data:,
# output_dir) resolve against the working directory:
#   cd <FirstAuthor>-<Year>/<slug> && pybnf -c <slug>.conf

# Results directory, relative -> lands in <slug>/output/ beside the job setup. (Don't
# repeat the slug or a real-world/ prefix here; the job folder already provides that context.)
output_dir = output

# Opt into the edition-2 config language (PEtab-aligned experiment:/condition:/data:).
edition = 2

# In-process bngsim backend (the new-era default; required for gradient fits).
bngl_backend = bngsim

# The model (no `begin actions` block -- the experiments below synthesize the sims).
model: <name>.bngl

#######################
### General Options ###
#######################

delete_old_files = 1
# wall_time_sim = 3600        # raise for large network-generating models

###################
### Conditions  ###
###################
# Only if the experiment perturbs / pre-equilibrates. Perturbations set model params.
# condition: basal,   perturbations: <Stimulus> = 0
# condition: stim,     perturbations: <Stimulus> = 1

###################
### Experiments ###
###################
# Each experiment binds one .exp and synthesizes its simulation. The .exp column
# headers ARE the model observable/function names; the first column is the independent
# variable (time -> time course; a model-parameter name -> parameter_scan / dose).

# Time course:
experiment: timecourse, data: timecourse.exp

# Dose-response (scan over the data's independent-variable column, run to t_end):
# experiment: doseresponse, type: parameter_scan, t_end: 1200, data: doseresponse.exp

# Pre-equilibration then measure (state carried across phases, no reset):
# experiment: <name>, preequilibrate: basal, condition: stim, data: <name>.exp

# BPSL constraints (qualitative facts from the paper). This makes the job NATIVE-ONLY
# (not PEtab-exportable) -- verify with `job_type = check`, not petab_roundtrip.py.
# See references/bpsl-constraints.md.
#   Data fusion (quantitative + qualitative on one experiment):
# experiment: timecourse, data: timecourse.exp, timecourse.prop
#   Constraint-only (t_end required; the .prop alone defines the job):
# experiment: qual, t_end: <T>, n_steps: <N>, data: qual.prop
# constraint_scale = 1.0        # global weight on the qualitative penalty block

#######################
### Fitting Options ###
#######################

# Global metaheuristic (de/ss/pso are what the paper corpus uses).
job_type = de

# sos when the .exp has NO _SD columns; chi_sq when it DOES (Gaussian, per-point sigma).
objective = sos

max_iterations = 50
population_size = 12
verbosity = 2
# refine = 1                  # polish the best fit with a local optimizer

##################
### Parameters ###
##################
# One free var per fitted model parameter, bound to the model id BY NAME (ADR-0034):
# no __FREE alias. Bracket the paper's published value.
#   loguniform_var <id> <lo> <hi>   -- rate constants over decades
#   uniform_var    <id> <lo> <hi>   -- linear scaling factors
loguniform_var = <rate_id> 0.001 1000
# uniform_var = <scale_id> 0 <hi>
